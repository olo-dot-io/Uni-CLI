# External CLI Registry — declarative catalog of passthrough CLI tools.
#
# Each entry maps an external CLI binary so agents can discover and invoke
# it via `unicli ext run <name> <args>`.  The registry is read at startup;
# only CLIs whose binary is found on $PATH are registered as live commands.

# ── Tier 0 — Chinese Office (highest value) ─────────────────────────────

- name: lark-cli
  binary: lark-cli
  description: "Lark/Feishu — messages, documents, calendar, tasks, 200+ commands"
  homepage: "https://github.com/larksuite/cli"
  tags: [lark, feishu, collaboration, productivity]
  json_flag: "--format json"
  install:
    mac: "npm install -g @larksuite/cli"
    linux: "npm install -g @larksuite/cli"
    default: "npm install -g @larksuite/cli"

- name: wecom-cli
  binary: wecom-cli
  description: "WeCom/WeChat Work — contacts, messages, bots, 100+ commands"
  homepage: "https://github.com/WecomTeam/wecom-cli"
  tags: [wecom, wechat-work, enterprise, messaging]
  json_flag: "--json"
  install:
    default: "npm install -g @wecom/cli"

- name: dws
  binary: dws
  description: "DingTalk Workspace — messages, docs, calendar, contacts, 86 commands"
  homepage: "https://github.com/DingTalk-Real-AI/dingtalk-workspace-cli"
  tags: [dingtalk, workspace, collaboration]
  install:
    mac: "curl -fsSL https://raw.githubusercontent.com/DingTalk-Real-AI/dingtalk-workspace-cli/main/scripts/install.sh | sh"
    linux: "curl -fsSL https://raw.githubusercontent.com/DingTalk-Real-AI/dingtalk-workspace-cli/main/scripts/install.sh | sh"
    default: "npm install -g dingtalk-workspace-cli"

