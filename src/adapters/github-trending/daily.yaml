site: github-trending
name: daily
description: GitHub trending repositories (by recent stars)
domain: api.github.com
type: web-api
strategy: public

args:
  language:
    type: str
    default: ""
    description: Filter by programming language
  limit:
    type: int
    default: 20
    description: Number of repositories

pipeline:
  - fetch:
      url: "https://api.github.com/search/repositories"
      params:
        q: "stars:>100 pushed:>2026-04-01${{ args.language ? ' language:' + args.language : '' }}"
        sort: stars
        order: desc
        per_page: "${{ args.limit }}"
      headers:
        Accept: "application/vnd.github.v3+json"

  - select: items

  - map:
      rank: "${{ index + 1 }}"
      name: "${{ item.full_name }}"
      description: "${{ item.description }}"
      language: "${{ item.language }}"
      stars: "${{ item.stargazers_count }}"
      forks: "${{ item.forks_count }}"

  - limit: "${{ args.limit }}"

columns: [rank, name, language, stars, forks]
