# @owner       src::adapters::kipris::get
# @does        Fetch a single Korean patent bibliographic record from KIPRIS Plus REST by application number.
# @needs       src/engine/steps/fetch.ts, src/engine/steps/select-xml.ts, src/engine/steps/map.ts
# @feeds       src/commands/patent.ts
# @breaks      throws PipelineError on missing key, 4xx, 5xx
# @invariants  output row conforms to PatentRecord
# @side-effects reads env KIPRIS_ACCESS_KEY; HTTPS egress to plus.kipris.or.kr
# @perf        single request
# @concurrency safe
# @test        none yet
# @stability   stable
# @since       2026-05-18
# @verification blocked-by-key
site: kipris
name: get
description: Fetch a KIPRIS biblio record by application number
domain: plus.kipris.or.kr
type: web-api
strategy: public
lint_listing_detail: skip

args:
  application_number:
    type: str
    required: true
    positional: true
    description: Korean application number (e.g. 1020230012345)

pipeline:
  - fetch:
      url: "https://plus.kipris.or.kr/openapi/rest/patUtiModInfoSearchSevice/getBibliographyDetailInfoSearch"
      method: GET
      headers:
        Accept: application/xml
      params:
        applicationNumber: "${{ args.application_number }}"
        accessKey: "${{ env.KIPRIS_ACCESS_KEY || '' }}"

  - select-xml:
      xpath: "//biblioSummaryInfo"
      unwrap_single: true

  - map:
      publication_number: "${{ 'KR-' + (item.openNumber || args.application_number || '') + '-' + (item.openType || '') }}"
      application_number: "${{ item.applicationNumber || args.application_number || '' }}"
      title: "${{ item.inventionTitle || '' }}"
      filing_date: "${{ item.applicationDate || '' }}"
      publication_date: "${{ item.openDate || '' }}"
      grant_date: "${{ item.registerDate || '' }}"
      source_adapter: kipris
      source_url: "${{ 'https://kpat.kipris.or.kr/kpat/biblioa.do?method=biblioFrame&applno=' + (args.application_number || '') }}"
      retrieved_at: ""

columns: [publication_number, title, filing_date, publication_date]

# schema-v2 metadata
capabilities: ["http.fetch", "patent.get"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
