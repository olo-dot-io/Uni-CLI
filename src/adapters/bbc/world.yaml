site: bbc
name: world
description: BBC world news
domain: www.bbc.co.uk
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20

pipeline:
  - fetch_text:
      url: https://feeds.bbci.co.uk/news/world/rss.xml

  - parse_rss:
      fields:
        title: title
        description: description
        link: link
        pubDate: pubDate

  - limit: "${{ args.limit }}"

columns: [title, description, pubDate]
