# Godot scene/export — export a scene to a known format via godot --headless.
# Export a Godot scene to a target format via headless mode.
site: godot
name: scene/export
description: Export a Godot scene to PNG / GLTF / DAE via headless mode
type: desktop
strategy: public
binary: godot
detect: which godot

args:
  project:
    type: str
    required: true
    positional: true
    description: Path to project directory or project.godot file
  scene:
    type: str
    required: true
    description: Scene path within the project (e.g. res://Main.tscn)
  output:
    type: str
    required: true
    description: Output file path
    x-unicli-kind: path

pipeline:
  - exec:
      command: godot
      args:
        - --headless
        - --path
        - ${{ args.project }}
        - --export-pack
        - ${{ args.scene }}
        - ${{ args.output }}
      parse: text
      timeout: 120000

columns: [output]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
