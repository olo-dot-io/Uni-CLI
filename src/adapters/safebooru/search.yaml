site: safebooru
name: search
description: Search Safebooru illustration posts by Japanese, romaji, or tag query
domain: safebooru.org
type: web-api
strategy: public

args:
  tags:
    type: str
    required: true
    positional: true
    description: Tag query, for example "hanabi rating:safe"
  limit:
    type: int
    default: 20
  page:
    type: int
    default: 0

pipeline:
  - fetch:
      url: "https://safebooru.org/index.php"
      params:
        page: dapi
        s: post
        q: index
        json: 1
        tags: "${{ args.tags }}"
        limit: "${{ args.limit }}"
        pid: "${{ args.page }}"

  - map:
      rank: "${{ index + 1 }}"
      id: "${{ item.id }}"
      rating: "${{ item.rating }}"
      score: "${{ item.score }}"
      owner: "${{ item.owner }}"
      width: "${{ item.width }}"
      height: "${{ item.height }}"
      tags: "${{ item.tags }}"
      source: "${{ item.source }}"
      preview_url: "${{ item.preview_url }}"
      sample_url: "${{ item.sample_url }}"
      file_url: "${{ item.file_url }}"
      url: "${{ 'https://safebooru.org/index.php?page=post&s=view&id=' + item.id }}"

columns:
  [
    rank,
    id,
    rating,
    score,
    owner,
    width,
    height,
    tags,
    source,
    sample_url,
    file_url,
    url,
  ]

capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
