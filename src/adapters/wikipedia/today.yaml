site: wikipedia
name: today
description: Wikipedia featured article of the day
domain: en.wikipedia.org
type: web-api
strategy: public

args:
  lang:
    type: str
    default: en

pipeline:
  - fetch:
      url: "https://${{ args.lang }}.wikipedia.org/api/rest_v1/feed/featured/${{ new Date().toISOString().slice(0,10).replace(/-/g,'/') }}"

  - select: tfa

  - map:
      title: ${{ item.title }}
      description: "${{ item.description || '' }}"
      extract: "${{ (item.extract || '') | truncate(400) }}"
      url: "${{ item.content_urls?.desktop?.page || '' }}"

columns: [title, description, extract, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: true
quarantineReason: "wikipedia REST blocks CI egress; adapter works from real user hosts"
schema_version: v2
