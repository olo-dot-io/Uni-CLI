site: wikipedia
name: search
description: Search Wikipedia articles
domain: wikipedia.org
type: web-api
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
    description: Search keyword
  limit:
    type: int
    default: 10
    description: Max results

pipeline:
  - fetch:
      url: "https://en.wikipedia.org/w/api.php"
      params:
        action: query
        list: search
        srsearch: "${{ args.query }}"
        srlimit: "${{ args.limit }}"
        format: json
        utf8: "1"

  - select: query.search

  - map:
      title: "${{ item.title }}"
      snippet: "${{ item.snippet }}"
      wordcount: "${{ item.wordcount }}"

  - limit: "${{ args.limit }}"

columns: [title, snippet, wordcount]
