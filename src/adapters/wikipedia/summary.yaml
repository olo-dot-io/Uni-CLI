site: wikipedia
name: summary
description: Get Wikipedia article summary
domain: wikipedia.org
type: web-api
strategy: public

args:
  title:
    type: str
    required: true
    positional: true
    description: Article title (use underscores for spaces)

pipeline:
  - fetch:
      url: "https://en.wikipedia.org/api/rest_v1/page/summary/${{ args.title }}"

  - map:
      title: "${{ item.title }}"
      description: "${{ item.description }}"
      extract: "${{ item.extract }}"

columns: [title, description, extract]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
