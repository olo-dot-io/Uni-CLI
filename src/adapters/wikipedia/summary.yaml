site: wikipedia
name: summary
description: Get Wikipedia article summary
domain: wikipedia.org
type: web-api
strategy: public

args:
  title:
    type: str
    required: true
    positional: true
    description: "Article title (e.g. Transformer_(machine_learning_model))"
  lang:
    type: str
    default: en
    description: "Language code (e.g. en, zh, ja)"

pipeline:
  - fetch:
      url: "https://${{ args.lang || 'en' }}.wikipedia.org/api/rest_v1/page/summary/${{ args.title | urlencode }}"
      headers:
        User-Agent: Uni-CLI/0.200

  - map:
      title: ${{ item.title }}
      description: ${{ item.description || '-' }}
      extract: ${{ item.extract | truncate(300) }}
      url: "${{ item.content_urls && item.content_urls.desktop ? item.content_urls.desktop.page : ('https://' + (args.lang || 'en') + '.wikipedia.org') }}"

columns: [title, description, extract, url]
