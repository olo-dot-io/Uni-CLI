# Desktop adapter — wrapping Inkscape for SVG optimization and cleanup
site: inkscape
name: optimize
description: Optimize and clean SVG by vacuuming unused defs and producing plain SVG
type: desktop
strategy: public
binary: inkscape
detect: which inkscape

pipeline:
  - exec:
      command: inkscape
      args:
        - ${{ args.file }}
        - ${{ '--actions=vacuum-defs;export-filename:' + args.output + ';export-plain-svg;export-do' }}
      parse: text
      timeout: 30000

args:
  file:
    type: str
    required: true
    positional: true
    description: Input SVG file path
    x-unicli-kind: path
  output:
    type: str
    required: true
    description: Output optimized SVG file path
    x-unicli-kind: path

columns: []

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
