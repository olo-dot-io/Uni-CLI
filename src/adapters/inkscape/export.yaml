# Desktop adapter — wrapping Inkscape for SVG export to raster/vector
site: inkscape
name: export
description: Export SVG to image format (PNG, PDF, EPS, PS, or SVG) with DPI control
type: desktop
strategy: public
binary: inkscape
detect: which inkscape

pipeline:
  - exec:
      command: inkscape
      args:
        - ${{ args.file }}
        - ${{ '--export-type=' + args.format }}
        - ${{ '--export-filename=' + args.output }}
        - ${{ '--export-dpi=' + args.dpi }}
      parse: text
      timeout: 30000

args:
  file:
    type: str
    required: true
    positional: true
    description: Input SVG file path
  output:
    type: str
    required: true
    description: Output file path
  format:
    type: str
    default: png
    choices: [png, pdf, eps, ps, svg]
    description: Export format
  dpi:
    type: int
    default: 96
    description: Export resolution in DPI (affects raster formats)

columns: []
