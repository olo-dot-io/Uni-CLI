# Desktop adapter — wrapping Inkscape for vector format conversion
site: inkscape
name: convert
description: Convert SVG to another vector format (PDF, EPS, PS) using plain SVG export
type: desktop
strategy: public
binary: inkscape
detect: which inkscape

pipeline:
  - exec:
      command: inkscape
      args:
        - ${{ args.file }}
        - ${{ '--export-type=' + args.format }}
        - ${{ '--export-filename=' + args.output }}
        - --export-plain-svg
      parse: text
      timeout: 30000

args:
  file:
    type: str
    required: true
    positional: true
    description: Input SVG file path
  output:
    type: str
    required: true
    description: Output file path
  format:
    type: str
    default: svg
    choices: [svg, pdf, eps, ps]
    description: Output vector format

columns: []

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
