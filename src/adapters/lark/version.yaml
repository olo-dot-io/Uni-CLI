site: lark
name: version
description: Check Lark CLI version and status
type: bridge
strategy: public
binary: lark
detect: which lark

pipeline:
  - exec:
      command: lark
      args:
        - --version
      parse: text
      timeout: 10000

columns: [output]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
