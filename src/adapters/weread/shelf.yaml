site: weread
name: shelf
description: WeRead bookshelf (user's books)
domain: weread.qq.com
type: web-api
strategy: cookie
auth_cookies: [wr_skey, wr_vid]

args:
  limit:
    type: int
    default: 20
    description: Number of books

pipeline:
  - fetch:
      url: https://weread.qq.com/web/shelf/sync
      method: POST
      headers:
        Content-Type: application/json
      body:
        synckey: 0
        teenmode: 0
        lectureBookIds: []

  - select: books

  - map:
      title: ${{ item.bookInfo?.title || item.title || '' }}
      author: ${{ item.bookInfo?.author || '' }}
      cover: ${{ item.bookInfo?.cover || '' }}
      reading_time: ${{ item.readingTime || 0 }}
      book_id: ${{ item.bookId }}

  - limit: ${{ args.limit }}

columns: [title, author, reading_time, book_id]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
