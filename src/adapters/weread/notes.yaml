site: weread
name: notes
description: List your notes (thoughts) on a book
domain: i.weread.qq.com
type: web-api
strategy: cookie
auth_cookies: [wr_skey, wr_vid]

args:
  book-id:
    required: true
    positional: true
    description: Book ID (from shelf or search results)
  limit:
    type: int
    default: 20
    description: Number of notes

pipeline:
  - fetch:
      url: https://i.weread.qq.com/review/list
      params:
        bookId: "${{ args.book-id }}"
        listType: "11"
        mine: "1"
        synckey: "0"
      headers:
        Origin: "https://weread.qq.com"
        Referer: "https://weread.qq.com/"

  - select: reviews

  - map:
      chapter: ${{ item.review?.chapterName || '' }}
      text: ${{ item.review?.abstract || '' }}
      review: ${{ item.review?.content || '' }}
      createTime: ${{ item.review?.createTime || '' }}

  - limit: ${{ args.limit }}

columns: [chapter, text, review, createTime]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
