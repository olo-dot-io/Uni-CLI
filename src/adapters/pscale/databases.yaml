site: pscale
name: databases
description: List PlanetScale databases
type: bridge
strategy: public
binary: pscale
detect: which pscale
autoInstall: brew install pscale

pipeline:
  - exec:
      command: pscale
      args:
        - database
        - list
        - --format
        - json
      parse: json
      timeout: 30000

columns: [name, region, created_at]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
