site: reuters
name: search
description: Search Reuters articles by keyword
domain: reuters.com
type: web-api
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
    description: Search keywords
  limit:
    type: int
    default: 20
    description: Number of results

pipeline:
  - fetch:
      url: https://www.reuters.com/pf/api/v3/content/fetch/articles-by-search-v2
      params:
        query: '{"keyword":"${{ args.query }}","offset":0,"orderby":"display_date:desc","size":${{ args.limit }},"website":"reuters"}'
      headers:
        User-Agent: "Mozilla/5.0 (compatible; Uni-CLI)"

  - select: result.articles

  - map:
      rank: ${{ index + 1 }}
      title: "${{ item.title || '' }}"
      description: "${{ item.description || '' | truncate(200) }}"
      date: "${{ item.display_date || item.published_time || '' }}"
      section: "${{ item.taxonomy?.section?.name || '' }}"
      url: "https://www.reuters.com${{ item.canonical_url || '' }}"

  - limit: ${{ args.limit }}

columns: [rank, title, description, date, section, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
