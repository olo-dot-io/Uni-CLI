site: reuters
name: latest
description: Latest Reuters news articles
domain: www.reuters.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20

pipeline:
  - fetch_text:
      url: https://www.reutersagency.com/feed/?taxonomy=best-topics&post_type=best

  - parse_rss:
      fields:
        title: title
        link: link
        pubDate: pubDate
        description: description

  - limit: "${{ args.limit }}"

columns: [title, description, pubDate]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: true
quarantineReason: "HTTP 404 — reutersagency.com feed endpoint removed (2026-04-15)"

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
