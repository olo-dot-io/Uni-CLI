site: ithome
name: hot
description: IT Home hot news
domain: www.ithome.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: https://m.ithome.com/api/news/hot

  - select: data

  - map:
      rank: ${{ index + 1 }}
      title: "${{ item.title || '' }}"
      comments: "${{ item.commentcount || 0 }}"
      url: "${{ item.url || '' }}"

  - limit: ${{ args.limit }}

columns: [rank, title, comments, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: true
quarantineReason: "HTTP 404 — upstream endpoint relocated (2026-04-15)"

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
