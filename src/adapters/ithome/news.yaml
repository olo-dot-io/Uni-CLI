site: ithome
name: news
description: IT Home (IT之家) latest tech news via RSS
type: web-api
domain: ithome.com
strategy: public
args:
  limit:
    required: false
    default: 20
pipeline:
  - fetch_text:
      url: "https://www.ithome.com/rss/"
  - parse_rss: ~
  - map:
      title: "${{ item.title }}"
      url: "${{ item.link }}"
      date: "${{ item.pubDate }}"
      description: "${{ item.contentSnippet }}"
  - limit: "${{ args.limit | default(20) }}"
columns: [title, url, date]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
