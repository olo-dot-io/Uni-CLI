site: 36kr
name: hot
description: 36Kr hot/trending articles
domain: 36kr.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20
    description: Number of articles

pipeline:
  - fetch:
      url: https://36kr.com/api/newsflash
      params:
        per_page: "${{ args.limit }}"
      headers:
        User-Agent: "Mozilla/5.0 (compatible; Uni-CLI)"

  - select: data.items

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title || '' }}
      date: ${{ item.published_at || '' }}
      summary: ${{ (item.description || '') | strip_html | truncate(150) }}
      id: ${{ item.id }}

  - limit: ${{ args.limit }}

columns: [rank, title, date, summary, id]
