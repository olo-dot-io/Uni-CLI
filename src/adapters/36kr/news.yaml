site: 36kr
name: news
description: 36Kr tech news (RSS)
domain: 36kr.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20
    description: Number of articles

pipeline:
  - fetch_text:
      url: https://36kr.com/feed

  - parse_rss: ~

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      date: ${{ item.pubDate }}
      summary: ${{ item.description | strip_html | truncate(150) }}
      link: ${{ item.link }}

  - limit: ${{ args.limit }}

columns: [rank, title, date, summary]
