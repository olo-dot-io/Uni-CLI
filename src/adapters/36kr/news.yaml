site: 36kr
name: news
description: 36Kr tech news (RSS)
domain: 36kr.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20
    description: Number of articles

pipeline:
  - fetch_text:
      url: https://36kr.com/feed
      retry: 2
      backoff: 500

  - parse_rss: ~

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      date: ${{ item.pubDate }}
      summary: ${{ item.description | strip_html | truncate(150) }}
      url: ${{ item.url || item.link }}
      link: ${{ item.link }}

  - limit: ${{ args.limit }}

columns: [rank, title, date, summary, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
