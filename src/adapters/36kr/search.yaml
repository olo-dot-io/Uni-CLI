site: 36kr
name: search
description: Search 36Kr articles
domain: 36kr.com
type: web-api
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
    description: Search keyword
  limit:
    type: int
    default: 20
    description: Number of results

pipeline:
  - fetch:
      url: https://36kr.com/api/search/entity-search
      params:
        keyword: "${{ args.query }}"
        per_page: "${{ args.limit }}"
      headers:
        User-Agent: "Mozilla/5.0 (compatible; Uni-CLI)"

  - select: data.items

  - map:
      rank: ${{ index + 1 }}
      title: ${{ (item.title || '') | strip_html }}
      date: ${{ item.published_at || '' }}
      summary: ${{ (item.description || '') | strip_html | truncate(150) }}
      id: ${{ item.id }}

  - limit: ${{ args.limit }}

columns: [rank, title, date, summary, id]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
