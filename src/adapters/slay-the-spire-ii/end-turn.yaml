# Service adapter — end the current turn in Slay the Spire II combat
site: slay-the-spire-ii
name: end-turn
description: End the current combat turn
type: service
strategy: public
base: "http://localhost:15526"

args:
  port:
    type: int
    default: 15526
    description: HTTP bridge port

pipeline:
  - fetch:
      url: "http://localhost:${{ args.port }}/api/end_turn"
      method: POST

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
