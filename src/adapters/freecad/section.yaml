# Desktop adapter — generate a cross-section view of a FreeCAD part
site: freecad
name: section
description: Generate a cross-section view at a given plane and offset
type: desktop
binary: freecadcmd
detect: which freecadcmd || which FreeCADCmd || which freecad
timeout: 60000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to .FCStd file
  plane:
    type: str
    default: XY
    choices: [XY, XZ, YZ]
    description: Section plane
  offset:
    type: float
    default: 0.0
    description: Offset distance along plane normal
  output:
    type: str
    required: true
    description: Output file path (SVG or DXF)

pipeline:
  - write_temp:
      filename: section.py
      content: |
        import sys, os, json
        import FreeCAD
        import Part

        input_path = "${{ args.input }}"
        output_path = "${{ args.output }}"
        plane = "${{ args.plane }}"
        offset = ${{ args.offset }}

        os.makedirs(os.path.dirname(os.path.abspath(output_path)) or ".", exist_ok=True)
        doc = FreeCAD.openDocument(input_path)
        FreeCAD.setActiveDocument(doc.Name)

        shapes = [obj for obj in doc.Objects if hasattr(obj, "Shape")]
        if not shapes:
            print('UNICLI_JSON:{"error":"No shapes found"}')
            sys.exit(1)

        normals = {"XY": FreeCAD.Vector(0, 0, 1), "XZ": FreeCAD.Vector(0, 1, 0), "YZ": FreeCAD.Vector(1, 0, 0)}
        normal = normals[plane]
        base_pt = FreeCAD.Vector(normal.x * offset, normal.y * offset, normal.z * offset)

        wires = []
        for obj in shapes:
            section = obj.Shape.section(Part.makePlane(1000, 1000, base_pt, normal))
            if section.Edges:
                wires.extend(section.Edges)

        if not wires:
            print('UNICLI_JSON:{"error":"No cross-section edges at this plane/offset"}')
            sys.exit(1)

        compound = Part.makeCompound(wires)
        Part.export([compound] if hasattr(compound, "exportStep") else shapes, output_path)

        print(f'UNICLI_JSON:{{"output":"{output_path}","plane":"{plane}","offset":{offset},"edges":{len(wires)}}}')
        FreeCAD.closeDocument(doc.Name)

  - exec:
      command: freecadcmd
      args: ["${{ temp.section_py }}"]
      parse: text
      timeout: 60000

columns: [output, plane, offset, edges]
