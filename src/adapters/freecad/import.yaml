# Desktop adapter — import a 3D file into a new FreeCAD document
site: freecad
name: import
description: Import a 3D file (STEP, IGES, STL, OBJ) into a new .FCStd document
type: desktop
binary: freecadcmd
detect: which freecadcmd || which FreeCADCmd || which freecad
timeout: 120000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to 3D file to import
  output:
    type: str
    required: true
    description: Output .FCStd file path

pipeline:
  - write_temp:
      filename: import_file.py
      content: |
        import sys, os, json
        import FreeCAD
        import Part
        import Mesh

        input_path = "${{ args.input }}"
        output_path = "${{ args.output }}"
        ext = os.path.splitext(input_path)[1].lower()

        os.makedirs(os.path.dirname(os.path.abspath(output_path)) or ".", exist_ok=True)
        doc = FreeCAD.newDocument("Imported")

        if ext in (".stl", ".obj", ".ply"):
            Mesh.insert(input_path, doc.Name)
        elif ext in (".step", ".stp", ".iges", ".igs", ".brep"):
            Part.insert(input_path, doc.Name)
        else:
            FreeCAD.openDocument(input_path)

        doc.recompute()
        doc.saveAs(output_path)

        obj_count = len(doc.Objects)
        size = os.path.getsize(output_path)
        print(f'UNICLI_JSON:{{"output":"{output_path}","objects":{obj_count},"file_size":{size}}}')
        FreeCAD.closeDocument(doc.Name)

  - exec:
      command: freecadcmd
      args: ["${{ temp.import_file_py }}"]
      parse: text
      timeout: 120000

columns: [output, objects, file_size]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
