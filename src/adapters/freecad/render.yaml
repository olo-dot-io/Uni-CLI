# Desktop adapter — render a FreeCAD model to an image
site: freecad
name: render
description: Render a FreeCAD model to a PNG image using the 3D view
type: desktop
binary: freecadcmd
detect: which freecadcmd || which FreeCADCmd || which freecad
timeout: 120000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to .FCStd file
  output:
    type: str
    required: true
    description: Output PNG image path
  width:
    type: int
    default: 1920
    description: Image width in pixels
  height:
    type: int
    default: 1080
    description: Image height in pixels

pipeline:
  - write_temp:
      filename: render.py
      content: |
        import sys, os, json
        import FreeCAD
        import FreeCADGui

        input_path = "${{ args.input }}"
        output_path = "${{ args.output }}"
        width = ${{ args.width }}
        height = ${{ args.height }}

        os.makedirs(os.path.dirname(os.path.abspath(output_path)) or ".", exist_ok=True)
        doc = FreeCAD.openDocument(input_path)
        FreeCAD.setActiveDocument(doc.Name)

        FreeCADGui.showMainWindow()
        FreeCADGui.activateWorkbench("PartWorkbench")
        view = FreeCADGui.activeDocument().activeView()
        view.viewIsometric()
        view.fitAll()
        view.saveImage(output_path, width, height, "Current")

        size = os.path.getsize(output_path)
        print(f'UNICLI_JSON:{{"output":"{output_path}","width":{width},"height":{height},"file_size":{size}}}')
        FreeCAD.closeDocument(doc.Name)

  - exec:
      command: freecadcmd
      args: ["${{ temp.render_py }}"]
      parse: text
      timeout: 120000

columns: [output, width, height, file_size]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
