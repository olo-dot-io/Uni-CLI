# Desktop adapter — convert between 3D file formats using FreeCAD
site: freecad
name: convert
description: Convert 3D file between formats (STEP, IGES, STL, OBJ, DXF, BREP)
type: desktop
binary: freecadcmd
detect: which freecadcmd || which FreeCADCmd || which freecad
timeout: 120000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to input 3D file
  output:
    type: str
    required: true
    description: Output file path (format inferred from extension)
    x-unicli-kind: path

pipeline:
  - write_temp:
      filename: convert.py
      content: |
        import sys, os, json
        import FreeCAD
        import Part
        import Mesh

        input_path = "${{ args.input }}"
        output_path = "${{ args.output }}"
        ext = os.path.splitext(output_path)[1].lower()

        os.makedirs(os.path.dirname(os.path.abspath(output_path)) or ".", exist_ok=True)
        doc = FreeCAD.openDocument(input_path)
        FreeCAD.setActiveDocument(doc.Name)

        shapes = [obj for obj in doc.Objects if hasattr(obj, "Shape")]
        if not shapes:
            print('UNICLI_JSON:{"error":"No exportable shapes found"}')
            sys.exit(1)

        if ext in (".stl", ".obj"):
            meshes = Mesh.Mesh()
            for obj in shapes:
                mesh = Mesh.Mesh()
                mesh.addFacets(obj.Shape.tessellate(0.1)[0:2])
                meshes.addMesh(mesh)
            meshes.write(output_path)
        else:
            Part.export(shapes, output_path)

        size = os.path.getsize(output_path)
        print(f'UNICLI_JSON:{{"output":"{output_path}","objects":{len(shapes)},"file_size":{size}}}')
        FreeCAD.closeDocument(doc.Name)

  - exec:
      command: freecadcmd
      args: ["${{ temp.convert_py }}"]
      parse: text
      timeout: 120000

columns: [output, objects, file_size]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
