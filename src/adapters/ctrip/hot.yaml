site: ctrip
name: hot
description: Ctrip popular travel destinations
domain: m.ctrip.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: https://m.ctrip.com/restapi/h5api/searchapp/search
      params:
        action: hotcity

  - select: data

  - map:
      rank: ${{ index + 1 }}
      name: "${{ item.word || item.name || '' }}"
      type: "${{ item.type || '' }}"

  - limit: ${{ args.limit }}

columns: [rank, name, type]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
