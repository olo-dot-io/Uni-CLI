site: douyu
name: search
description: Search Douyu live streams
domain: www.douyu.com
strategy: intercept
browser: true

args:
  query:
    type: str
    required: true
    positional: true
    description: Search keyword
  limit:
    type: int
    default: 20
    description: Number of results

columns: [rank, title, streamer, category, viewers, url]

pipeline:
  - navigate:
      url: https://www.douyu.com/search/?kw=${{ args.query | urlencode }}
      settleMs: 3000

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};
        const clean = v => (v || '').replace(/\s+/g, ' ').trim();
        const cards = document.querySelectorAll('[class*="SearchResult"] li, [class*="layout-Cover"], [class*="DyListCover"]');
        return Array.from(cards).slice(0, limit).map((card, i) => {
          const link = card.querySelector('a[href*="/"]') || card.closest('a');
          const title = clean(card.querySelector('[class*="title"], h3, [class*="roomName"]')?.textContent);
          const streamer = clean(card.querySelector('[class*="name"], [class*="anchor"], [class*="nickName"]')?.textContent);
          const category = clean(card.querySelector('[class*="tag"], [class*="category"], [class*="game"]')?.textContent);
          const viewers = clean(card.querySelector('[class*="hot"], [class*="viewer"], [class*="online"]')?.textContent);
          return {
            rank: i + 1, title, streamer, category, viewers,
            url: link?.href || '',
          };
        }).filter(r => r.title || r.streamer);
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
