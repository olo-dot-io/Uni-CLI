site: douyu
name: hot
description: Douyu trending live streams
domain: www.douyu.com
type: web-api
strategy: public
browser: false

args:
  limit:
    type: int
    default: 20
    description: Number of streams

pipeline:
  - fetch:
      url: https://www.douyu.com/japi/weblist/apinc/allpage/6/1
      headers:
        Referer: https://www.douyu.com/

  - select: data.rl

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.rn || '' }}
      streamer: ${{ item.nn || '' }}
      category: ${{ item.c2name || '' }}
      viewers: ${{ item.ol || 0 }}
      room_id: ${{ item.rid || '' }}
      url: ${{ 'https://www.douyu.com/' + (item.rid || '') }}

  - limit: ${{ args.limit }}

columns: [rank, title, streamer, category, viewers, room_id, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
