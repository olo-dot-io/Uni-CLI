# Desktop adapter — converts a MuseScore file with optional silence trimming via mscore CLI
site: musescore
name: convert
description: Convert a MuseScore file to another format with explicit trim control
type: desktop
binary: mscore
detect: which mscore

args:
  file:
    type: str
    required: true
    positional: true
    description: Path to source .mscz or .mscx file
  output:
    type: str
    required: true
    description: Output file path (format inferred from extension)
  trim:
    type: int
    default: 0
    description: Trim leading silence in milliseconds

execArgs:
  - ${{ args.file }}
  - -o
  - ${{ args.output }}
  - -T
  - ${{ args.trim }}

pipeline:
  - exec:
      command: mscore
      args: ${{ execArgs }}
      parse: text

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
