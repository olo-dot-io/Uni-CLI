# Desktop adapter — transpose a MuseScore score
site: musescore
name: transpose
description: Transpose a score by semitones and export
type: desktop
binary: musescore4
detect: which musescore4 || which mscore || which musescore
timeout: 120000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to MuseScore file
  output:
    type: str
    required: true
    description: Output file path
  semitones:
    type: int
    required: true
    description: Number of semitones to transpose (positive=up, negative=down)

pipeline:
  - exec:
      command: musescore4
      args: ["${{ args.input }}", "--score-transpose", "${{ args.semitones }}", "-o", "${{ args.output }}"]
      parse: text
      timeout: 120000

columns: [result]
