# Desktop adapter — renders a Blender scene via headless CLI
site: blender
name: render
description: Render a Blender scene to image
type: desktop
binary: blender
detect: which blender

args:
  file:
    type: str
    required: true
    positional: true
    description: Path to .blend file
  output:
    type: str
    default: //output.png
    description: Output path (// = relative to .blend file)
  frame:
    type: int
    default: 1
    description: Frame number to render
  engine:
    type: str
    default: CYCLES
    choices: [CYCLES, EEVEE, WORKBENCH]
    description: Render engine

execArgs:
  - --background
  - ${{ args.file }}
  - --engine
  - ${{ args.engine }}
  - --render-output
  - ${{ args.output }}
  - --render-frame
  - ${{ args.frame }}

pipeline:
  - exec:
      command: blender
      args: ${{ execArgs }}
      parse: text

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
