# Desktop adapter — list all materials in a Blender file
site: blender
name: materials
description: List all materials and their properties from a Blender file
type: desktop
binary: blender
detect: which blender

args:
  file:
    type: str
    required: true
    positional: true
    description: Path to .blend file

pipeline:
  - exec:
      command: blender
      args:
        - -b
        - ${{ args.file }}
        - --python-expr
        - |
          import bpy, json
          materials = []
          for mat in bpy.data.materials:
              entry = {"name": mat.name, "users": mat.users, "use_nodes": mat.use_nodes}
              if mat.use_nodes and mat.node_tree:
                  entry["nodes"] = len(mat.node_tree.nodes)
              if hasattr(mat, "diffuse_color"):
                  c = mat.diffuse_color
                  entry["color"] = [round(c[0], 3), round(c[1], 3), round(c[2], 3), round(c[3], 3)]
              materials.append(entry)
          print("UNICLI_JSON:" + json.dumps({"materials": materials, "count": len(materials)}))
      parse: text

columns: [materials, count]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
