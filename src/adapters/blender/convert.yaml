# Desktop adapter — converts a Blender scene to another 3D format via headless Python
site: blender
name: convert
description: Convert a .blend file to another 3D format (fbx, obj, stl, gltf, blend)
type: desktop
binary: blender
detect: which blender
timeout: 120000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to source .blend file
  output:
    type: str
    required: true
    description: Output file path
  format:
    type: str
    default: fbx
    choices: [fbx, obj, stl, gltf, blend]
    description: Export format

execArgs:
  - -b
  - ${{ args.input }}
  - --python-expr
  - "import bpy;fmt='${{ args.format }}';o='${{ args.output }}';{'fbx':lambda:bpy.ops.export_scene.fbx(filepath=o),'obj':lambda:bpy.ops.export_scene.obj(filepath=o),'stl':lambda:bpy.ops.export_mesh.stl(filepath=o),'gltf':lambda:bpy.ops.export_scene.gltf(filepath=o),'blend':lambda:bpy.ops.wm.save_as_mainfile(filepath=o)}[fmt]()"

pipeline:
  - exec:
      command: blender
      args: ${{ execArgs }}
      parse: text

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
