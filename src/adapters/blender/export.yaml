# Desktop adapter — export selected objects from a Blender scene
site: blender
name: export
description: Export all objects from a Blender file to a specified format
type: desktop
binary: blender
detect: which blender
timeout: 120000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to .blend file
  output:
    type: str
    required: true
    description: Output file path
  format:
    type: str
    default: fbx
    choices: [fbx, obj, stl, gltf, glb, abc, usd]
    description: Export format

pipeline:
  - exec:
      command: blender
      args:
        - -b
        - ${{ args.input }}
        - --python-expr
        - |
          import bpy, json, os
          fmt = "${{ args.format }}"
          out = "${{ args.output }}"
          os.makedirs(os.path.dirname(os.path.abspath(out)) or ".", exist_ok=True)
          bpy.ops.object.select_all(action='SELECT')
          exporters = {
              "fbx": lambda: bpy.ops.export_scene.fbx(filepath=out, use_selection=True),
              "obj": lambda: bpy.ops.wm.obj_export(filepath=out, export_selected_objects=True),
              "stl": lambda: bpy.ops.export_mesh.stl(filepath=out, use_selection=True),
              "gltf": lambda: bpy.ops.export_scene.gltf(filepath=out, use_selection=True, export_format="GLTF_SEPARATE"),
              "glb": lambda: bpy.ops.export_scene.gltf(filepath=out, use_selection=True, export_format="GLB"),
              "abc": lambda: bpy.ops.wm.alembic_export(filepath=out, selected=True),
              "usd": lambda: bpy.ops.wm.usd_export(filepath=out, selected_objects_only=True),
          }
          exporters[fmt]()
          size = os.path.getsize(out)
          print("UNICLI_JSON:" + json.dumps({"output": out, "format": fmt, "file_size": size}))
      parse: text
      timeout: 120000

columns: [output, format, file_size]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
