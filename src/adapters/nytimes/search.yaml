site: nytimes
name: search
description: Search NYTimes articles
domain: api.nytimes.com
type: web-api
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
  limit:
    type: int
    default: 10

pipeline:
  - fetch:
      url: https://api.nytimes.com/svc/search/v2/articlesearch.json
      params:
        q: "${{ args.query }}"
        api-key: "${{ env.NYTIMES_API_KEY || '' }}"

  - select: response.docs

  - map:
      headline: "${{ item.headline ? item.headline.main : '' }}"
      section: ${{ item.section_name }}
      date: ${{ item.pub_date }}
      url: ${{ item.web_url }}
      snippet: "${{ (item.snippet || '') | truncate(120) }}"

  - limit: ${{ args.limit }}

columns: [headline, section, date, snippet]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
