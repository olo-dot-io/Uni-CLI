site: macos
name: wifi-info
description: Get current WiFi connection info
type: desktop
binary: networksetup
detect: which networksetup

pipeline:
  - exec:
      command: networksetup
      args: ["-getairportnetwork", "en0"]
      parse: text

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
