site: macos
name: sleep
description: Put macOS to sleep
type: desktop
binary: pmset
detect: which pmset

pipeline:
  - exec:
      command: pmset
      args: ["sleepnow"]
      parse: text

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
