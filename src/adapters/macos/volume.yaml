# Desktop adapter — get macOS system volume settings via JXA
site: macos
name: volume
description: Get system volume settings (output, input, alert levels and mute status)
type: desktop
binary: osascript
detect: "test $(uname) = Darwin"

pipeline:
  - exec:
      command: osascript
      args:
        - "-l"
        - "JavaScript"
        - "-e"
        - "var app = Application.currentApplication(); app.includeStandardAdditions = true; JSON.stringify(app.getVolumeSettings())"
      parse: json

columns: [outputVolume, inputVolume, alertVolume, outputMuted]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
