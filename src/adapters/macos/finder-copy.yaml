site: macos
name: finder-copy
description: Copy a file or folder to a destination path
type: desktop
binary: osascript
detect: "test $(uname) = Darwin"

args:
  source:
    type: str
    required: true
    positional: true
    description: Source file or folder path
  destination:
    type: str
    required: true
    positional: true
    description: Destination path

pipeline:
  - exec:
      command: osascript
      args:
        - "-l"
        - "JavaScript"
        - "-e"
        - |
          const fm = $.NSFileManager.defaultManager;
          const src = ${{ args.source | json }};
          const dst = ${{ args.destination | json }};
          const err = Ref();
          const ok = fm.copyItemAtPathToPathError(src, dst, err);
          if (!ok) {
            const msg = err[0] ? ObjC.unwrap(err[0].localizedDescription) : 'unknown error';
            throw new Error(msg);
          }
          JSON.stringify([{ copied: src, to: dst, status: 'ok' }]);
      parse: json

columns: [copied, to, status]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
