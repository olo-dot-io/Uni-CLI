# Desktop adapter — lock macOS screen via pmset
site: macos
name: lock-screen
description: Lock the screen (put display to sleep)
type: desktop
binary: pmset
detect: "test $(uname) = Darwin"

pipeline:
  - exec:
      command: pmset
      args: ["displaysleepnow"]
      parse: text
      timeout: 5000

columns: []

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
