site: macos
name: processes
description: List top processes by CPU usage
type: desktop
binary: ps
detect: "test $(uname) = Darwin"

pipeline:
  - exec:
      command: sh
      args: ["-c", "ps -axo pid,pcpu,pmem,comm | sort -k2 -nr | head -20"]
      parse: text

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
