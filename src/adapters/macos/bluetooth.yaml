site: macos
name: bluetooth
description: Check macOS Bluetooth status
type: desktop
binary: system_profiler
detect: which system_profiler

pipeline:
  - exec:
      command: system_profiler
      args: ["SPBluetoothDataType", "-json"]
      parse: json

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
