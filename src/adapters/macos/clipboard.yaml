# Desktop adapter — get macOS clipboard contents via JXA
site: macos
name: clipboard
description: Get current clipboard text contents
type: desktop
binary: osascript
detect: "test $(uname) = Darwin"

pipeline:
  - exec:
      command: osascript
      args:
        - "-l"
        - "JavaScript"
        - "-e"
        - |
          var app = Application.currentApplication();
          app.includeStandardAdditions = true;
          var clip = app.theClipboard();
          JSON.stringify([{content: typeof clip === 'string' ? clip : String(clip)}]);
      parse: json

columns: [content]
