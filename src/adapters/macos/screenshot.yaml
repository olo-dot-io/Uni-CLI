# Desktop adapter — take a macOS screenshot via screencapture
site: macos
name: screenshot
description: Take a screenshot and save to file or clipboard
type: desktop
binary: screencapture
detect: "test $(uname) = Darwin"

args:
  file:
    type: str
    default: "/tmp/screenshot.png"
    description: Output file path for the screenshot
    x-unicli-kind: path
  clipboard:
    type: bool
    default: false
    description: Copy screenshot to clipboard instead of saving to file

pipeline:
  - if: "args.clipboard"
    then:
      - exec:
          command: screencapture
          args: ["-x", "-c"]
          timeout: 10000
      - evaluate: "JSON.stringify([{output: 'clipboard', message: 'Screenshot copied to clipboard'}])"
    else:
      - exec:
          command: screencapture
          args: ["-x", "${{ args.file }}"]
          timeout: 10000
      - evaluate: "JSON.stringify([{output: '${{ args.file }}', message: 'Screenshot saved'}])"

columns: [output, message]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: []
minimum_capability: http.fetch
trust: user
confidentiality: public
quarantine: false
schema_version: v2
