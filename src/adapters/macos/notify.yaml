# Desktop adapter — send a macOS notification via JXA (injection-safe)
site: macos
name: notify
description: Send a macOS notification with title and optional subtitle
type: desktop
binary: osascript
detect: "test $(uname) = Darwin"

args:
  message:
    type: str
    required: true
    positional: true
    description: Notification message text
  title:
    type: str
    default: "Uni-CLI"
    description: Notification title
  subtitle:
    type: str
    default: ""
    description: Notification subtitle

pipeline:
  - exec:
      command: osascript
      args:
        - "-l"
        - "JavaScript"
        - "-e"
        - |
          var app = Application.currentApplication();
          app.includeStandardAdditions = true;
          var env = $.NSProcessInfo.processInfo.environment;
          var msg = ObjC.unwrap(env.objectForKey('UNICLI_NOTIFY_MSG')) || 'notification';
          var title = ObjC.unwrap(env.objectForKey('UNICLI_NOTIFY_TITLE')) || 'Uni-CLI';
          var sub = ObjC.unwrap(env.objectForKey('UNICLI_NOTIFY_SUB')) || '';
          app.displayNotification(msg, {withTitle: title, subtitle: sub});
          JSON.stringify([{sent: true, message: msg, title: title}]);
      env:
        UNICLI_NOTIFY_MSG: "${{ args.message }}"
        UNICLI_NOTIFY_TITLE: "${{ args.title }}"
        UNICLI_NOTIFY_SUB: "${{ args.subtitle }}"
      parse: json

columns: [sent, message, title]
