# Desktop adapter — get macOS dark mode status via JXA
site: macos
name: dark-mode
description: Get current dark mode status
type: desktop
binary: osascript
detect: "test $(uname) = Darwin"

pipeline:
  - exec:
      command: osascript
      args:
        - "-l"
        - "JavaScript"
        - "-e"
        - "JSON.stringify({darkMode: Application('System Events').appearancePreferences.darkMode()})"
      parse: json

columns: [darkMode]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
