# Desktop adapter — search Apple Photos via JXA (injection-safe)
site: macos
name: photos-search
description: Search Apple Photos library by keyword
type: desktop
binary: osascript
detect: "test $(uname) = Darwin"

args:
  query:
    type: str
    required: true
    positional: true
    description: Search keyword for photos

pipeline:
  - exec:
      command: osascript
      args:
        - "-l"
        - "JavaScript"
        - "-e"
        - |
          ObjC.import('Foundation');
          var env = $.NSProcessInfo.processInfo.environment;
          var q = ObjC.unwrap(env.objectForKey('UNICLI_QUERY')) || '';
          var photos = Application('Photos');
          var items = photos.search({for: q}).slice(0, 20);
          JSON.stringify(items.map(function(p) {
            return {
              name: p.name() || p.filename(),
              filename: p.filename(),
              date: p.date().toISOString(),
              width: p.width(),
              height: p.height(),
              favorite: p.favorite()
            };
          }));
      env:
        UNICLI_QUERY: "${{ args.query }}"
      parse: json
      timeout: 30000

columns: [name, filename, date, width, height, favorite]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
