site: macos
name: shortcuts-list
description: List all Shortcuts.app shortcuts
type: desktop
binary: shortcuts
detect: which shortcuts

pipeline:
  - exec:
      command: shortcuts
      args: ["list"]
      parse: lines

columns: [name]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
