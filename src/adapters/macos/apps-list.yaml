site: macos
name: apps-list
description: List installed macOS applications
type: desktop
binary: ls
detect: which ls

pipeline:
  - exec:
      command: ls
      args: ["/Applications"]
      parse: lines

columns: [name]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
