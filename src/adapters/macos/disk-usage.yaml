site: macos
name: disk-usage
description: Get disk usage summary
type: desktop
binary: df
detect: which df

pipeline:
  - exec:
      command: df
      args: ["-h"]
      parse: text

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
