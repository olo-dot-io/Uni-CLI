site: jq
name: query
description: Query JSON data using a jq filter expression
type: bridge
strategy: public
binary: jq
detect: which jq

pipeline:
  - exec:
      command: jq
      args:
        - ${{ args.filter }}
      stdin: ${{ args.input }}
      parse: json
      timeout: 30000

args:
  filter:
    type: str
    required: true
    positional: true
    description: jq filter expression (e.g. .items[].name)
  input:
    type: str
    required: true
    description: JSON string to process
