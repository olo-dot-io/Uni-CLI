site: jq
name: format
description: Pretty-print and format JSON data
type: bridge
strategy: public
binary: jq
detect: which jq

pipeline:
  - exec:
      command: jq
      args:
        - "."
      stdin: ${{ args.input }}
      parse: text
      timeout: 30000

args:
  input:
    type: str
    required: true
    positional: true
    description: JSON string to format

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
