# Desktop adapter — exports a Draw.io diagram to an image or document format
site: drawio
name: export
description: Export a Draw.io diagram to png, jpg, svg, pdf, or vsdx
type: desktop
binary: drawio
detect: which drawio
timeout: 30000

args:
  file:
    type: str
    required: true
    positional: true
    description: Path to .drawio or .xml diagram file
  output:
    type: str
    required: true
    description: Output file path
  format:
    type: str
    default: png
    choices: [png, jpg, svg, pdf, vsdx]
    description: Export format

execArgs:
  - --export
  - --format
  - ${{ args.format }}
  - --output
  - ${{ args.output }}
  - ${{ args.file }}

pipeline:
  - exec:
      command: drawio
      args: ${{ execArgs }}
      parse: text

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
