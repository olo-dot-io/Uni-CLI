site: hf
name: models
description: Search HuggingFace models
type: bridge
strategy: public
binary: huggingface-cli
detect: which huggingface-cli
autoInstall: pip install huggingface_hub[cli]

args:
  query:
    type: str
    required: true
    positional: true
    description: Search query for models

pipeline:
  - exec:
      command: huggingface-cli
      args:
        - search
        - ${{ args.query }}
        - --json
      parse: json
      timeout: 30000

columns: [modelId, author, downloads, likes]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
