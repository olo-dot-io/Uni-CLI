# Desktop adapter — concatenate multiple media files using a list file
site: ffmpeg
name: concat
description: Concatenate multiple media files listed in a text file
type: desktop
binary: ffmpeg
detect: which ffmpeg
strategy: public

args:
  listfile:
    type: str
    required: true
    positional: true
    description: "Text file listing inputs, one per line: file 'path/to/clip.mp4'"
  output:
    type: str
    required: true
    description: Output file path
    x-unicli-kind: path

pipeline:
  - exec:
      command: ffmpeg
      args:
        - "-f"
        - "concat"
        - "-safe"
        - "0"
        - "-i"
        - "${{ args.listfile }}"
        - "-c"
        - "copy"
        - "-y"
        - "${{ args.output }}"
      parse: text
      timeout: 300000

columns: []

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
