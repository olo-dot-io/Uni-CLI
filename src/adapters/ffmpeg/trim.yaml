# Desktop adapter — trim a media file to a time range
site: ffmpeg
name: trim
description: Trim media to a time range using stream copy (lossless)
type: desktop
binary: ffmpeg
detect: which ffmpeg
strategy: public

args:
  file:
    type: str
    required: true
    positional: true
    description: Input media file path
  start:
    type: str
    required: true
    description: Start time (e.g. 00:00:30 or 30)
  end:
    type: str
    required: true
    description: End time (e.g. 00:01:00 or 60)
  output:
    type: str
    required: true
    description: Output file path

pipeline:
  - exec:
      command: ffmpeg
      args:
        - "-i"
        - "${{ args.file }}"
        - "-ss"
        - "${{ args.start }}"
        - "-to"
        - "${{ args.end }}"
        - "-c"
        - "copy"
        - "-y"
        - "${{ args.output }}"
      parse: text
      timeout: 120000

columns: []
