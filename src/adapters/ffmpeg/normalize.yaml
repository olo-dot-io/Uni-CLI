# Desktop adapter — normalize audio loudness with EBU R128
site: ffmpeg
name: normalize
description: Normalize audio loudness to EBU R128 standard
type: desktop
binary: ffmpeg
detect: which ffmpeg
strategy: public

args:
  file:
    type: str
    required: true
    positional: true
    description: Input media file path
  output:
    type: str
    required: true
    description: Output file path

pipeline:
  - exec:
      command: ffmpeg
      args:
        - "-i"
        - "${{ args.file }}"
        - "-af"
        - "loudnorm"
        - "-y"
        - "${{ args.output }}"
      parse: text
      timeout: 300000

columns: []

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
