# Desktop adapter — wrapping ffmpeg for media conversion
site: ffmpeg
name: convert
description: Convert media files using ffmpeg
type: desktop
binary: ffmpeg
detect: which ffmpeg

args:
  input:
    type: str
    required: true
    positional: true
    description: Input file path
  output:
    type: str
    required: true
    positional: true
    description: Output file path
  codec:
    type: str
    description: Video codec (e.g., libx264, libx265, copy)
  crf:
    type: int
    default: 23
    description: Constant rate factor (quality, lower=better)

execArgs:
  - -i
  - ${{ args.input }}
  - -crf
  - ${{ args.crf }}
  - ${{ args.output }}

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: []
minimum_capability: http.fetch
trust: user
confidentiality: public
quarantine: false
