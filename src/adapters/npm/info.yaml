site: npm
name: info
description: Get npm package details
type: web-api
domain: registry.npmjs.org
strategy: public

args:
  package:
    required: true
    positional: true
    description: Package name (e.g. "express", "react")

pipeline:
  - fetch:
      url: "https://registry.npmjs.org/${{ args.package }}"

  - map:
      name: ${{ item.name }}
      version: "${{ item['dist-tags']?.latest || '' }}"
      description: ${{ item.description }}
      license: ${{ item.license }}
      homepage: ${{ item.homepage }}

columns: [name, version, description, license, homepage]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
