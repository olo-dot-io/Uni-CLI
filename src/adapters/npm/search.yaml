site: npm
name: search
description: Search npm packages
type: web-api
domain: registry.npmjs.org
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
    description: Search query
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: "https://registry.npmjs.org/-/v1/search"
      params:
        text: "${{ args.query }}"
        size: "${{ args.limit }}"

  - select: objects

  - map:
      name: ${{ item.package.name }}
      version: ${{ item.package.version }}
      description: "${{ (item.package.description || '') | truncate(80) }}"
      score: ${{ Math.round((item.score?.final || 0) * 100) }}

  - limit: ${{ args.limit }}

columns: [name, version, description, score]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
