site: npm
name: downloads
description: Get npm package download stats
type: web-api
domain: api.npmjs.org
strategy: public

args:
  package:
    required: true
    positional: true
    description: Package name
  period:
    type: str
    default: last-week
    choices: [last-day, last-week, last-month, last-year]

pipeline:
  - fetch:
      url: "https://api.npmjs.org/downloads/point/${{ args.period }}/${{ args.package }}"

  - map:
      package: ${{ item.package }}
      downloads: ${{ item.downloads }}
      start: ${{ item.start }}
      end: ${{ item.end }}

columns: [package, downloads, start, end]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
