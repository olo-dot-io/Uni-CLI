site: boss
name: invite
description: Invite a candidate to interview on BOSS Zhipin
domain: www.zhipin.com
strategy: intercept
browser: true

args:
  uid:
    type: str
    required: true
    positional: true
    description: Encrypted user ID

columns: [status, message]

pipeline:
  - navigate:
      url: https://www.zhipin.com/web/chat/index
      settleMs: 3000

  - evaluate: |
      (async () => {
        const uid = ${{ args.uid | json }};
        const res = await fetch('https://www.zhipin.com/wapi/zprelation/friend/invite.json', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded', Accept: 'application/json' },
          body: 'uid=' + encodeURIComponent(uid),
        });
        const data = await res.json();
        if (data.code !== 0) throw new Error(data.message || 'Invite failed');
        return [{ status: 'success', message: 'Interview invite sent to ' + uid }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
