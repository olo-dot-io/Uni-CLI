site: boss
name: mark
description: Mark/tag a candidate on BOSS Zhipin
domain: www.zhipin.com
strategy: intercept
browser: true

args:
  uid:
    type: str
    required: true
    positional: true
    description: Encrypted user ID
  label:
    type: str
    required: true
    positional: true
    description: "Label/tag text (e.g. 'interested', 'rejected')"

columns: [status, message]

pipeline:
  - navigate:
      url: https://www.zhipin.com/web/chat/index
      settleMs: 3000

  - evaluate: |
      (async () => {
        const uid = ${{ args.uid | json }};
        const label = ${{ args.label | json }};
        const res = await fetch('https://www.zhipin.com/wapi/zprelation/friend/mark.json', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded', Accept: 'application/json' },
          body: 'uid=' + encodeURIComponent(uid) + '&remark=' + encodeURIComponent(label),
        });
        const data = await res.json();
        if (data.code !== 0) throw new Error(data.message || 'Mark failed');
        return [{ status: 'success', message: 'Marked ' + uid + ' as ' + label }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
