site: coupang
name: hot
description: Coupang trending/popular products
domain: www.coupang.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: https://www.coupang.com/np/goldbox
      headers:
        Accept: application/json

  - select: data.products

  - map:
      rank: ${{ index + 1 }}
      title: "${{ (item.name || item.title || '') | truncate(80) }}"
      price: "${{ item.price || item.salePrice || '' }}"
      discount: "${{ item.discountRate || '' }}"

  - limit: ${{ args.limit }}

columns: [rank, title, price, discount]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
