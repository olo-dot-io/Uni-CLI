site: coupang
name: search
description: Search Coupang products
domain: www.coupang.com
strategy: intercept
browser: true

args:
  query:
    type: str
    required: true
    positional: true
    description: Search query
  limit:
    type: int
    default: 20
    description: Number of results

columns: [rank, title, price, rating, reviews, url]

pipeline:
  - navigate:
      url: https://www.coupang.com/np/search?component=&q=${{ args.query | urlencode }}
      settleMs: 4000

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};
        const clean = v => (v || '').replace(/\s+/g, ' ').trim();
        const items = document.querySelectorAll('.search-product, li.search-product');
        return Array.from(items).slice(0, limit).map((el, i) => {
          const link = el.querySelector('a[href*="/products/"]');
          const title = clean(el.querySelector('.name, .descriptions-inner .name')?.textContent);
          const price = clean(el.querySelector('.price-value, .price em')?.textContent);
          const rating = clean(el.querySelector('.rating')?.textContent);
          const reviews = clean(el.querySelector('.rating-total-count')?.textContent).replace(/[()]/g, '');
          return {
            rank: i + 1, title, price, rating, reviews,
            url: link ? 'https://www.coupang.com' + link.getAttribute('href') : '',
          };
        }).filter(r => r.title);
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
