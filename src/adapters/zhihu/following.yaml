site: zhihu
name: following
description: List users followed by a Zhihu user
domain: www.zhihu.com
type: web-api
strategy: cookie
auth_cookies: [z_c0]

args:
  id:
    required: true
    positional: true
    description: User URL token
  limit:
    type: int
    default: 20
    description: Number of followees

pipeline:
  - fetch:
      url: https://www.zhihu.com/api/v4/members/${{ args.id }}/followees
      params:
        limit: "${{ args.limit }}"
        offset: "0"

  - select: data

  - map:
      rank: ${{ index + 1 }}
      name: ${{ item.name || '' }}
      headline: ${{ (item.headline || '') | slice(0, 80) }}
      followers: ${{ item.follower_count || 0 }}
      answer_count: ${{ item.answer_count || 0 }}

  - limit: ${{ args.limit }}

columns: [rank, name, headline, followers, answer_count]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
