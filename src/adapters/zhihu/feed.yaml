site: zhihu
name: feed
description: Zhihu recommended feed
domain: www.zhihu.com
type: web-api
strategy: cookie
auth_cookies: [z_c0]

args:
  limit:
    type: int
    default: 20
    description: Number of items

pipeline:
  - fetch:
      url: https://www.zhihu.com/api/v3/feed/topstory/recommend
      params:
        limit: "${{ args.limit }}"

  - select: data

  - map:
      type: ${{ item.target?.type || '' }}
      title: ${{ item.target?.question?.title || item.target?.title || '' }}
      author: ${{ item.target?.author?.name || '' }}
      excerpt: ${{ (item.target?.excerpt || '') | slice(0, 100) }}
      voteup: ${{ item.target?.voteup_count || 0 }}

  - limit: ${{ args.limit }}

columns: [type, title, author, excerpt, voteup]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
