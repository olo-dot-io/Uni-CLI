site: zhihu
name: answers
description: List answers by a Zhihu user
domain: www.zhihu.com
type: web-api
strategy: cookie
auth_cookies: [z_c0]

args:
  id:
    required: true
    positional: true
    description: User URL token
  limit:
    type: int
    default: 20
    description: Number of answers

pipeline:
  - fetch:
      url: https://www.zhihu.com/api/v4/members/${{ args.id }}/answers
      params:
        limit: "${{ args.limit }}"
        offset: "0"
        sort_by: voteups

  - select: data

  - map:
      rank: ${{ index + 1 }}
      question: ${{ item.question?.title || '' }}
      excerpt: ${{ (item.excerpt || '') | strip_html | slice(0, 150) }}
      voteup: ${{ item.voteup_count || 0 }}
      comments: ${{ item.comment_count || 0 }}

  - limit: ${{ args.limit }}

columns: [rank, question, excerpt, voteup, comments]
