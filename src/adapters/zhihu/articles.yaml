site: zhihu
name: articles
description: List articles by a Zhihu user
domain: www.zhihu.com
type: web-api
strategy: cookie
auth_cookies: [z_c0]

args:
  id:
    required: true
    positional: true
    description: User URL token
  limit:
    type: int
    default: 20
    description: Number of articles

pipeline:
  - fetch:
      url: https://www.zhihu.com/api/v4/members/${{ args.id }}/articles
      params:
        limit: "${{ args.limit }}"
        offset: "0"
        sort_by: voteups

  - select: data

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title || '' }}
      excerpt: ${{ (item.excerpt || '') | strip_html | slice(0, 150) }}
      voteup: ${{ item.voteup_count || 0 }}
      comments: ${{ item.comment_count || 0 }}

  - limit: ${{ args.limit }}

columns: [rank, title, excerpt, voteup, comments]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
