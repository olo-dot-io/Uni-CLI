site: pexels
name: curated
description: Get Pexels curated photos
type: web-api
domain: api.pexels.com
strategy: public

args:
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: https://api.pexels.com/v1/curated
      params:
        per_page: "${{ args.limit }}"
      headers:
        Authorization: "${{ env.PEXELS_API_KEY || '' }}"

  - select: photos

  - map:
      id: ${{ item.id }}
      photographer: ${{ item.photographer }}
      alt: "${{ (item.alt || '') | truncate(80) }}"
      url: "${{ item.src ? item.src.large : '' }}"

  - limit: ${{ args.limit }}

columns: [id, photographer, alt, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
