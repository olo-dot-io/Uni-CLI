# Desktop adapter — export a Krita file to image format
site: krita
name: export
description: Export a .kra file to PNG, JPEG, or other image format
type: desktop
binary: krita
detect: which krita
timeout: 60000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to .kra file
  output:
    type: str
    required: true
    description: Output file path (format inferred from extension)

pipeline:
  - exec:
      command: krita
      args:
        [
          "--export",
          "--export-filename",
          "${{ args.output }}",
          "${{ args.input }}",
        ]
      parse: text
      timeout: 60000

columns: [result]
