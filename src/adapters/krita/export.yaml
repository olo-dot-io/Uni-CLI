# Desktop adapter — export a Krita file to image format
site: krita
name: export
description: Export a .kra file to PNG, JPEG, or other image format
type: desktop
binary: krita
detect: which krita
timeout: 60000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to .kra file
  output:
    type: str
    required: true
    description: Output file path (format inferred from extension)
    x-unicli-kind: path

pipeline:
  - exec:
      command: krita
      args:
        [
          "--export",
          "--export-filename",
          "${{ args.output }}",
          "${{ args.input }}",
        ]
      parse: text
      timeout: 60000

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
