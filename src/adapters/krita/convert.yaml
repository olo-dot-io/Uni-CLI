# Desktop adapter — convert image between formats using Krita
site: krita
name: convert
description: Convert image between formats using Krita's headless mode
type: desktop
binary: krita
detect: which krita
timeout: 60000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to input image
  output:
    type: str
    required: true
    description: Output file path

pipeline:
  - exec:
      command: krita
      args:
        [
          "--export",
          "--export-filename",
          "${{ args.output }}",
          "${{ args.input }}",
        ]
      parse: text
      timeout: 60000

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
