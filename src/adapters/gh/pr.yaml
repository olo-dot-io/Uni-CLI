site: gh
name: pr
description: List GitHub pull requests for a repository
type: bridge
strategy: public
binary: gh
detect: which gh

pipeline:
  - exec:
      command: gh
      args:
        - pr
        - list
        - --repo
        - ${{ args.repo }}
        - --limit
        - ${{ args.limit }}
        - --json
        - number,title,state,author,createdAt,headRefName
        - --state
        - ${{ args.state }}
      parse: json
      timeout: 30000

args:
  repo:
    type: str
    required: true
    positional: true
    description: Repository in owner/name format
  state:
    type: str
    default: open
    choices: [open, closed, merged, all]
    description: Pull request state filter
  limit:
    type: int
    default: 20
    description: Maximum number of pull requests to return

columns: [number, title, state, author, createdAt, headRefName]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
