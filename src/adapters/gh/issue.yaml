site: gh
name: issue
description: List GitHub issues for a repository
type: bridge
strategy: public
binary: gh
detect: which gh

pipeline:
  - exec:
      command: gh
      args:
        - issue
        - list
        - --repo
        - ${{ args.repo }}
        - --limit
        - ${{ args.limit }}
        - --json
        - number,title,state,author,createdAt
        - --state
        - ${{ args.state }}
      parse: json
      timeout: 30000

args:
  repo:
    type: str
    required: true
    positional: true
    description: Repository in owner/name format
  state:
    type: str
    default: open
    choices: [open, closed, all]
    description: Issue state filter
  limit:
    type: int
    default: 20
    description: Maximum number of issues to return

columns: [number, title, state, author, createdAt]
