# NousResearch/hermes-agent sessions/search — query Hermes session FTS.
# Hermes stores session history in a SQLite database at ~/.hermes/sessions.db.
# This adapter shells out to sqlite3 with FTS5 MATCH for fast lookup.
site: hermes
name: sessions/search
description: Search Hermes session history via SQLite FTS5
type: desktop
strategy: public
binary: sqlite3
detect: test -f ~/.hermes/sessions.db

args:
  query:
    type: str
    required: true
    positional: true
    description: FTS5 query string
  limit:
    type: int
    default: 20
    description: Max rows

pipeline:
  - exec:
      command: bash
      args:
        - -c
        - |
          db="$HOME/.hermes/sessions.db"
          if [ ! -f "$db" ]; then
            echo "[]"
            exit 0
          fi
          # Try FTS5 table; fall back to LIKE if FTS table is missing.
          sqlite3 -json "$db" \
            "SELECT id, ts, snippet(sessions_fts, -1, '<b>', '</b>', '...', 16) AS snippet
             FROM sessions_fts WHERE sessions_fts MATCH '${{ args.query }}' LIMIT ${{ args.limit }};" \
            2>/dev/null \
          || sqlite3 -json "$db" \
            "SELECT id, ts, substr(content, 1, 200) AS snippet
             FROM sessions WHERE content LIKE '%${{ args.query }}%' LIMIT ${{ args.limit }};" \
            2>/dev/null \
          || echo "[]"
      parse: json

columns: [id, ts, snippet]
