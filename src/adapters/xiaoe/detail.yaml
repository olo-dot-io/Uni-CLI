site: xiaoe
name: detail
description: Get Xiaoe course details
domain: xiaoe-tech.com
strategy: intercept
browser: true

args:
  url:
    type: str
    required: true
    positional: true
    description: Course page URL
    format: uri

columns: [title, author, price, students, description, url]

pipeline:
  - navigate:
      url: ${{ args.url }}
      settleMs: 6000

  - evaluate: |
      (async () => {
        const clean = v => (v || '').replace(/\s+/g, ' ').trim();
        const title = clean(document.querySelector('.course-title, h1, .resource-name')?.textContent);
        const author = clean(document.querySelector('.author-name, .teacher-name')?.textContent);
        const price = clean(document.querySelector('.price, .course-price')?.textContent);
        const students = clean(document.querySelector('.study-count, .learn-count')?.textContent);
        const desc = clean(document.querySelector('.course-desc, .detail-intro')?.textContent).substring(0, 500);
        return [{ title, author, price, students, description: desc, url: location.href }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
