site: xiaoe
name: play-url
description: Get Xiaoe video/audio play URL
domain: xiaoe-tech.com
strategy: intercept
browser: true

args:
  url:
    type: str
    required: true
    positional: true
    description: Lesson page URL

columns: [title, type, play_url]

pipeline:
  - navigate:
      url: ${{ args.url }}
      settleMs: 8000

  - evaluate: |
      (async () => {
        const clean = v => (v || '').replace(/\s+/g, ' ').trim();
        const title = clean(document.querySelector('.course-title, .video-title, h1')?.textContent);
        const video = document.querySelector('video');
        const audio = document.querySelector('audio');
        if (video) {
          const src = video.src || video.querySelector('source')?.src || '';
          return [{ title, type: 'video', play_url: src }];
        }
        if (audio) {
          const src = audio.src || audio.querySelector('source')?.src || '';
          return [{ title, type: 'audio', play_url: src }];
        }
        const el = document.querySelector('#app');
        const vue = el?.__vue__;
        if (vue) {
          const data = vue.$data || {};
          const url = data.videoUrl || data.audioUrl || data.playUrl || '';
          if (url) return [{ title, type: 'media', play_url: url }];
        }
        return [{ title, type: 'unknown', play_url: 'No playable media found' }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
