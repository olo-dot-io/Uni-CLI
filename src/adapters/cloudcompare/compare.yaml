# Desktop adapter — compare two point clouds using CloudCompare
site: cloudcompare
name: compare
description: Compute cloud-to-cloud distance between two point clouds
type: desktop
binary: CloudCompare
detect: which CloudCompare || which cloudcompare
timeout: 300000

args:
  reference:
    type: str
    required: true
    positional: true
    description: Path to reference point cloud
  compared:
    type: str
    required: true
    description: Path to compared point cloud

pipeline:
  - exec:
      command: CloudCompare
      args:
        [
          "-SILENT",
          "-O",
          "${{ args.reference }}",
          "-O",
          "${{ args.compared }}",
          "-C2C_DIST",
        ]
      parse: text
      timeout: 300000

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
