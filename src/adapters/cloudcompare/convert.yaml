# Desktop adapter — convert point cloud between formats using CloudCompare
site: cloudcompare
name: convert
description: Convert point cloud file between formats (PLY, LAS, E57, PCD, XYZ)
type: desktop
binary: CloudCompare
detect: which CloudCompare || which cloudcompare
timeout: 120000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to input point cloud file
  format:
    type: str
    required: true
    choices: [PLY, LAS, E57, PCD, ASC, BIN]
    description: Output format

pipeline:
  - exec:
      command: CloudCompare
      args: ["-SILENT", "-O", "${{ args.input }}", "-C_EXPORT_FMT", "${{ args.format }}", "-SAVE_CLOUDS"]
      parse: text
      timeout: 120000

columns: [result]
