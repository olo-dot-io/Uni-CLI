site: google
name: news
description: Google News RSS feed for a search query
type: web-api
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
    description: News search query
  lang:
    type: str
    default: en
    description: "Language code (e.g. en, zh, ja)"
  limit:
    type: int
    default: 20
    description: Number of results

pipeline:
  - fetch_text:
      url: "https://news.google.com/rss/search"
      params:
        q: ${{ args.query }}
        hl: ${{ args.lang || 'en' }}

  - parse_rss: ~

  - map:
      title: ${{ item.title }}
      link: ${{ item.link }}
      date: ${{ item.pubDate }}

  - limit: ${{ args.limit }}

columns: [title, date]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
