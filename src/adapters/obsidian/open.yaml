# Desktop adapter — open a vault or note in Obsidian via URI scheme
site: obsidian
name: open
description: Open an Obsidian vault or specific note
type: desktop
binary: open
detect: Darwin
strategy: public

args:
  vault:
    type: str
    required: true
    description: Vault name to open
  file:
    type: str
    description: Optional file path within the vault

pipeline:
  - exec:
      command: open
      args:
        - "obsidian://open?vault=${{ args.vault }}&file=${{ args.file || '' }}"
      timeout: 5000

columns: [output]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
