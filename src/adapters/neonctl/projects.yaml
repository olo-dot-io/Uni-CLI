site: neonctl
name: projects
description: List Neon database projects
type: bridge
strategy: public
binary: neonctl
detect: which neonctl
autoInstall: npm install -g neonctl

pipeline:
  - exec:
      command: neonctl
      args:
        - projects
        - list
        - --output
        - json
      parse: json
      timeout: 30000

columns: [id, name, region_id, created_at]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
