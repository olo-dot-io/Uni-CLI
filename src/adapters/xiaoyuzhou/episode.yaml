site: xiaoyuzhou
name: episode
description: Get podcast episode details from Xiaoyuzhou
domain: www.xiaoyuzhoufm.com
type: web-api
strategy: public

args:
  eid:
    type: str
    required: true
    positional: true
    description: Episode ID

pipeline:
  - fetch:
      url: https://api.xiaoyuzhoufm.com/v1/episode/get
      method: POST
      body:
        eid: ${{ args.eid }}
      headers:
        User-Agent: "Mozilla/5.0 (compatible; Uni-CLI)"

  - select: data

  - map:
      title: ${{ item.title || '' }}
      podcast: ${{ item.podcast && item.podcast.title || '' }}
      duration: ${{ item.duration || 0 }}
      date: ${{ item.pubDate || '' }}
      description: ${{ (item.description || '') | strip_html | truncate(200) }}

columns: [title, podcast, duration, date, description]
