site: lesswrong
name: tags
description: List popular tags
domain: www.lesswrong.com
strategy: public

args:
  limit:
    type: int
    default: 20
    description: Number of results

columns: [rank, name, posts]

pipeline:
  - fetch:
      url: https://www.lesswrong.com/graphql
      method: POST
      headers:
        Content-Type: application/json
        Accept: application/json
      body:
        query: >
          query Tags {
            tags(input: {terms: {view: "coreTags", limit: ${{ args.limit }}}}) {
              results { _id name slug postCount }
            }
          }

  - select: data.tags.results

  - map:
      rank: "${{ index + 1 }}"
      name: "${{ item.name }}"
      posts: "${{ item.postCount || 0 }}"

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
