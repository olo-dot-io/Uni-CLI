site: sinablog
name: search
description: Search Sina Blog posts
domain: search.sina.com.cn
type: browser
strategy: public
browser: true

args:
  query:
    type: str
    required: true
    positional: true
    description: Search keywords
  page:
    type: int
    default: 1
    description: Page number
  limit:
    type: int
    default: 20
    description: Number of results

pipeline:
  - navigate:
      url: "https://search.sina.com.cn/blog/search/?q=${{ encodeURIComponent(args.query) }}&range=all&page=${{ args.page }}"

  - wait:
      selector: ".result-list"
      timeout: 8000

  - evaluate:
      expression: |
        Array.from(document.querySelectorAll('.result-list .result, .box-result')).map((el, i) => ({
          rank: i + 1,
          title: el.querySelector('h2 a, .title a')?.textContent?.trim() || '',
          author: el.querySelector('.source, .blog-name')?.textContent?.trim() || '',
          summary: el.querySelector('.content, .desc')?.textContent?.trim()?.slice(0, 200) || '',
          url: el.querySelector('h2 a, .title a')?.href || ''
        }))

  - limit: ${{ args.limit }}

columns: [rank, title, author, summary, url]
