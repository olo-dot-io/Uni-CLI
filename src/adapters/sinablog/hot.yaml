site: sinablog
name: hot
description: Sina Blog trending/popular posts
domain: blog.sina.com.cn
type: browser
strategy: public
browser: true

args:
  limit:
    type: int
    default: 20
    description: Number of posts

pipeline:
  - navigate:
      url: https://blog.sina.com.cn/s/blog_ranking.html

  - wait:
      selector: ".blog_rank_list"
      timeout: 8000

  - evaluate:
      expression: |
        Array.from(document.querySelectorAll('.blog_rank_list li, .rank_list li')).map((el, i) => ({
          rank: i + 1,
          title: el.querySelector('a')?.textContent?.trim() || '',
          author: el.querySelector('.blog_name, .name')?.textContent?.trim() || '',
          url: el.querySelector('a')?.href || ''
        }))

  - limit: ${{ args.limit }}

columns: [rank, title, author, url]
