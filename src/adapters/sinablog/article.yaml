site: sinablog
name: article
description: Read a Sina Blog article as Markdown
domain: blog.sina.com.cn
type: web-api
strategy: public

args:
  path:
    type: str
    required: true
    positional: true
    description: "Blog article path (e.g. s/blog_abc123.html)"
    x-unicli-kind: path

pipeline:
  - fetch_text:
      url: "https://blog.sina.com.cn/${{ args.path }}"
      headers:
        User-Agent: "Mozilla/5.0 (compatible; Uni-CLI)"

  - html_to_md: ~

  - map:
      path: "${{ args.path }}"
      content: "${{ item | truncate(3000) }}"
      url: "https://blog.sina.com.cn/${{ args.path }}"

columns: [path, content, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
