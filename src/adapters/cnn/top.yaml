site: cnn
name: top
description: CNN top stories via RSS
type: web-api
domain: rss.cnn.com
strategy: public
args:
  limit:
    required: false
    default: 20
pipeline:
  - fetch_text:
      url: "http://rss.cnn.com/rss/edition.rss"
  - parse_rss: ~
  - map:
      title: "${{ item.title }}"
      url: "${{ item.link }}"
      date: "${{ item.pubDate }}"
      description: "${{ item.contentSnippet }}"
  - limit: "${{ args.limit | default(20) }}"
columns: [title, url, date]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
