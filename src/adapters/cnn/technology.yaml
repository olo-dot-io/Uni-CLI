site: cnn
name: technology
description: CNN technology news
domain: edition.cnn.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20

pipeline:
  - fetch_text:
      url: http://rss.cnn.com/rss/edition_technology.rss

  - parse_rss:
      fields:
        title: title
        description: description
        link: link
        pubDate: pubDate

  - limit: "${{ args.limit }}"

columns: [title, description, pubDate]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
