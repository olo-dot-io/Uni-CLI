site: meituan
name: hot
description: Meituan hot search keywords
domain: apimobile.meituan.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: https://apimobile.meituan.com/group/v1/recommend/hotword/1

  - select: data.hotSearchWords

  - map:
      rank: ${{ index + 1 }}
      keyword: "${{ item.word || item }}"
      count: "${{ item.count || '' }}"

  - limit: ${{ args.limit }}

columns: [rank, keyword, count]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
