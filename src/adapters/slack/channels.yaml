site: slack
name: channels
description: List Slack channels
type: bridge
strategy: public
binary: slack
detect: which slack

pipeline:
  - exec:
      command: slack
      args:
        - channel
        - list
        - --json
      parse: json
      timeout: 30000

columns: [name, id, is_private, num_members]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
