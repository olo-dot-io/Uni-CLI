# @owner   src/adapters/_archived/ctrip/hot.yaml
# @does    Preserve the archived Ctrip hot-destination adapter outside active discovery.
# @needs   Historical m.ctrip.com hotcity endpoint
# @feeds   src/adapters/_archived/archive.json provenance, historical adapter review
# @breaks  Moving back under an active site would reintroduce an archive-only discovered site.
site: ctrip
name: hot
description: Ctrip popular travel destinations
domain: m.ctrip.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: https://m.ctrip.com/restapi/h5api/searchapp/search
      params:
        action: hotcity

  - select: data

  - map:
      rank: ${{ index + 1 }}
      name: "${{ item.word || item.name || '' }}"
      type: "${{ item.type || '' }}"

  - limit: ${{ args.limit }}

columns: [rank, name, type]

capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: true
quarantineReason: "m.ctrip.com/restapi/h5api/searchapp/search returns HTTP 502 (verified 2026-05-05); upstream re-architected, no obvious public hot-city replacement endpoint"
schema_version: v2
