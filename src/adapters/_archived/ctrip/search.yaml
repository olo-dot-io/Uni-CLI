# @owner   src/adapters/_archived/ctrip/search.yaml
# @does    Preserve the archived Ctrip flight-search adapter outside active discovery.
# @needs   Historical flights.ctrip.com batchSearch endpoint without CAPTCHA
# @feeds   src/adapters/_archived/archive.json provenance, historical adapter review
# @breaks  Moving back under an active site would reintroduce an archive-only discovered site.
site: ctrip
name: search
description: Search flights on Ctrip
type: web-api
strategy: public

pipeline:
  - fetch:
      url: "https://flights.ctrip.com/international/search/api/search/batchSearch"
      method: POST
      body:
        flightWay: OneWay
        classType: ALL
        hasChild: false
        hasBaby: false
        searchIndex: 1
        airportParams:
          - dcity: "${{ args.from }}"
            acity: "${{ args.to }}"
            date: "${{ args.date }}"
      headers:
        Content-Type: application/json
        Referer: "https://flights.ctrip.com"
      retry: 2
      backoff: 1000
  - select: data.flightItineraryList
  - map:
      airline: "${{ item.flightSegments ? item.flightSegments[0].airlineName : '' }}"
      flight: "${{ item.flightSegments ? item.flightSegments[0].flightNumber : '' }}"
      depart: "${{ item.flightSegments ? item.flightSegments[0].departureDateTime : '' }}"
      arrive: "${{ item.flightSegments ? item.flightSegments[0].arrivalDateTime : '' }}"
      price: "${{ item.priceList ? item.priceList[0].adultPrice : 'N/A' }}"
  - limit: ${{ args.limit }}

args:
  from:
    type: str
    required: true
    description: "Departure city code (e.g. SHA, PEK, HKG)"
  to:
    type: str
    required: true
    description: "Arrival city code"
  date:
    type: str
    required: true
    description: "Departure date (YYYY-MM-DD)"
    format: date-time
  limit:
    type: int
    default: 10

columns: [airline, flight, depart, arrive, price]

capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: true
quarantineReason: "flights.ctrip.com search endpoint now requires CAPTCHA (showAuthCode=true on every public hit, verified 2026-05-05) - needs cookie/UI strategy with anti-bot solve"
schema_version: v2
