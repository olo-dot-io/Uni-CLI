site: word
name: list
description: List open Microsoft Word documents
type: desktop
strategy: public
binary: osascript
detect: "test $(uname) = Darwin"

pipeline:
  - exec:
      command: osascript
      args:
        - "-e"
        - |
          on replace_text(theText, searchString, replacementString)
            set AppleScript's text item delimiters to searchString
            set parts to text items of (theText as text)
            set AppleScript's text item delimiters to replacementString
            set outText to parts as text
            set AppleScript's text item delimiters to ""
            return outText
          end replace_text

          on json_string(valueText)
            set s to valueText as text
            set s to my replace_text(s, "\\", "\\\\")
            set s to my replace_text(s, "\"", "\\\"")
            set s to my replace_text(s, return, "\\n")
            set s to my replace_text(s, linefeed, "\\n")
            set s to my replace_text(s, tab, "\\t")
            return "\"" & s & "\""
          end json_string

          on json_bool(valueBool)
            if valueBool then return "true"
            return "false"
          end json_bool

          if not application "Microsoft Word" is running then return "[]"

          tell application "System Events"
            tell process "Microsoft Word"
              set windowCount to count windows
              set outText to "["
              repeat with i from 1 to windowCount
                set docName to name of window i as text
                if i > 1 then set outText to outText & ","
                set outText to outText & "{\"index\":" & i & ",\"name\":" & my json_string(docName) & ",\"path\":\"\",\"saved\":" & my json_bool(false) & ",\"source\":\"window\"}"
              end repeat
            end tell
            return outText & "]"
          end tell
      parse: json
      timeout: 30000

columns: [index, name, path, saved, source]

capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: private
quarantine: false
schema_version: v2
