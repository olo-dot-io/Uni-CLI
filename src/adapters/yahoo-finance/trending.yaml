site: yahoo-finance
name: trending
description: Yahoo Finance trending tickers
domain: finance.yahoo.com
type: web-api
strategy: public

args:
  region:
    type: str
    default: US
    description: Market region (US, HK, etc.)
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: https://query1.finance.yahoo.com/v1/finance/trending/${{ args.region }}
      params:
        count: "${{ args.limit }}"

  - select: "finance.result[0].quotes"

  - map:
      symbol: ${{ item.symbol }}

  - limit: ${{ args.limit }}

columns: [symbol]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: true
quarantineReason: "HTTP 404 — upstream trending endpoint removed (2026-04-15)"
schema_version: v2
