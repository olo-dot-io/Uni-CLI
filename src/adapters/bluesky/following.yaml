site: bluesky
name: following
description: List accounts a Bluesky user is following
domain: public.api.bsky.app
type: web-api
strategy: public

args:
  handle:
    type: str
    required: true
    positional: true
    description: Bluesky handle
  limit:
    type: int
    default: 20
    description: Number of accounts

pipeline:
  - fetch:
      url: https://public.api.bsky.app/xrpc/app.bsky.graph.getFollows?actor=${{ args.handle }}&limit=${{ args.limit }}

  - select: follows

  - map:
      rank: ${{ index + 1 }}
      handle: ${{ item.handle }}
      name: ${{ item.displayName }}
      description: ${{ item.description }}

  - limit: ${{ args.limit }}

columns: [rank, handle, name, description]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
