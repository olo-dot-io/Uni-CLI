site: bluesky
name: search
description: Search Bluesky users
domain: public.api.bsky.app
type: web-api
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
    description: Search query
  limit:
    type: int
    default: 10
    description: Number of results

pipeline:
  - fetch:
      url: https://public.api.bsky.app/xrpc/app.bsky.actor.searchActors
      params:
        q: ${{ args.query }}
        limit: ${{ args.limit }}

  - select: actors

  - map:
      rank: ${{ index + 1 }}
      handle: ${{ item.handle }}
      name: ${{ item.displayName }}
      followers: ${{ item.followersCount }}
      description: ${{ item.description }}

  - limit: ${{ args.limit }}

columns: [rank, handle, name, followers, description]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
