# Desktop adapter — render a Kdenlive project using melt
site: kdenlive
name: render
description: Render a Kdenlive project to video file via melt
type: desktop
binary: melt
detect: which melt
timeout: 600000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to .kdenlive project file
  output:
    type: str
    required: true
    description: Output video file path
  format:
    type: str
    default: mp4
    choices: [mp4, webm, mkv, avi]
    description: Output video format

pipeline:
  - exec:
      command: melt
      args: ["${{ args.input }}", "-consumer", "avformat:${{ args.output }}", "acodec=aac", "vcodec=libx264"]
      parse: text
      timeout: 600000

columns: [result]
