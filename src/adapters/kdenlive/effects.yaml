# Desktop adapter — list available MLT effects for Kdenlive
site: kdenlive
name: effects
description: List available MLT video/audio effects
type: desktop
binary: melt
detect: which melt

pipeline:
  - exec:
      command: melt
      args: ["-query", "filters"]
      parse: text

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
