site: substack
name: feed
description: Substack publication post feed
domain: substack.com
type: web-api
strategy: public

args:
  publication:
    type: str
    required: true
    positional: true
    description: Publication subdomain name
  limit:
    type: int
    default: 10
    description: Number of posts

pipeline:
  - fetch:
      url: "https://${{ args.publication }}.substack.com/api/v1/posts"
      params:
        limit: "${{ args.limit }}"

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title || '' }}
      subtitle: ${{ (item.subtitle || '') | truncate(100) }}
      date: ${{ item.post_date || '' }}
      slug: ${{ item.slug || '' }}
      url: ${{ 'https://' + args.publication + '.substack.com/p/' + (item.slug || '') }}

  - limit: ${{ args.limit }}

columns: [rank, title, subtitle, date, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
