site: zsxq
name: search
description: Search topics within a Zsxq group
domain: api.zsxq.com
type: web-api
strategy: cookie
auth_cookies: [zsxq_access_token]

args:
  keyword:
    required: true
    positional: true
    description: Search keyword
  group_id:
    required: true
    description: Group ID to search in
    x-unicli-kind: id
  limit:
    type: int
    default: 20
    description: Number of results

pipeline:
  - fetch:
      url: https://api.zsxq.com/v2/search/groups/${{ args.group_id }}/topics
      params:
        keyword: "${{ args.keyword }}"
        count: "${{ args.limit }}"
      headers:
        Accept: application/json

  - select: resp_data.topics

  - map:
      author: ${{ item.talk?.owner?.name || item.question?.owner?.name || item.owner?.name || '' }}
      type: ${{ item.type || '' }}
      content: ${{ (item.talk?.text || item.question?.text || item.title || '') | truncate(120) }}
      likes: ${{ item.likes_count || 0 }}
      comments: ${{ item.comments_count || 0 }}
      created: ${{ item.create_time || '' }}

  - limit: ${{ args.limit }}

columns: [author, type, content, likes, comments, created]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
