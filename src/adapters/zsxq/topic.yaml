site: zsxq
name: topic
description: Get a single Zsxq topic detail
domain: api.zsxq.com
type: web-api
strategy: cookie
auth_cookies: [zsxq_access_token]

args:
  id:
    required: true
    positional: true
    description: Topic ID

pipeline:
  - fetch:
      url: https://api.zsxq.com/v2/topics/${{ args.id }}
      headers:
        Accept: application/json

  - select: resp_data.topic

  - map:
      topic_id: ${{ item.topic_id || '' }}
      type: ${{ item.type || '' }}
      author: ${{ item.talk?.owner?.name || item.question?.owner?.name || item.owner?.name || '' }}
      content: ${{ item.talk?.text || item.question?.text || item.title || '' }}
      likes: ${{ item.likes_count || 0 }}
      comments: ${{ item.comments_count || 0 }}
      created: ${{ item.create_time || '' }}

columns: [topic_id, type, author, content, likes, comments, created]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
