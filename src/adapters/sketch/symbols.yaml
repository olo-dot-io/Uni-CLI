# Desktop adapter — list symbols in a Sketch file
site: sketch
name: symbols
description: List all symbols in a .sketch file
type: desktop
binary: sketchtool
detect: which sketchtool

args:
  file:
    type: str
    required: true
    positional: true
    description: Path to .sketch file

pipeline:
  - exec:
      command: sketchtool
      args: ["list", "symbols", "${{ args.file }}"]
      parse: text

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
