# Desktop adapter — export artboards from a Sketch file
site: sketch
name: export
description: Export artboards from a .sketch file to PNG or PDF
type: desktop
binary: sketchtool
detect: which sketchtool
timeout: 120000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to .sketch file
  output:
    type: str
    required: true
    description: Output directory
    x-unicli-kind: path
  format:
    type: str
    default: png
    choices: [png, pdf, svg, jpg]
    description: Export format
  scales:
    type: str
    default: "1.0"
    description: Export scales (e.g. "1.0,2.0")

pipeline:
  - exec:
      command: sketchtool
      args:
        [
          "export",
          "artboards",
          "${{ args.input }}",
          "--output=${{ args.output }}",
          "--formats=${{ args.format }}",
          "--scales=${{ args.scales }}",
        ]
      parse: text
      timeout: 120000

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
