site: codex-cli
name: version
description: Check OpenAI Codex CLI version
type: bridge
strategy: public
binary: codex
detect: which codex
autoInstall: npm install -g @openai/codex

pipeline:
  - exec:
      command: codex
      args:
        - --version
      parse: text
      timeout: 10000

columns: [output]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
