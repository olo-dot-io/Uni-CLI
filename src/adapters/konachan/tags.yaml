site: konachan
name: tags
description: Search Konachan tags by Japanese name, romaji, or tag prefix
domain: konachan.com
type: web-api
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: "https://konachan.com/tag.json"
      params:
        name: "${{ args.query }}"
        limit: "${{ args.limit }}"

  - map:
      rank: "${{ index + 1 }}"
      id: "${{ item.id }}"
      name: "${{ item.name }}"
      count: "${{ item.count }}"
      type: "${{ item.type }}"
      ambiguous: "${{ item.ambiguous }}"
      url: "${{ 'https://konachan.com/post?tags=' + encodeURIComponent(item.name) }}"

columns: [rank, id, name, count, type, ambiguous, url]

capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
