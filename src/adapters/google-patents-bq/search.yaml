# Google Patents Public Datasets via BigQuery REST.
#
# verification_status: blocked-by-key
#
# The dataset `patents-public-data.patents.publications` is free to query but
# requires a Google Cloud project with billing enabled (queries are billed at
# the standard BigQuery rate; the 1 TB / month free tier covers exploratory
# work). Auth path is OAuth2 — read $GCLOUD_ACCESS_TOKEN first; the adapter
# self-repair sequence asks the user to run `gcloud auth print-access-token`
# and re-export the value.
#
# The query template uses standard SQL against the public publications table.
# `args.query` is interpolated as a substring match on title/abstract — adapt
# the template for richer CQL when needed.
site: google-patents-bq
name: search
description: BigQuery search over the Google Patents Public Datasets corpus
domain: bigquery.googleapis.com
type: web-api
strategy: header
lint_listing_detail: skip

args:
  query:
    type: str
    required: true
    positional: true
    description: Substring matched against title and abstract (case-insensitive)
  limit:
    type: int
    default: 20
  project:
    type: str
    default: ""
    description: GCP project ID — falls back to $GCLOUD_PROJECT

pipeline:
  - fetch:
      url: "https://bigquery.googleapis.com/bigquery/v2/projects/${{ args.project || env.GCLOUD_PROJECT || '' }}/queries"
      method: POST
      headers:
        Authorization: "Bearer ${{ env.GCLOUD_ACCESS_TOKEN || '' }}"
        Content-Type: application/json
      body:
        query: |-
          SELECT
            publication_number,
            ANY_VALUE(country_code) AS country_code,
            ANY_VALUE(kind_code) AS kind_code,
            ANY_VALUE(title_localized)[OFFSET(0)].text AS title,
            ANY_VALUE(abstract_localized)[OFFSET(0)].text AS abstract,
            ANY_VALUE(publication_date) AS publication_date,
            ANY_VALUE(filing_date) AS filing_date,
            ANY_VALUE(grant_date) AS grant_date,
            ANY_VALUE(priority_date) AS priority_date,
            ANY_VALUE(application_number) AS application_number,
            ANY_VALUE(family_id) AS family_id,
            TO_JSON_STRING(ANY_VALUE(inventor_harmonized)) AS inventors,
            TO_JSON_STRING(ANY_VALUE(assignee_harmonized)) AS assignees,
            TO_JSON_STRING(ANY_VALUE(cpc)) AS cpc,
            TO_JSON_STRING(ANY_VALUE(ipc)) AS ipc,
            ANY_VALUE(claims_localized_html)[OFFSET(0)].text AS claims_text
          FROM `patents-public-data.patents.publications`
          WHERE LOWER(title_localized[OFFSET(0)].text) LIKE LOWER('%${{ args.query }}%')
             OR LOWER(abstract_localized[OFFSET(0)].text) LIKE LOWER('%${{ args.query }}%')
          GROUP BY publication_number
          LIMIT ${{ args.limit }}
        useLegacySql: false

  - select: rows

  - map:
      publication_number: "${{ item.f[0].v }}"
      kind_code: "${{ item.f[2].v || '' }}"
      title: "${{ item.f[3].v }}"
      abstract: "${{ item.f[4].v }}"
      publication_date: "${{ item.f[5].v }}"
      filing_date: "${{ item.f[6].v }}"
      grant_date: "${{ item.f[7].v }}"
      priority_date: "${{ item.f[8].v }}"
      application_number: "${{ item.f[9].v }}"
      family_id: "${{ item.f[10].v }}"
      inventors: "${{ JSON.stringify((function(){ try { var arr = JSON.parse(item.f[11].v || '[]'); return Array.isArray(arr) ? arr.map(i => ({ name: i.name || i, country: i.country_code || undefined })) : []; } catch(e) { return []; } })()) }}"
      assignees: "${{ JSON.stringify((function(){ try { var arr = JSON.parse(item.f[12].v || '[]'); return Array.isArray(arr) ? arr.map(a => ({ name: a.name || a, country: a.country_code || undefined })) : []; } catch(e) { return []; } })()) }}"
      classifications: "${{ JSON.stringify((function(){ var out = []; try { var cpc = JSON.parse(item.f[13].v || '[]'); if(Array.isArray(cpc)){ for (var i=0;i<cpc.length;i++) out.push({ scheme: 'cpc', code: cpc[i].code || cpc[i] }); } } catch(e){} try { var ipc = JSON.parse(item.f[14].v || '[]'); if(Array.isArray(ipc)){ for (var j=0;j<ipc.length;j++) out.push({ scheme: 'ipc', code: ipc[j].code || ipc[j] }); } } catch(e){} return out.filter(x => x.code); })()) }}"
      source_adapter: google-patents-bq
      source_url: "${{ 'https://patents.google.com/patent/' + (item.f[0].v || '') }}"
      retrieved_at: "${{ now }}"

columns: [publication_number, title, publication_date, source_adapter]

capabilities: ["http.fetch", "patent.search"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
