site: maimai
name: search
description: Search talents/people on Maimai (requires login)
domain: maimai.cn
type: browser
strategy: intercept
browser: true

args:
  query:
    type: str
    required: true
    positional: true
    description: "Search keyword (e.g. Java, product manager)"
  limit:
    type: int
    default: 20
    description: Number of results

columns: [name, job_title, company, location, school, degree, active_status]

pipeline:
  - navigate:
      url: https://maimai.cn/ent/talents/discover/search_v2
      settleMs: 5000

  - evaluate: |
      (async () => {
        const query = ${{ args.query | json }};
        const limit = ${{ args.limit }};
        let csrftoken = document.cookie.split('; ')
          .find(r => r.startsWith('csrftoken='))?.split('=')[1] || '';
        if (!csrftoken) {
          const meta = document.querySelector('meta[name="csrf-token"]');
          if (meta) csrftoken = meta.getAttribute('content') || '';
        }
        const body = { search: { page: 0, size: limit, query, sortby: 0 } };
        const res = await fetch('https://maimai.cn/api/ent/discover/search?channel=www&data_version=3.0&version=1.0.0', {
          method: 'POST',
          headers: {
            'content-type': 'text/plain;charset=UTF-8',
            'x-csrf-token': csrftoken,
          },
          credentials: 'include',
          body: JSON.stringify(body),
        });
        if (res.status === 401 || res.status === 403) throw new Error('Auth required — login at maimai.cn first');
        const data = await res.json();
        const list = data.data?.list || data.data?.talent_list || [];
        return list.slice(0, limit).map(t => {
          const edu = (t.edu && t.edu[0]) || {};
          return {
            name: t.name || '',
            job_title: t.position || t.job_title || '',
            company: t.company || '',
            location: (t.province || '') + (t.city ? '·' + t.city : ''),
            school: edu.school || '',
            degree: edu.sdegree || '',
            active_status: t.active_state_v2 || t.active_state || '',
          };
        });
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
