site: opencode
name: version
description: Check OpenCode CLI version
type: bridge
strategy: public
binary: opencode
detect: which opencode
autoInstall: npm install -g opencode

pipeline:
  - exec:
      command: opencode
      args:
        - --version
      parse: text
      timeout: 10000

columns: [output]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
