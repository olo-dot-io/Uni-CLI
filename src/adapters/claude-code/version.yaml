site: claude-code
name: version
description: Check Claude Code CLI version and status
type: bridge
strategy: public
binary: claude
detect: which claude
autoInstall: npm install -g @anthropic-ai/claude-code

pipeline:
  - exec:
      command: claude
      args:
        - --version
      parse: text
      timeout: 10000

columns: [output]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
