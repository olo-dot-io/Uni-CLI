# Desktop adapter — export Chrome bookmarks bar entries
site: chrome
name: bookmarks
description: List bookmarks from Chrome's bookmark bar (macOS)
type: desktop
detect: Darwin
strategy: public

pipeline:
  - exec:
      command: cat
      args:
        - "${{ env.HOME }}/Library/Application Support/Google/Chrome/Default/Bookmarks"
      parse: json
      timeout: 5000

  - select: "roots.bookmark_bar.children"

  - map:
      name: "${{ item.name }}"
      url: "${{ item.url || '' }}"
      type: "${{ item.type }}"

  - limit: 50

columns: [name, url, type]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
