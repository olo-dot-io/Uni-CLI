site: xianyu
name: search
description: Search Xianyu (Goofish) second-hand items
domain: www.goofish.com
strategy: intercept
browser: true

args:
  query:
    type: str
    required: true
    positional: true
    description: Search keyword
  limit:
    type: int
    default: 20
    description: Number of results

columns: [rank, title, price, condition, location, url]

pipeline:
  - navigate:
      url: https://www.goofish.com/search?q=${{ args.query | urlencode }}
      settleMs: 4000

  - scroll:
      times: 2

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};
        const clean = v => (v || '').replace(/\s+/g, ' ').trim();
        const cards = document.querySelectorAll('a[href*="/item?id="]');
        return Array.from(cards).slice(0, limit).map((card, i) => {
          const title = clean(card.querySelector('[class*="row1-wrap-title"], [class*="main-title"]')?.textContent);
          const priceWrap = card.querySelector('[class*="price-wrap"]');
          const priceNum = clean(priceWrap?.querySelector('[class*="number"]')?.textContent);
          const priceDec = clean(priceWrap?.querySelector('[class*="decimal"]')?.textContent);
          const price = ('¥' + priceNum + priceDec).replace(/^¥\s*$/, '');
          const attrs = Array.from(card.querySelectorAll('[class*="row2-wrap-cpv"] span')).map(s => clean(s.textContent)).filter(Boolean);
          const location = clean(card.querySelector('[class*="seller-text"]')?.textContent);
          const idMatch = (card.href || '').match(/[?&]id=(\d+)/);
          return {
            rank: i + 1, title, price,
            condition: attrs[0] || '',
            location,
            url: card.href || '',
          };
        }).filter(r => r.title);
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities:
  ["cdp-browser.evaluate", "cdp-browser.navigate", "cdp-browser.scroll"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
