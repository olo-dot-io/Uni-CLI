site: xianyu
name: item
description: Get Xianyu item details
domain: www.goofish.com
strategy: intercept
browser: true

args:
  id:
    type: str
    required: true
    positional: true
    description: Item ID

columns: [title, price, condition, seller, description, location, url]

pipeline:
  - navigate:
      url: https://www.goofish.com/item?id=${{ args.id }}
      settleMs: 4000

  - evaluate: |
      (async () => {
        const clean = v => (v || '').replace(/\s+/g, ' ').trim();
        const title = clean(document.querySelector('[class*="title"], h1')?.textContent);
        const price = clean(document.querySelector('[class*="price"] [class*="number"], [class*="priceText"]')?.textContent);
        const desc = clean(document.querySelector('[class*="desc"], [class*="detail-content"]')?.textContent).substring(0, 500);
        const seller = clean(document.querySelector('[class*="seller-name"], [class*="userNick"]')?.textContent);
        const location = clean(document.querySelector('[class*="location"], [class*="area"]')?.textContent);
        const attrs = Array.from(document.querySelectorAll('[class*="cpv"] span, [class*="prop-item"]')).map(s => clean(s.textContent)).filter(Boolean);
        return [{
          title, price: price ? '¥' + price : '',
          condition: attrs[0] || '',
          seller, description: desc, location,
          url: location.href,
        }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
