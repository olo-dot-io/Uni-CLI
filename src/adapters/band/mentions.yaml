site: band
name: mentions
description: List BAND mentions/notifications
domain: band.us
strategy: intercept
browser: true

args:
  limit:
    type: int
    default: 20
    description: Number of mentions

columns: [rank, text, from, time]

pipeline:
  - navigate:
      url: https://band.us/home
      settleMs: 3000

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};
        const clean = v => (v || '').replace(/\s+/g, ' ').trim();
        const notiBtn = document.querySelector('[class*="notification"], [aria-label*="Notification"]');
        if (notiBtn) { notiBtn.click(); await new Promise(r => setTimeout(r, 2000)); }
        const items = document.querySelectorAll('[class*="notiItem"], [class*="notification-item"]');
        return Array.from(items).slice(0, limit).map((el, i) => ({
          rank: i + 1,
          text: clean(el.textContent).substring(0, 200),
          from: clean(el.querySelector('[class*="name"], [class*="author"]')?.textContent),
          time: clean(el.querySelector('[class*="time"], time')?.textContent),
        }));
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
