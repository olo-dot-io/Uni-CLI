site: band
name: posts
description: List BAND posts from a group
domain: band.us
strategy: intercept
browser: true

args:
  band-id:
    type: str
    required: true
    positional: true
    description: Band/group ID
  limit:
    type: int
    default: 20
    description: Number of posts

columns: [rank, author, text, comments, likes, time]

pipeline:
  - navigate:
      url: https://band.us/band/${{ args['band-id'] }}
      settleMs: 4000

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};
        const clean = v => (v || '').replace(/\s+/g, ' ').trim();
        const items = document.querySelectorAll('[class*="postItem"], [class*="post-wrap"], .postBody');
        return Array.from(items).slice(0, limit).map((el, i) => ({
          rank: i + 1,
          author: clean(el.querySelector('[class*="author"], [class*="writer"]')?.textContent),
          text: clean(el.querySelector('[class*="text"], [class*="content"]')?.textContent).substring(0, 300),
          comments: clean(el.querySelector('[class*="comment"] [class*="count"]')?.textContent),
          likes: clean(el.querySelector('[class*="like"] [class*="count"]')?.textContent),
          time: clean(el.querySelector('[class*="time"], time')?.textContent),
        }));
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
