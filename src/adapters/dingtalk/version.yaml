site: dingtalk
name: version
description: Check DingTalk CLI version
type: bridge
strategy: public
binary: dingtalk-cli
detect: which dingtalk-cli

pipeline:
  - exec:
      command: dingtalk-cli
      args:
        - --version
      parse: text
      timeout: 10000

columns: [output]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
