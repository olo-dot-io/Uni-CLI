site: imdb
name: title
description: Movie details via OMDb API by IMDB ID
type: web-api
strategy: public

args:
  id:
    type: str
    required: true
    positional: true
    description: "IMDB ID e.g. tt0111161"
    x-unicli-kind: id
  apikey:
    type: str
    default: ""
    description: OMDb API key (get one at omdbapi.com)

pipeline:
  - fetch:
      url: "https://www.omdbapi.com/"
      params:
        i: ${{ args.id }}
        apikey: ${{ args.apikey || '' }}
        plot: full

  - map:
      title: ${{ item.Title }}
      year: ${{ item.Year }}
      rating: ${{ item.imdbRating }}
      genre: ${{ item.Genre }}
      director: ${{ item.Director }}
      plot: ${{ item.Plot | truncate(200) }}
      runtime: ${{ item.Runtime }}

columns: [title, year, rating, genre, director, runtime]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
