site: facebook
name: search
description: Search Facebook for people, pages, or posts
domain: www.facebook.com
strategy: intercept
browser: true

args:
  query:
    type: str
    required: true
    positional: true
    description: Search query
  limit:
    type: int
    default: 10
    description: Number of results

columns: [index, title, text, url]

pipeline:
  - navigate: https://www.facebook.com

  - navigate:
      url: https://www.facebook.com/search/top?q=${{ args.query | urlencode }}
      settleMs: 4000

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};
        let items = document.querySelectorAll('[role="article"]');
        if (items.length === 0) {
          items = document.querySelectorAll('[role="listitem"]');
        }
        return Array.from(items)
          .filter(el => el.textContent.trim().length > 20)
          .slice(0, limit)
          .map((el, i) => {
            const link = el.querySelector('a[href*="facebook.com/"]');
            const heading = el.querySelector('h2, h3, h4, strong');
            return {
              index: i + 1,
              title: heading ? heading.textContent.trim().substring(0, 80) : '',
              text: el.textContent.trim().replace(/\s+/g, ' ').substring(0, 150),
              url: link ? link.href.split('?')[0] : '',
            };
          });
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
