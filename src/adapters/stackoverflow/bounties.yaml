site: stackoverflow
name: bounties
description: Active bounties on Stack Overflow
domain: stackoverflow.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 10
    description: Max number of results

pipeline:
  - fetch:
      url: https://api.stackexchange.com/2.3/questions/featured?order=desc&sort=activity&site=stackoverflow

  - select: items

  - map:
      bounty: ${{ item.bounty_amount }}
      title: ${{ item.title }}
      score: ${{ item.score }}
      answers: ${{ item.answer_count }}
      url: ${{ item.link }}

  - limit: ${{ args.limit }}

columns: [bounty, title, score, answers, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
