site: stackoverflow
name: search
description: Search Stack Overflow questions
domain: stackoverflow.com
type: web-api
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
    description: Search query
  limit:
    type: int
    default: 10
    description: Max number of results

pipeline:
  - fetch:
      url: https://api.stackexchange.com/2.3/search/advanced?order=desc&sort=relevance&q=${{ args.query | urlencode }}&site=stackoverflow

  - select: items

  - map:
      title: ${{ item.title }}
      score: ${{ item.score }}
      answers: ${{ item.answer_count }}
      url: ${{ item.link }}

  - limit: ${{ args.limit }}

columns: [title, score, answers, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
