site: linux-do
name: tags
description: List Linux.do forum tags
domain: linux.do
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 30
    description: Number of tags

pipeline:
  - fetch:
      url: https://linux.do/tags.json

  - select: tags

  - sort:
      by: count
      order: desc

  - map:
      rank: ${{ index + 1 }}
      name: ${{ item.name || item.id }}
      count: ${{ item.count || 0 }}
      url: ${{ 'https://linux.do/tag/' + (item.slug || item.name) }}

  - limit: ${{ args.limit }}

columns: [rank, name, count, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
