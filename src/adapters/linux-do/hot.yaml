site: linux-do
name: hot
description: Linux.do hot topics
domain: linux.do
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20
    description: Number of topics

pipeline:
  - fetch:
      url: https://linux.do/top.json
      params:
        period: daily

  - select: topic_list.topics

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      views: ${{ item.views }}
      replies: ${{ item.posts_count - 1 }}
      likes: ${{ item.like_count }}
      category: ${{ item.category_id }}

  - limit: ${{ args.limit }}

columns: [rank, title, views, replies, likes]
