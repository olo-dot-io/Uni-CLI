site: linux-do
name: latest
description: Linux.do latest topics
domain: linux.do
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20
    description: Number of topics

pipeline:
  - fetch:
      url: https://linux.do/latest.json

  - select: topic_list.topics

  - map:
      title: ${{ item.title }}
      views: ${{ item.views }}
      replies: ${{ item.posts_count - 1 }}
      likes: ${{ item.like_count }}
      created: ${{ item.created_at }}

  - limit: ${{ args.limit }}

columns: [title, views, replies, likes, created]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
