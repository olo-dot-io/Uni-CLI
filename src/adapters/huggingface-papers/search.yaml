site: huggingface-papers
name: search
description: Search Hugging Face papers
type: web-api
domain: huggingface.co
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
  limit:
    type: int
    default: 10

pipeline:
  - fetch:
      url: https://huggingface.co/api/papers
      params:
        search: "${{ args.query }}"
        limit: "${{ args.limit }}"

  - map:
      title: "${{ item.title || '' }}"
      authors: "${{ item.authors ? item.authors.slice(0,3).map(a => a.name || a).join(', ') : '' }}"
      published: "${{ item.publishedAt || '' }}"
      upvotes: "${{ item.upvotes || 0 }}"
      url: "${{ 'https://huggingface.co/papers/' + (item.id || '') }}"

  - limit: ${{ args.limit }}

columns: [title, authors, upvotes, published, url]
