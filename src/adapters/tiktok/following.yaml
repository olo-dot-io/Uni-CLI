site: tiktok
name: following
description: List accounts you follow on TikTok
domain: www.tiktok.com
strategy: intercept
browser: true

args:
  limit:
    type: int
    default: 20
    description: Number of accounts

columns: [index, username, name]

pipeline:
  - navigate:
      url: https://www.tiktok.com/following
      settleMs: 5000

  - evaluate: |
      (() => {
        const limit = ${{ args.limit }};
        const links = Array.from(document.querySelectorAll('a[href*="/@"]'))
          .filter(function(a) {
            const text = a.textContent.trim();
            return text.length > 1 && text.length < 80 &&
              !text.includes('Profile') && !text.includes('More') && !text.includes('Upload');
          });

        const seen = {};
        const results = [];
        for (const a of links) {
          const match = a.href.match(/@([^/]+)/);
          const username = match ? match[1] : '';
          if (!username || seen[username]) continue;
          seen[username] = true;
          const raw = a.textContent.trim();
          const name = raw.replace(username, '').replace('@', '').trim();
          results.push({
            index: results.length + 1,
            username: username,
            name: name || username,
          });
          if (results.length >= limit) break;
        }
        return results;
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
