site: taobao
name: hot
description: Taobao hot search keywords
domain: suggest.taobao.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: https://suggest.taobao.com/sug
      params:
        code: utf-8
        q: ""
        area: c2c
        nick: ""

  - select: result

  - map:
      rank: ${{ index + 1 }}
      keyword: "${{ item[0] || '' }}"
      count: "${{ item[1] || '' }}"

  - limit: ${{ args.limit }}

columns: [rank, keyword, count]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
