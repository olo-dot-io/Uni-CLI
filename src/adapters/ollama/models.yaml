site: ollama
name: models
description: List available Ollama models in registry
type: service
base: "http://localhost:11434"
strategy: public

args:
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: https://ollama.com/api/models
      params:
        limit: "${{ args.limit }}"

  - select: models

  - map:
      name: ${{ item.name }}
      size: "${{ item.size || '' }}"
      modified: "${{ item.modified || '' }}"
      description: "${{ (item.description || '') | truncate(80) }}"

  - limit: ${{ args.limit }}

columns: [name, size, modified, description]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: true
quarantineReason: "HTTP 404 — upstream API path changed (2026-04-15)"
schema_version: v2
