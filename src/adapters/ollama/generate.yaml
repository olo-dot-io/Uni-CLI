site: ollama
name: generate
description: Generate text with an Ollama model
type: service
base: "http://localhost:11434"
strategy: public

args:
  model:
    type: str
    required: true
    positional: true
    description: Model name (e.g. llama3, mistral, codellama)
  prompt:
    type: str
    required: true
    description: Text prompt

pipeline:
  - fetch:
      url: http://localhost:11434/api/generate
      method: POST
      body:
        model: "${{ args.model }}"
        prompt: "${{ args.prompt }}"
        stream: false

  - map:
      response: "${{ item.response || '' }}"
      model: "${{ item.model || '' }}"
      total_duration: "${{ item.total_duration ? Math.round(item.total_duration / 1e9 * 100) / 100 + 's' : '' }}"

columns: [model, response, total_duration]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
