site: binance
name: trades
description: Binance recent trades for a trading pair / 币安最新成交
domain: data-api.binance.vision
type: web-api
strategy: public
browser: false

args:
  symbol:
    type: str
    required: true
    positional: true
    description: "Trading pair symbol (e.g. BTCUSDT, ETHUSDT)"
  limit:
    type: int
    default: 20
    description: Number of trades

pipeline:
  - fetch:
      url: https://data-api.binance.vision/api/v3/trades
      params:
        symbol: ${{ args.symbol.toUpperCase() }}
        limit: ${{ args.limit }}
  - map:
      id: ${{ item.id }}
      price: ${{ item.price }}
      quantity: ${{ item.qty }}
      quote_quantity: ${{ item.quoteQty }}
      time: ${{ new Date(item.time).toISOString() }}
      side: '${{ item.isBuyerMaker ? "sell" : "buy" }}'
  - limit: ${{ args.limit }}

columns: [id, time, side, price, quantity, quote_quantity]

capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
