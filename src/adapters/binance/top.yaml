site: binance
name: top
description: Binance top trading pairs by 24h quote volume / 币安成交额排行
domain: data-api.binance.vision
type: web-api
strategy: public
browser: false

args:
  limit:
    type: int
    default: 20
    description: Number of trading pairs

pipeline:
  - fetch:
      url: https://data-api.binance.vision/api/v3/ticker/24hr
  - map:
      symbol: ${{ item.symbol }}
      price: ${{ item.lastPrice }}
      change_pct: ${{ item.priceChangePercent }}%
      high: ${{ item.highPrice }}
      low: ${{ item.lowPrice }}
      volume: ${{ item.quoteVolume }}
      trades: ${{ item.count }}
      _sort: ${{ parseFloat(item.quoteVolume) }}
  - sort: { by: _sort, order: desc }
  - limit: ${{ args.limit }}
  - map:
      rank: ${{ index + 1 }}
      symbol: ${{ item.symbol }}
      price: ${{ item.price }}
      change_pct: ${{ item.change_pct }}
      high: ${{ item.high }}
      low: ${{ item.low }}
      volume: ${{ item.volume }}
      trades: ${{ item.trades }}

columns: [rank, symbol, price, change_pct, high, low, volume, trades]

capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
