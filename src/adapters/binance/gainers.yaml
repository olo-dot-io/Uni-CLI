site: binance
name: gainers
description: Binance top 24h gainers by price change percentage / 币安24小时涨幅榜
domain: data-api.binance.vision
type: web-api
strategy: public
browser: false

args:
  limit:
    type: int
    default: 20
    description: Number of trading pairs

pipeline:
  - fetch:
      url: https://data-api.binance.vision/api/v3/ticker/24hr
  - map:
      symbol: ${{ item.symbol }}
      price: ${{ item.lastPrice }}
      change_pct: ${{ item.priceChangePercent }}
      volume: ${{ item.quoteVolume }}
      trades: ${{ item.count }}
      _sort: ${{ parseFloat(item.priceChangePercent) }}
  - sort: { by: _sort, order: desc }
  - limit: ${{ args.limit }}
  - map:
      rank: ${{ index + 1 }}
      symbol: ${{ item.symbol }}
      price: ${{ item.price }}
      change_pct: ${{ item.change_pct }}%
      volume: ${{ item.volume }}
      trades: ${{ item.trades }}

columns: [rank, symbol, price, change_pct, volume, trades]

capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
