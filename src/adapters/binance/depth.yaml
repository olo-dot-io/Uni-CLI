site: binance
name: depth
description: Binance bid-side order book levels / 币安买盘挂单深度
domain: data-api.binance.vision
type: web-api
strategy: public
browser: false

args:
  symbol:
    type: str
    required: true
    positional: true
    description: "Trading pair symbol (e.g. BTCUSDT, ETHUSDT)"
  limit:
    type: int
    default: 20
    description: Number of order book levels

pipeline:
  - fetch:
      url: https://data-api.binance.vision/api/v3/depth
      params:
        symbol: ${{ args.symbol.toUpperCase() }}
        limit: ${{ args.limit }}
  - select: bids
  - map:
      rank: ${{ index + 1 }}
      price: ${{ item[0] }}
      quantity: ${{ item[1] }}
      notional: ${{ parseFloat(item[0]) * parseFloat(item[1]) }}
  - limit: ${{ args.limit }}

columns: [rank, price, quantity, notional]

capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
