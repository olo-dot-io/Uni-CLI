# trycua/cua bench/list — list available cua benchmarks.
site: cua
name: bench/list
description: List trycua/cua computer-use benchmarks
type: bridge
strategy: public
binary: cua
detect: which cua

pipeline:
  - exec:
      command: cua
      args:
        - bench
        - list
        - --json
      parse: json
      timeout: 30000

columns: [name, description]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
