site: "1688"
name: store
description: List products from a 1688.com store
domain: 1688.com
type: web-api
strategy: cookie

args:
  id:
    type: str
    required: true
    positional: true
    description: Store member ID
  limit:
    type: int
    default: 20
    description: Number of products

pipeline:
  - fetch:
      url: https://winport.1688.com/page/offerlist
      params:
        memberId: "${{ args.id }}"
        pageNo: "1"
        pageSize: "${{ args.limit }}"

  - select: data.offerList

  - map:
      rank: ${{ index + 1 }}
      title: "${{ item.subject || '' }}"
      price: "${{ item.price || '' }}"
      sales: "${{ item.quantitySumMonth || '' }}"
      offerId: "${{ item.offerId || '' }}"

  - limit: ${{ args.limit }}

columns: [rank, title, price, sales, offerId]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
