site: amazon
name: discussion
description: Get Amazon product reviews/discussions
domain: www.amazon.com
strategy: intercept
browser: true

args:
  asin:
    type: str
    required: true
    positional: true
    description: "ASIN or product URL"
  limit:
    type: int
    default: 10
    description: Number of reviews

columns: [rank, rating, title, author, date, text]

pipeline:
  - navigate:
      url: https://www.amazon.com/product-reviews/${{ args.asin }}
      settleMs: 3000

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};
        const reviews = document.querySelectorAll('[data-hook="review"]');
        return Array.from(reviews).slice(0, limit).map((el, i) => {
          const clean = v => (v || '').replace(/\s+/g, ' ').trim();
          const ratingText = clean(el.querySelector('[data-hook="review-star-rating"] .a-icon-alt')?.textContent);
          const rating = ratingText.replace(/ out of 5 stars/, '');
          const title = clean(el.querySelector('[data-hook="review-title"] span:last-child')?.textContent);
          const author = clean(el.querySelector('.a-profile-name')?.textContent);
          const date = clean(el.querySelector('[data-hook="review-date"]')?.textContent);
          const text = clean(el.querySelector('[data-hook="review-body"] span')?.textContent).substring(0, 300);
          return { rank: i + 1, rating, title, author, date, text };
        });
      })()
