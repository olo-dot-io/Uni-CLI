site: amazon
name: bestsellers
description: Amazon Best Sellers ranking
domain: www.amazon.com
strategy: intercept
browser: true

args:
  url:
    type: str
    default: ""
    description: "Best sellers URL or category path (default: top-level)"
  limit:
    type: int
    default: 20
    description: Number of results

columns: [rank, title, price, rating, reviews, url]

pipeline:
  - navigate:
      url: ${{ args.url || 'https://www.amazon.com/Best-Sellers/zgbs' }}
      settleMs: 3000

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};
        const items = document.querySelectorAll('.zg-grid-general-faceout, [id^="gridItemRoot"]');
        return Array.from(items).slice(0, limit).map((el, i) => {
          const clean = v => (v || '').replace(/\u00a0/g, ' ').replace(/\s+/g, ' ').trim();
          const link = el.querySelector('a[href*="/dp/"]');
          const title = clean(el.querySelector('.zg-text-center-align, ._cDEzb_p13n-sc-css-line-clamp-3_g3dy1, .p13n-sc-truncated')?.textContent);
          const price = clean(el.querySelector('.a-price .a-offscreen, .p13n-sc-price')?.textContent);
          const rating = clean(el.querySelector('.a-icon-alt')?.textContent).replace(/ out of 5 stars/, '');
          const reviews = clean(el.querySelector('.a-size-small:last-child')?.textContent);
          return {
            rank: i + 1, title, price, rating, reviews,
            url: link ? link.href.split('?')[0] : '',
          };
        });
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
