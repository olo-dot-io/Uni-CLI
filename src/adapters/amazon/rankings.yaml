site: amazon
name: rankings
description: Amazon generic rankings page (bestsellers/new-releases/movers-shakers)
domain: www.amazon.com
strategy: intercept
browser: true

args:
  url:
    type: str
    required: true
    positional: true
    description: "Rankings page URL"
    format: uri
  limit:
    type: int
    default: 20
    description: Number of results

columns: [rank, title, price, rating, url]

pipeline:
  - navigate:
      url: ${{ args.url }}
      settleMs: 3000

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};
        const items = document.querySelectorAll('.zg-grid-general-faceout, [id^="gridItemRoot"]');
        return Array.from(items).slice(0, limit).map((el, i) => {
          const clean = v => (v || '').replace(/\s+/g, ' ').trim();
          const link = el.querySelector('a[href*="/dp/"]');
          const title = clean(el.querySelector('.p13n-sc-truncated, ._cDEzb_p13n-sc-css-line-clamp-3_g3dy1')?.textContent);
          const price = clean(el.querySelector('.a-price .a-offscreen, .p13n-sc-price')?.textContent);
          const rating = clean(el.querySelector('.a-icon-alt')?.textContent).replace(/ out of 5 stars/, '');
          return { rank: i + 1, title, price, rating, url: link ? link.href.split('?')[0] : '' };
        });
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
