site: amazon
name: product
description: Get Amazon product details by ASIN or URL
domain: www.amazon.com
strategy: intercept
browser: true

args:
  asin:
    type: str
    required: true
    positional: true
    description: "ASIN or product URL (e.g. B0FJS72893)"

columns: [asin, title, price, rating, reviews, availability, brand, url]

pipeline:
  - navigate:
      url: https://www.amazon.com/dp/${{ args.asin }}
      settleMs: 3000

  - evaluate: |
      (async () => {
        const clean = v => (v || '').replace(/\u00a0/g, ' ').replace(/\s+/g, ' ').trim();
        const priceSelectors = [
          '#corePrice_feature_div .a-offscreen',
          '#corePriceDisplay_desktop_feature_div .a-offscreen',
          '#apex_desktop .a-offscreen',
          '#price_inside_buybox',
          '#priceblock_ourprice',
        ];
        let price = '';
        for (const sel of priceSelectors) {
          const el = document.querySelector(sel);
          if (el) { price = clean(el.textContent); break; }
        }
        const title = clean(document.querySelector('#productTitle')?.textContent);
        const rating = clean(document.querySelector('#acrPopover .a-icon-alt')?.textContent).replace(/ out of 5 stars/, '');
        const reviews = clean(document.querySelector('#acrCustomerReviewText')?.textContent);
        const availability = clean(document.querySelector('#availability span')?.textContent);
        const brand = clean(document.querySelector('#bylineInfo')?.textContent);
        const asinMatch = location.pathname.match(/\/dp\/([A-Z0-9]{10})/i);
        return [{
          asin: asinMatch ? asinMatch[1] : '',
          title, price, rating, reviews, availability, brand,
          url: location.href.split('?')[0],
        }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
