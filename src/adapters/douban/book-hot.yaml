site: douban
name: book-hot
description: Douban hot books
domain: book.douban.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20
    description: Number of books

pipeline:
  - fetch:
      url: https://book.douban.com/j/search_subjects
      params:
        type: book
        tag: 热门
        page_limit: "${{ args.limit }}"
        page_start: "0"

  - select: subjects

  - map:
      title: ${{ item.title }}
      rate: ${{ item.rate }}
      url: ${{ item.url }}

  - limit: ${{ args.limit }}

columns: [title, rate, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: true
quarantineReason: "HTTP 404 — upstream endpoint removed (2026-04-15)"
schema_version: v2
