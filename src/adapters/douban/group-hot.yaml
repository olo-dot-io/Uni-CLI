site: douban
name: group-hot
description: Douban group hot topics
domain: www.douban.com
type: web-api
strategy: cookie
auth_cookies: [dbcl2]

args:
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: https://www.douban.com/j/group/explore/hot
      params:
        start: "0"
        limit: "${{ args.limit }}"

  - map:
      title: "${{ item.title || '' }}"
      group: "${{ item.group?.name || '' }}"
      comments: "${{ item.n_comments || 0 }}"
      url: "${{ item.url || '' }}"

  - limit: ${{ args.limit }}

columns: [title, group, comments, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
