site: douban
name: top250
description: Douban movie Top 250
domain: movie.douban.com
type: browser
strategy: cookie
auth_cookies: [dbcl2]

args:
  limit:
    type: int
    default: 25
    description: Number of movies (fetches in pages of 25)

pipeline:
  - navigate: https://movie.douban.com/top250

  - evaluate: |
      async () => {
        const results = [];
        const limit = ${{ args.limit }};

        const parsePage = (doc) => {
          const items = doc.querySelectorAll('.item');
          for (const item of items) {
            if (results.length >= limit) break;
            const rankEl = item.querySelector('.pic em');
            const linkEl = item.querySelector('a');
            const titleEl = item.querySelector('.title');
            const ratingEl = item.querySelector('.rating_num');
            const href = linkEl?.href || '';
            const matchResult = href.match(/subject\/(\d+)/);
            const id = matchResult ? matchResult[1] : '';
            const title = titleEl?.textContent?.trim() || '';
            const rank = parseInt(rankEl?.textContent || '0', 10);
            const rating = ratingEl?.textContent?.trim() || '';
            if (id && title) {
              results.push({
                rank: rank || results.length + 1,
                id,
                title,
                rating: rating ? parseFloat(rating) : 0,
                url: href
              });
            }
          }
        };

        parsePage(document);

        for (let start = 25; start < 250 && results.length < limit; start += 25) {
          const resp = await fetch('https://movie.douban.com/top250?start=' + start);
          if (!resp.ok) break;
          const html = await resp.text();
          const doc = new DOMParser().parseFromString(html, 'text/html');
          parsePage(doc);
          await new Promise(r => setTimeout(r, 150));
        }

        return results;
      }

  - limit: ${{ args.limit }}

columns: [rank, id, title, rating, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: true
quarantineReason: "timed out after 8s — upstream slow from hosted runners"
schema_version: v2
