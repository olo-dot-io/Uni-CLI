site: flyctl
name: apps
description: List Fly.io applications
type: bridge
strategy: public
binary: fly
detect: which fly
autoInstall: brew install flyctl

pipeline:
  - exec:
      command: fly
      args:
        - apps
        - list
        - --json
      parse: json
      timeout: 30000

columns: [Name, Status, Organization]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
