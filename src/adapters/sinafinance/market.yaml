site: sinafinance
name: market
description: Sina Finance stock market overview
domain: hq.sinajs.cn
type: web-api
strategy: public

args:
  symbols:
    type: str
    default: "sh000001,sz399001,sz399006,hkHSI"
    description: "Comma-separated stock symbols"

pipeline:
  - fetch_text:
      url: "https://hq.sinajs.cn/list=${{ args.symbols }}"

  - map:
      content: "${{ item }}"

columns: [content]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
