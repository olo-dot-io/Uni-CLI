site: coinbase
name: prices
description: Get cryptocurrency spot prices from Coinbase
domain: api.coinbase.com
type: web-api
strategy: public
browser: false

args:
  pair:
    type: str
    default: BTC-USD
    positional: true
    description: Trading pair (e.g. BTC-USD, ETH-USD)

pipeline:
  - fetch:
      url: https://api.coinbase.com/v2/prices/${{ args.pair }}/spot

  - select: data

  - map:
      pair: ${{ args.pair }}
      price: ${{ item.amount }}
      currency: ${{ item.currency }}

columns: [pair, price, currency]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
