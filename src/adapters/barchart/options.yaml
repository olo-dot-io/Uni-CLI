site: barchart
name: options
description: Options chain for a symbol (strike, bid, ask, volume, OI)
domain: barchart.com
type: web-api
strategy: cookie
auth_cookies: [bcFreeUserPage498, laravel_session, XSRF-TOKEN]

args:
  symbol:
    type: str
    required: true
    positional: true
    description: Underlying ticker symbol
  limit:
    type: int
    default: 20
    description: Number of contracts

pipeline:
  - fetch:
      url: https://www.barchart.com/proxies/core-api/v1/options/chain
      params:
        symbol: "${{ args.symbol }}"
        fields: "strikePrice,lastPrice,volume,openInterest,bidPrice,askPrice"

  - select: data

  - map:
      strike: "${{ item.strikePrice }}"
      last: "${{ item.lastPrice }}"
      bid: "${{ item.bidPrice }}"
      ask: "${{ item.askPrice }}"
      volume: "${{ item.volume }}"
      oi: "${{ item.openInterest }}"

  - limit: ${{ args.limit }}

columns: [strike, last, bid, ask, volume, oi]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
