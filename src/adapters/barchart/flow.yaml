site: barchart
name: flow
description: Options flow (unusual activity) sorted by total value
domain: barchart.com
type: web-api
strategy: cookie
auth_cookies: [bcFreeUserPage498, laravel_session, XSRF-TOKEN]

args:
  symbol:
    type: str
    required: true
    positional: true
    description: Underlying ticker symbol
  limit:
    type: int
    default: 20
    description: Number of flow entries

pipeline:
  - fetch:
      url: https://www.barchart.com/proxies/core-api/v1/options/flow
      params:
        symbols: "${{ args.symbol }}"
        orderBy: totalValue
        orderDir: desc
        limit: "${{ args.limit }}"

  - select: data

  - map:
      rank: ${{ index + 1 }}
      symbol: "${{ item.symbol || '' }}"
      strike: "${{ item.strikePrice || '' }}"
      type: "${{ item.putCall || '' }}"
      volume: "${{ item.volume || '' }}"
      oi: "${{ item.openInterest || '' }}"
      value: "${{ item.totalValue || '' }}"
      expiry: "${{ item.expirationDate || '' }}"

  - limit: ${{ args.limit }}

columns: [rank, symbol, strike, type, volume, oi, value, expiry]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
