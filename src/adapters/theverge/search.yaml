site: theverge
name: search
description: Search The Verge articles
domain: www.theverge.com
type: web-api
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: https://www.theverge.com/api/search
      params:
        query: "${{ args.query }}"

  - select: results

  - map:
      title: "${{ item.title || '' }}"
      author: "${{ item.author?.name || '' }}"
      date: "${{ item.date || '' }}"
      url: "${{ item.url || '' }}"

  - limit: ${{ args.limit }}

columns: [title, author, date, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
