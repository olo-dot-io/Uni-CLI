# Service adapter — create a new WireMock stub mapping
site: wiremock
name: create-stub
description: Create a new stub mapping in WireMock
type: service
strategy: public
base: "http://localhost:8080"

args:
  method:
    type: str
    default: GET
    choices: [GET, POST, PUT, DELETE, PATCH]
    description: HTTP method to match
  url:
    type: str
    required: true
    positional: true
    description: URL path to match
    x-unicli-kind: path
    x-unicli-accepts: [url]
  status:
    type: int
    default: 200
    description: Response status code
  body:
    type: str
    default: "{}"
    description: Response body (JSON string)
  port:
    type: int
    default: 8080
    description: WireMock server port

pipeline:
  - fetch:
      url: "http://localhost:${{ args.port }}/__admin/mappings"
      method: POST
      headers:
        Content-Type: application/json
      body:
        request:
          method: "${{ args.method }}"
          url: "${{ args.url }}"
        response:
          status: "${{ args.status }}"
          body: "${{ args.body }}"
          headers:
            Content-Type: application/json

columns: [id, uuid]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
