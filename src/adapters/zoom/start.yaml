# Desktop adapter — start a personal Zoom meeting
site: zoom
name: start
description: Start your personal Zoom meeting
type: desktop
binary: open
detect: Darwin
strategy: public

pipeline:
  - exec:
      command: open
      args:
        - "zoommtg://zoom.us/start?confno=personal"
      timeout: 5000

columns: [output]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
