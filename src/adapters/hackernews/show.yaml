site: hackernews
name: show
description: Hacker News Show HN posts
domain: news.ycombinator.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20
    description: Number of stories

pipeline:
  - fetch:
      url: https://hacker-news.firebaseio.com/v0/showstories.json

  - limit: "${{ Math.min((args.limit || 20) + 10, 50) }}"

  - map:
      id: ${{ item }}

  - fetch:
      url: https://hacker-news.firebaseio.com/v0/item/${{ item.id }}.json

  - filter: item.title && !item.deleted && !item.dead

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      score: ${{ item.score }}
      author: ${{ item.by }}
      comments: ${{ item.descendants }}
      url: ${{ item.url }}

  - limit: ${{ args.limit }}

columns: [rank, title, score, author, comments]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
