site: futu
name: quote
description: Get stock quote from Futu
domain: www.futunn.com
strategy: intercept
browser: true

args:
  symbol:
    type: str
    required: true
    positional: true
    description: Stock symbol (e.g. AAPL, 00700)

columns:
  [name, symbol, price, change, change_pct, open, high, low, volume, market_cap]

pipeline:
  - navigate:
      url: https://www.futunn.com/stock/${{ args.symbol }}
      settleMs: 4000

  - evaluate: |
      (async () => {
        const clean = v => (v || '').replace(/\s+/g, ' ').trim();
        const name = clean(document.querySelector('[class*="stock-name"], h1, [class*="securityName"]')?.textContent);
        const price = clean(document.querySelector('[class*="price"], [class*="last-price"], [class*="cur-price"]')?.textContent);
        const change = clean(document.querySelector('[class*="change-val"], [class*="change"]')?.textContent);
        const changePct = clean(document.querySelector('[class*="change-pct"], [class*="percent"]')?.textContent);
        const fields = document.querySelectorAll('[class*="detail-item"], [class*="quote-item"], [class*="field-item"]');
        const data = {};
        fields.forEach(f => {
          const label = clean(f.querySelector('[class*="label"], dt')?.textContent).toLowerCase();
          const val = clean(f.querySelector('[class*="value"], dd')?.textContent);
          if (label.includes('open')) data.open = val;
          if (label.includes('high')) data.high = val;
          if (label.includes('low')) data.low = val;
          if (label.includes('vol')) data.volume = val;
          if (label.includes('market') || label.includes('cap')) data.market_cap = val;
        });
        return [{
          name, symbol: '${{ args.symbol }}', price, change, change_pct: changePct,
          open: data.open || '', high: data.high || '', low: data.low || '',
          volume: data.volume || '', market_cap: data.market_cap || '',
        }];
      })()
