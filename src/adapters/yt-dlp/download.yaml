site: yt-dlp
name: download
description: Download a video from a URL
type: bridge
strategy: public
binary: yt-dlp
detect: which yt-dlp

pipeline:
  - exec:
      command: yt-dlp
      args:
        - ${{ args.url }}
        - -o
        - ${{ args.output }}
        - --format
        - ${{ args.format }}
        - --no-playlist
      parse: text
      timeout: 300000

args:
  url:
    type: str
    required: true
    positional: true
    description: Video URL to download
  output:
    type: str
    default: "%(title)s.%(ext)s"
    description: Output filename template
  format:
    type: str
    default: "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"
    description: Format selection string

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
