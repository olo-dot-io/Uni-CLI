site: yt-dlp
name: search
description: Search YouTube and return video metadata
type: bridge
strategy: public
binary: yt-dlp
detect: which yt-dlp

pipeline:
  - exec:
      command: yt-dlp
      args:
        - ytsearch${{ args.limit }}:${{ args.query }}
        - --dump-json
        - --no-download
        - --flat-playlist
      parse: lines
      timeout: 60000

  - map:
      title: ${{ JSON.parse(item.line).title }}
      uploader: ${{ JSON.parse(item.line).uploader }}
      duration: ${{ JSON.parse(item.line).duration }}
      url: ${{ JSON.parse(item.line).url }}

args:
  query:
    type: str
    required: true
    positional: true
    description: Search query
  limit:
    type: int
    default: 5
    description: Maximum number of results to return

columns: [title, uploader, duration, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
