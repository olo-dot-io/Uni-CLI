site: vercel
name: list
description: List Vercel deployments
type: bridge
strategy: public
binary: vercel
detect: which vercel
autoInstall: npm install -g vercel

pipeline:
  - exec:
      command: vercel
      args:
        - list
        - --json
      parse: json
      timeout: 30000

columns: [name, url, state, created]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
