# Service adapter — retrieves ComfyUI execution history from the local REST API
site: comfyui
name: history
description: Get ComfyUI execution history (returns raw JSON object keyed by prompt ID)
type: service
strategy: public
base: "http://localhost:8188"

args:
  port:
    type: int
    default: 8188
    description: ComfyUI server port

pipeline:
  - fetch:
      url: "http://localhost:${{ args.port }}/history"

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
