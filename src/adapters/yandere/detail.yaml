site: yandere
name: detail
description: Get yande.re post detail by post id
domain: yande.re
type: web-api
strategy: public

args:
  id:
    type: str
    required: true
    positional: true

pipeline:
  - fetch:
      url: "https://yande.re/post.json"
      params:
        tags: "${{ 'id:' + args.id }}"
        limit: 1

  - map:
      id: "${{ item.id }}"
      rating: "${{ item.rating }}"
      score: "${{ item.score }}"
      author: "${{ item.author }}"
      created_at: "${{ item.created_at }}"
      width: "${{ item.width }}"
      height: "${{ item.height }}"
      file_ext: "${{ item.file_ext }}"
      file_size: "${{ item.file_size }}"
      tags: "${{ item.tags }}"
      source: "${{ item.source }}"
      preview_url: "${{ item.preview_url }}"
      sample_url: "${{ item.sample_url }}"
      file_url: "${{ item.file_url }}"
      url: "${{ 'https://yande.re/post/show/' + item.id }}"

columns:
  [
    id,
    rating,
    score,
    author,
    width,
    height,
    file_ext,
    file_size,
    tags,
    source,
    sample_url,
    file_url,
    url,
  ]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
