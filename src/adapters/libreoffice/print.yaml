# Desktop adapter — wrapping LibreOffice for headless print-to-file
site: libreoffice
name: print
description: Print document to file headlessly via LibreOffice
type: desktop
strategy: public
binary: soffice
detect: which soffice

pipeline:
  - exec:
      command: soffice
      args:
        - --headless
        - --norestore
        - --print-to-file
        - --outdir
        - ${{ args.outdir }}
        - ${{ args.file }}
      parse: text
      timeout: 60000
      env:
        UserInstallation: "file:///tmp/unicli_lo_profile"

args:
  file:
    type: str
    required: true
    positional: true
    description: Input document file path
    x-unicli-kind: path
  outdir:
    type: str
    default: "."
    description: Output directory for printed file

columns: []

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
