site: v2ex
name: node
description: V2EX topics by node
domain: www.v2ex.com
type: web-api
strategy: public

args:
  name:
    type: str
    required: true
    positional: true
    description: Node name (e.g. python, apple, jobs)
  limit:
    type: int
    default: 20
    description: Number of topics

pipeline:
  - fetch:
      url: https://www.v2ex.com/api/topics/show.json
      params:
        node_name: ${{ args.name }}

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      author: ${{ item.member.username }}
      replies: ${{ item.replies }}
      url: ${{ item.url }}

  - limit: ${{ args.limit }}

columns: [rank, title, author, replies, url]
