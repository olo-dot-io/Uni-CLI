site: v2ex
name: me
description: V2EX current user profile
domain: www.v2ex.com
type: web-api
strategy: cookie
auth_cookies: [A2]

pipeline:
  - fetch:
      url: https://www.v2ex.com/api/v2/member
      headers:
        Authorization: "Bearer ${{ args.token || '' }}"

  - select: result

  - map:
      id: ${{ item.id }}
      username: ${{ item.username }}
      bio: ${{ item.bio || '' }}
      created: ${{ item.created }}

columns: [id, username, bio, created]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
