site: v2ex
name: nodes
description: V2EX all nodes list
domain: www.v2ex.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 50
    description: Number of nodes

pipeline:
  - fetch:
      url: https://www.v2ex.com/api/nodes/all.json

  - sort: item.topics
    order: desc

  - map:
      rank: ${{ index + 1 }}
      name: ${{ item.name }}
      title: ${{ item.title }}
      topics: ${{ item.topics }}
      stars: ${{ item.stars }}

  - limit: ${{ args.limit }}

columns: [rank, name, title, topics, stars]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
