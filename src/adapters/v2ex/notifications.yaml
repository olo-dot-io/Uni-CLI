site: v2ex
name: notifications
description: V2EX user notifications
domain: www.v2ex.com
type: web-api
strategy: cookie
auth_cookies: [A2]

args:
  limit:
    type: int
    default: 20
    description: Number of notifications

pipeline:
  - fetch:
      url: https://www.v2ex.com/api/v2/notifications
      params:
        p: "1"
      headers:
        Authorization: "Bearer ${{ args.token || '' }}"

  - select: result

  - map:
      id: ${{ item.id }}
      text: ${{ (item.text || '') | strip_html | slice(0, 150) }}
      member: ${{ item.member?.username || '' }}
      created: ${{ item.created }}

  - limit: ${{ args.limit }}

columns: [member, text, created]
