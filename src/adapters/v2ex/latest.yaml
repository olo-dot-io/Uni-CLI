site: v2ex
name: latest
description: V2EX latest topics
domain: www.v2ex.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20
    description: Number of topics

pipeline:
  - fetch:
      url: https://www.v2ex.com/api/topics/latest.json

  - map:
      id: ${{ item.id }}
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      node: ${{ item.node.title }}
      replies: ${{ item.replies }}
      url: ${{ item.url }}

  - limit: ${{ args.limit }}

columns: [id, rank, title, node, replies, url]
