site: v2ex
name: hot
description: V2EX hot topics
domain: www.v2ex.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 20
    description: Number of topics

pipeline:
  - fetch:
      url: https://www.v2ex.com/api/topics/hot.json

  - map:
      id: ${{ item.id }}
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      node: ${{ item.node.title }}
      replies: ${{ item.replies }}
      url: ${{ item.url }}

  - limit: ${{ args.limit }}

columns: [id, rank, title, node, replies, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
