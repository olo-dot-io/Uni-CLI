site: doubao-web
name: meeting-summary
description: Get Doubao meeting summary (Feishu Minutes integration)
domain: www.doubao.com
strategy: intercept
browser: true

args:
  url:
    type: str
    required: true
    positional: true
    description: Meeting/Minutes URL

columns: [title, summary, participants, duration]

pipeline:
  - navigate:
      url: ${{ args.url }}
      settleMs: 5000

  - evaluate: |
      (async () => {
        const clean = v => (v || '').replace(/\s+/g, ' ').trim();
        const title = clean(document.querySelector('h1, [class*="title"]')?.textContent);
        const summary = clean(document.querySelector('[class*="summary"], [class*="ai-summary"]')?.textContent).substring(0, 3000);
        const participants = clean(document.querySelector('[class*="participant"], [class*="attendee"]')?.textContent);
        const duration = clean(document.querySelector('[class*="duration"], [class*="time"]')?.textContent);
        return [{ title, summary, participants, duration }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
