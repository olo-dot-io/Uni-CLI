site: doubao-web
name: meeting-transcript
description: Get Doubao meeting transcript
domain: www.doubao.com
strategy: intercept
browser: true

args:
  url:
    type: str
    required: true
    positional: true
    description: Meeting/Minutes URL

columns: [rank, speaker, text, time]

pipeline:
  - navigate:
      url: ${{ args.url }}
      settleMs: 5000

  - evaluate: |
      (async () => {
        const clean = v => (v || '').replace(/\s+/g, ' ').trim();
        const segments = document.querySelectorAll('[class*="transcript-segment"], [class*="subtitle-item"], [class*="speech-item"]');
        return Array.from(segments).map((el, i) => ({
          rank: i + 1,
          speaker: clean(el.querySelector('[class*="speaker"], [class*="name"]')?.textContent),
          text: clean(el.querySelector('[class*="text"], [class*="content"]')?.textContent).substring(0, 500),
          time: clean(el.querySelector('[class*="time"], [class*="timestamp"]')?.textContent),
        })).filter(r => r.text);
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
