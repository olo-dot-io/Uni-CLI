site: doubao-web
name: new
description: Start a new Doubao chat conversation
domain: www.doubao.com
strategy: intercept
browser: true

columns: [status, url]

pipeline:
  - navigate:
      url: https://www.doubao.com/chat/new-thread/create-by-msg
      settleMs: 3000

  - evaluate: |
      (async () => {
        return [{ status: 'created', url: location.href }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
