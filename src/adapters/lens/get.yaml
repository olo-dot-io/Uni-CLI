# Lens.org single-record fetch.
#
# verification_status: blocked-by-subscription
#
# Lens "patent/search" is the only retrieval endpoint they expose publicly;
# get is implemented as a one-record query by `doc_key` (publication_number).
site: lens
name: get
description: Retrieve a single Lens.org patent record by publication number
domain: api.lens.org
type: web-api
strategy: header

args:
  publication_number:
    type: str
    required: true
    positional: true

pipeline:
  - fetch:
      url: https://api.lens.org/patent/search
      method: POST
      headers:
        Authorization: "Bearer ${{ env.LENS_API_TOKEN || '' }}"
        Content-Type: application/json
      body:
        query:
          term:
            doc_key: "${{ args.publication_number }}"
        size: 1

  - select: data

  - map:
      publication_number: "${{ item.doc_key || item.lens_id }}"
      title: "${{ item.biblio ? (item.biblio.invention_title ? item.biblio.invention_title[0].text : '') : '' }}"
      abstract: "${{ item.abstract ? item.abstract[0].text : '' }}"
      filing_date: "${{ item.biblio ? (item.biblio.application_reference ? item.biblio.application_reference.date : '') : '' }}"
      publication_date: "${{ item.date_published || '' }}"
      family_id: "${{ item.families ? item.families.simple_family.family_id : '' }}"
      source_url: "https://www.lens.org/lens/patent/${{ item.lens_id }}"
      source_adapter: lens
      retrieved_at: "${{ now }}"

  - limit: 1

columns: [publication_number, title, publication_date]

capabilities: ["http.fetch", "patent.get"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
