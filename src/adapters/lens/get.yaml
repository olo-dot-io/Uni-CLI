# Lens.org single-record fetch.
#
# verification_status: blocked-by-subscription
#
# Lens "patent/search" is the only retrieval endpoint they expose publicly;
# get is implemented as a one-record query by `doc_key` (publication_number).
site: lens
name: get
description: Retrieve a single Lens.org patent record by publication number
domain: api.lens.org
type: web-api
strategy: header

args:
  publication_number:
    type: str
    required: true
    positional: true

pipeline:
  - fetch:
      url: https://api.lens.org/patent/search
      method: POST
      headers:
        Authorization: "Bearer ${{ env.LENS_API_TOKEN || '' }}"
        Content-Type: application/json
      body:
        query:
          term:
            doc_key: "${{ args.publication_number }}"
        size: 1

  - select: data

  - map:
      publication_number: "${{ item.doc_key || item.lens_id }}"
      title: "${{ item.biblio ? (item.biblio.invention_title ? item.biblio.invention_title[0].text : '') : '' }}"
      abstract: "${{ item.abstract ? (Array.isArray(item.abstract) ? (item.abstract[0] && item.abstract[0].text) : item.abstract) : '' }}"
      kind_code: "${{ item.biblio && item.biblio.publication_reference ? (item.biblio.publication_reference.kind || '') : '' }}"
      filing_date: "${{ item.biblio ? (item.biblio.application_reference ? item.biblio.application_reference.date : '') : '' }}"
      publication_date: "${{ item.date_published || '' }}"
      priority_date: "${{ item.biblio && item.biblio.priority_claims && item.biblio.priority_claims.claims ? item.biblio.priority_claims.claims[0].date : '' }}"
      family_id: "${{ item.families ? item.families.simple_family.family_id : '' }}"
      inventors: "${{ JSON.stringify((function(){ var p=item.biblio && item.biblio.parties; if(!p || !p.inventors) return []; return p.inventors.map(i => ({ name: i.extracted_name ? (i.extracted_name.value || '') : (i.name || ''), country: i.residence || undefined })).filter(x => x.name); })()) }}"
      assignees: "${{ JSON.stringify((function(){ var p=item.biblio && item.biblio.parties; if(!p || !p.applicants) return []; return p.applicants.map(a => ({ name: a.extracted_name ? (a.extracted_name.value || '') : (a.name || ''), country: a.residence || undefined })).filter(x => x.name); })()) }}"
      classifications: "${{ JSON.stringify((function(){ var c = item.biblio && item.biblio.classifications_cpc && item.biblio.classifications_cpc.classifications; var out = []; if(c){ for (var i=0;i<c.length;i++) out.push({ scheme: 'cpc', code: c[i].symbol || '' }); } var ipc = item.biblio && item.biblio.classifications_ipcr && item.biblio.classifications_ipcr.classifications; if(ipc){ for (var j=0;j<ipc.length;j++) out.push({ scheme: 'ipc', code: ipc[j].symbol || '' }); } return out.filter(x => x.code); })()) }}"
      cited_by_count: "${{ item.biblio && item.biblio.cited_by ? (item.biblio.cited_by.patent_count || 0) : '' }}"
      cites_count: "${{ item.biblio && item.biblio.references_cited && item.biblio.references_cited.patent_count !== undefined ? item.biblio.references_cited.patent_count : '' }}"
      claims_count: "${{ item.claims_count !== undefined ? item.claims_count : '' }}"
      legal_status: "${{ item.legal_status ? (item.legal_status.patent_status || '') : '' }}"
      source_url: "https://www.lens.org/lens/patent/${{ item.lens_id }}"
      source_adapter: lens
      retrieved_at: "${{ now }}"

  - limit: 1

columns: [publication_number, title, publication_date]

capabilities: ["http.fetch", "patent.get"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
