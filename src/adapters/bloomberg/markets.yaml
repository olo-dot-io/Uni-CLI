site: bloomberg
name: markets
description: Bloomberg Markets top stories (RSS)
domain: feeds.bloomberg.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 10
    description: Number of stories

pipeline:
  - fetch_text:
      url: https://feeds.bloomberg.com/markets/news.rss
      headers:
        User-Agent: "Mozilla/5.0 (compatible; Uni-CLI)"

  - parse_rss: ~

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      description: ${{ item.description | truncate(200) }}
      url: ${{ item.link }}

  - limit: ${{ args.limit }}

columns: [rank, title, description, url]
