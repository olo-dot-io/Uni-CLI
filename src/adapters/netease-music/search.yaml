site: netease-music
name: search
description: Search songs on NetEase Cloud Music
type: web-api
domain: music.163.com
strategy: public
args:
  query:
    required: true
    positional: true
    description: Search keyword
  limit:
    required: false
    default: 20
pipeline:
  - fetch:
      url: "https://music.163.com/api/search/get/web?s=${{ args.query }}&type=1&offset=0&limit=${{ args.limit | default(20) }}"
      method: POST
      headers:
        Referer: "https://music.163.com"
        Content-Type: application/x-www-form-urlencoded
  - select: result.songs
  - map:
      name: "${{ item.name }}"
      artist: "${{ item.artists[0].name }}"
      album: "${{ item.album.name }}"
      id: "${{ item.id }}"
  - limit: "${{ args.limit | default(20) }}"
columns: [name, artist, album, id]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
