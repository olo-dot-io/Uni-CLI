site: pinduoduo
name: hot
description: Pinduoduo hot/trending products
type: web-api
domain: mobile.yangkeduo.com
strategy: cookie
args:
  limit:
    required: false
    default: 20
pipeline:
  - fetch:
      url: "https://mobile.yangkeduo.com/proxy/api/api/darwin/hot_search/list"
  - select: data.list
  - map:
      rank: "${{ index + 1 }}"
      keyword: "${{ item.keyword }}"
      heat: "${{ item.heat }}"
  - limit: "${{ args.limit | default(20) }}"
columns: [rank, keyword, heat]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
