site: yollomi
name: upscale
description: Upscale/enhance image resolution
domain: yollomi.com
strategy: intercept
browser: true

args:
  image:
    type: str
    required: true
    positional: true
    description: Image URL or local path

columns: [status, image_url]

pipeline:
  - navigate:
      url: https://yollomi.com
      settleMs: 3000

  - evaluate: |
      (async () => {
        const image = ${{ args.image | json }};
        const res = await fetch('/api/ai/image-upscaler', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image }),
        });
        if (!res.ok) throw new Error('Upscale failed: HTTP ' + res.status);
        const data = await res.json();
        return [{ status: 'success', image_url: data.images?.[0]?.url || data.url || '' }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
