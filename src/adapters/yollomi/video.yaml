site: yollomi
name: video
description: Generate video with Yollomi AI
domain: yollomi.com
strategy: intercept
browser: true

args:
  prompt:
    type: str
    required: true
    positional: true
    description: Video description prompt
  model:
    type: str
    default: wan-2-5-t2v
    description: "Model: wan-2-5-t2v, kling-2-1, pixverse-5, google-veo-3-fast"

columns: [status, model, video_url]

pipeline:
  - navigate:
      url: https://yollomi.com
      settleMs: 3000

  - evaluate: |
      (async () => {
        const prompt = ${{ args.prompt | json }};
        const model = ${{ args.model | json }};
        const res = await fetch('/api/ai/video', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, model }),
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error('Video gen failed: HTTP ' + res.status + ' ' + err.substring(0, 200));
        }
        const data = await res.json();
        const url = data.video?.url || data.output?.url || data.url || '';
        return [{ status: url ? 'success' : 'processing', model, video_url: url || 'Video is being generated...' }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
