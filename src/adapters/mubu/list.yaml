site: mubu
name: list
description: List Mubu documents
domain: mubu.com
strategy: intercept
browser: true

args:
  limit:
    type: int
    default: 20
    description: Number of documents

columns: [rank, title, updated, url]

pipeline:
  - navigate:
      url: https://mubu.com/app
      settleMs: 4000

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};
        const clean = v => (v || '').replace(/\s+/g, ' ').trim();
        const items = document.querySelectorAll('[class*="doc-item"], [class*="document-item"], [class*="file-item"]');
        return Array.from(items).slice(0, limit).map((item, i) => {
          const link = item.querySelector('a') || item.closest('a');
          const title = clean(item.querySelector('[class*="title"], [class*="name"]')?.textContent);
          const updated = clean(item.querySelector('[class*="time"], [class*="date"], [class*="update"]')?.textContent);
          return {
            rank: i + 1, title,
            updated,
            url: link?.href || '',
          };
        }).filter(r => r.title);
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
