site: paperreview
name: review
description: Submit a paper for AI review
type: web-api
strategy: public

pipeline:
  - fetch:
      url: "https://api.paperreview.ai/v1/review"
      method: POST
      body:
        paper_url: "${{ args.url }}"
        focus: "${{ args.focus }}"
      headers:
        Content-Type: application/json
        Authorization: "Bearer ${{ args.apikey }}"
  - select: data

args:
  url:
    type: str
    required: true
    positional: true
    description: URL or arXiv ID of paper
  focus:
    type: str
    default: general
    description: "Review focus (general, methodology, writing, novelty)"
  apikey:
    type: str
    default: ""

columns: [score, summary, strengths, weaknesses]
