site: paperreview
name: feedback
description: Submit a paper draft for AI feedback
type: web-api
strategy: public

pipeline:
  - fetch:
      url: "https://api.paperreview.ai/v1/feedback"
      method: POST
      body:
        paper_url: "${{ args.url }}"
        draft_text: "${{ args.draft }}"
      headers:
        Content-Type: application/json
        Authorization: "Bearer ${{ args.apikey }}"
  - select: data

args:
  url:
    type: str
    required: true
    positional: true
    description: URL or arXiv ID of paper
    format: uri
    x-unicli-accepts: [id]
  draft:
    type: str
    required: true
    description: Draft text to receive feedback on
  apikey:
    type: str
    default: ""

columns: [score, summary, strengths, weaknesses]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
