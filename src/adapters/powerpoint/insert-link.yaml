site: powerpoint
name: insert-link
description: Insert linked text on the active Microsoft PowerPoint slide
type: desktop
strategy: public
binary: osascript
detect: "test $(uname) = Darwin"

args:
  url:
    type: str
    required: true
    positional: true
    description: Link URL or file URL
  text:
    type: str
    required: false
    default: ""
    description: Display text; defaults to the URL

pipeline:
  - exec:
      command: osascript
      args:
        - "-e"
        - |
          on replace_text(theText, searchString, replacementString)
            set AppleScript's text item delimiters to searchString
            set parts to text items of (theText as text)
            set AppleScript's text item delimiters to replacementString
            set outText to parts as text
            set AppleScript's text item delimiters to ""
            return outText
          end replace_text

          on json_string(valueText)
            set s to valueText as text
            set s to my replace_text(s, "\\", "\\\\")
            set s to my replace_text(s, "\"", "\\\"")
            set s to my replace_text(s, return, "\\n")
            set s to my replace_text(s, linefeed, "\\n")
            set s to my replace_text(s, tab, "\\t")
            return "\"" & s & "\""
          end json_string

          set linkUrl to system attribute "UNICLI_URL"
          set linkText to system attribute "UNICLI_TEXT"
          if linkText is "" then set linkText to linkUrl

          try
            with timeout of 10 seconds
              tell application "Microsoft PowerPoint"
                activate
                if (count presentations) is 0 then make new presentation
                set p to active presentation
                if (count slides of p) is 0 then make new slide at end of p with properties {layout:slide layout text slide}
                set s to slide (count slides of p) of p
                set linkShape to missing value
                repeat with i from 1 to count shapes of s
                  set shp to shape i of s
                  if (has text frame of shp) is true then
                    set linkShape to shp
                    exit repeat
                  end if
                end repeat
                if linkShape is missing value then
                  set s to make new slide at end of p with properties {layout:slide layout text slide}
                  set linkShape to shape 1 of s
                end if
                set tr to text range of text frame of linkShape
                set content of tr to linkText
                set clickAction to get action setting for linkShape event mouse activation mouse click
                set action of clickAction to action type hyperlink action
                set hyperlink address of hyperlink of clickAction to linkUrl
                return "[{\"presentation\":" & my json_string(name of p as text) & ",\"slide_index\":" & (slide index of s) & ",\"url\":" & my json_string(linkUrl) & ",\"text\":" & my json_string(linkText) & "}]"
              end tell
            end timeout
          on error errMsg number errNum
            return "[{\"ok\":false,\"code\":\"office_automation_unavailable\",\"message\":" & my json_string(errMsg) & ",\"number\":" & errNum & "}]"
          end try
      env:
        UNICLI_URL: "${{ args.url }}"
        UNICLI_TEXT: "${{ args.text }}"
      parse: json
      timeout: 15000

columns: [presentation, slide_index, url, text]

capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: private
quarantine: false
schema_version: v2
