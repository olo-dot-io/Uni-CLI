site: powerpoint
name: set-font
description: Apply a font to text on the active Microsoft PowerPoint slide
type: desktop
strategy: public
binary: osascript
detect: "test $(uname) = Darwin"

args:
  font:
    type: str
    required: true
    positional: true
    description: Font family to apply
  size:
    type: str
    required: false
    default: ""
    description: Optional font size in points
  text:
    type: str
    required: false
    default: ""
    description: Optional text filter; defaults to all text on the active slide

pipeline:
  - exec:
      command: osascript
      args:
        - "-e"
        - |
          on replace_text(theText, searchString, replacementString)
            set AppleScript's text item delimiters to searchString
            set parts to text items of (theText as text)
            set AppleScript's text item delimiters to replacementString
            set outText to parts as text
            set AppleScript's text item delimiters to ""
            return outText
          end replace_text

          on json_string(valueText)
            set s to valueText as text
            set s to my replace_text(s, "\\", "\\\\")
            set s to my replace_text(s, "\"", "\\\"")
            set s to my replace_text(s, return, "\\n")
            set s to my replace_text(s, linefeed, "\\n")
            set s to my replace_text(s, tab, "\\t")
            return "\"" & s & "\""
          end json_string

          set fontName to system attribute "UNICLI_FONT"
          set sizeText to system attribute "UNICLI_SIZE"
          set targetText to system attribute "UNICLI_TEXT"

          try
            with timeout of 10 seconds
              tell application "Microsoft PowerPoint"
                activate
                if (count presentations) is 0 then return "[]"
                set p to active presentation
                if (count slides of p) is 0 then make new slide at end of p with properties {layout:slide layout text slide}
                set s to slide (count slides of p) of p
                set appliedCount to 0
                repeat with i from 1 to count shapes of s
                  set shp to shape i of s
                  if (has text frame of shp) is true then
                    set tf to text frame of shp
                    if (has text of tf) is true then
                      set tr to text range of tf
                      set shapeText to content of tr as text
                      if targetText is "" or shapeText contains targetText then
                        set f to font of tr
                        set font name of f to fontName
                        if sizeText is not "" then set font size of f to (sizeText as real)
                        set appliedCount to appliedCount + 1
                      end if
                    end if
                  end if
                end repeat
                if appliedCount is 0 then error "No matching PowerPoint text found"
                return "[{\"presentation\":" & my json_string(name of p as text) & ",\"slide_index\":" & (slide index of s) & ",\"font\":" & my json_string(fontName) & ",\"size\":" & my json_string(sizeText) & ",\"shapes\":" & appliedCount & "}]"
              end tell
            end timeout
          on error errMsg number errNum
            return "[{\"ok\":false,\"code\":\"office_automation_unavailable\",\"message\":" & my json_string(errMsg) & ",\"number\":" & errNum & "}]"
          end try
      env:
        UNICLI_FONT: "${{ args.font }}"
        UNICLI_SIZE: "${{ args.size }}"
        UNICLI_TEXT: "${{ args.text }}"
      parse: json
      timeout: 15000

columns: [presentation, slide_index, font, size, shapes]

capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: private
quarantine: false
schema_version: v2
