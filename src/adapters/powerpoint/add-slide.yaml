site: powerpoint
name: add-slide
description: Append a title/body slide to the active Microsoft PowerPoint presentation
type: desktop
strategy: public
binary: osascript
detect: "test $(uname) = Darwin"

args:
  title:
    type: str
    required: true
    positional: true
    description: Slide title
  body:
    type: str
    required: false
    default: ""
    description: Slide body text

pipeline:
  - exec:
      command: osascript
      args:
        - "-e"
        - |
          on replace_text(theText, searchString, replacementString)
            set AppleScript's text item delimiters to searchString
            set parts to text items of (theText as text)
            set AppleScript's text item delimiters to replacementString
            set outText to parts as text
            set AppleScript's text item delimiters to ""
            return outText
          end replace_text

          on json_string(valueText)
            set s to valueText as text
            set s to my replace_text(s, "\\", "\\\\")
            set s to my replace_text(s, "\"", "\\\"")
            set s to my replace_text(s, return, "\\n")
            set s to my replace_text(s, linefeed, "\\n")
            set s to my replace_text(s, tab, "\\t")
            return "\"" & s & "\""
          end json_string

          set slideTitle to system attribute "UNICLI_TITLE"
          set slideBody to system attribute "UNICLI_BODY"

          try
            with timeout of 20 seconds
              tell application "Microsoft PowerPoint"
                activate
                if (count presentations) is 0 then make new presentation
                set p to active presentation
                set newSlide to make new slide at end of p with properties {layout:slide layout text slide}
                set wroteTitle to false
                set wroteBody to false
                repeat with i from 1 to count shapes of newSlide
                  set shp to shape i of newSlide
                  if (has text frame of shp) is true then
                    if wroteTitle is false then
                      set tr to text range of text frame of shp
                      set content of tr to slideTitle
                      set wroteTitle to true
                    else if wroteBody is false and slideBody is not "" then
                      set tr to text range of text frame of shp
                      set content of tr to slideBody
                      set wroteBody to true
                    end if
                  end if
                end repeat
                if wroteTitle is false then error "PowerPoint created slide without a writable title placeholder"
                if slideBody is not "" and wroteBody is false then error "PowerPoint created slide without a writable body placeholder"
                return "[{\"presentation\":" & my json_string(name of p as text) & ",\"slide_index\":" & (slide index of newSlide) & ",\"title\":" & my json_string(slideTitle) & ",\"body_chars\":" & (length of slideBody) & "}]"
              end tell
            end timeout
          on error errMsg number errNum
            return "[{\"ok\":false,\"code\":\"office_automation_unavailable\",\"message\":" & my json_string(errMsg) & ",\"number\":" & errNum & "}]"
          end try
      env:
        UNICLI_TITLE: "${{ args.title }}"
        UNICLI_BODY: "${{ args.body }}"
      parse: json
      timeout: 30000

columns: [presentation, slide_index, title, body_chars]

capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: private
quarantine: false
schema_version: v2
