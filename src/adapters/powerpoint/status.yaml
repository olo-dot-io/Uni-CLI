site: powerpoint
name: status
description: Check Microsoft PowerPoint running state without enumerating presentations
type: desktop
strategy: public
binary: osascript
detect: "test $(uname) = Darwin"

pipeline:
  - exec:
      command: osascript
      args:
        - "-l"
        - "JavaScript"
        - "-e"
        - |
          var app = Application('Microsoft PowerPoint');
          JSON.stringify([{ app: 'Microsoft PowerPoint', bundle_id: app.id(), running: app.running() }]);
      parse: json
      timeout: 10000

columns: [app, bundle_id, running]

capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: private
quarantine: false
schema_version: v2
