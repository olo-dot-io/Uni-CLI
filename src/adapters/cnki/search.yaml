site: cnki
name: search
description: Search CNKI academic papers
domain: scholar.cnki.net
type: web-api
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
    description: Search query
  limit:
    type: int
    default: 20
    description: Maximum results

pipeline:
  - fetch:
      url: https://scholar.cnki.net/api/search
      params:
        q: "${{ args.query }}"
        page: "1"
        size: "${{ args.limit }}"
        sort: relevant

  - select: data.items

  - map:
      rank: ${{ index + 1 }}
      title: "${{ (item.title || '') | strip_html }}"
      authors: "${{ (item.authors || []).map(a => a.name).join(', ') }}"
      source: "${{ item.publicationName || '' }}"
      year: "${{ item.year || '' }}"
      citations: ${{ item.citedCount || 0 }}

  - limit: ${{ args.limit }}

columns: [rank, title, authors, source, year, citations]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
