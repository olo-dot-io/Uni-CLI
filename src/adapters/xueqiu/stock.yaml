site: xueqiu
name: stock
description: Xueqiu stock detail quote
domain: xueqiu.com
type: web-api
strategy: cookie
auth_cookies: [xq_a_token]

args:
  symbol:
    required: true
    positional: true
    description: "Stock symbol (e.g. SH600519, AAPL, 00700)"

pipeline:
  - fetch:
      url: https://stock.xueqiu.com/v5/stock/quote.json
      params:
        symbol: "${{ args.symbol }}"
        extend: detail

  - select: data.quote

  - map:
      symbol: ${{ item.symbol }}
      name: ${{ item.name }}
      current: ${{ item.current }}
      percent: ${{ item.percent }}
      chg: ${{ item.chg }}
      high: ${{ item.high }}
      low: ${{ item.low }}
      open: ${{ item.open }}
      volume: ${{ item.volume }}
      market_capital: ${{ item.market_capital }}

columns: [symbol, name, current, percent, chg, high, low, volume]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
