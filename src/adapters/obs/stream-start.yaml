# Service adapter — start OBS streaming
site: obs
name: stream-start
description: Start OBS streaming
type: service

args:
  port:
    type: int
    default: 4455
    description: OBS WebSocket port

pipeline:
  - websocket:
      url: "ws://localhost:${{ args.port }}"
      auth:
        password_env: OBS_WS_PASSWORD
      send: '{"op":6,"d":{"requestType":"StartStream","requestId":"1"}}'
      parse: json
      timeout: 10000

columns: [result]
