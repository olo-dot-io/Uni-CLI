# Service adapter — stop OBS recording
site: obs
name: record-stop
description: Stop OBS recording and return output file path
type: service

args:
  port:
    type: int
    default: 4455
    description: OBS WebSocket port

pipeline:
  - websocket:
      url: "ws://localhost:${{ args.port }}"
      auth:
        password_env: OBS_WS_PASSWORD
      send: '{"op":6,"d":{"requestType":"StopRecord","requestId":"1"}}'
      parse: json
      timeout: 10000

  - select: "d.responseData"

  - map:
      output_path: "${{ item.outputPath }}"

columns: [output_path]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["net.websocket"]
minimum_capability: net.websocket
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
