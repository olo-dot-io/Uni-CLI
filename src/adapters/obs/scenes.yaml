# Service adapter — list OBS scenes via obs-websocket 5.x
site: obs
name: scenes
description: List all OBS scenes
type: service

args:
  port:
    type: int
    default: 4455
    description: OBS WebSocket port

pipeline:
  - websocket:
      url: "ws://localhost:${{ args.port }}"
      auth:
        password_env: OBS_WS_PASSWORD
      send: '{"op":6,"d":{"requestType":"GetSceneList","requestId":"1"}}'
      parse: json
      timeout: 5000

  - select: "d.responseData"

  - map:
      current: "${{ item.currentProgramSceneName }}"
      scenes: "${{ item.scenes }}"

columns: [current, scenes]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["net.websocket"]
minimum_capability: net.websocket
trust: public
confidentiality: public
quarantine: false
