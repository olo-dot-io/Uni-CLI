# Service adapter — get OBS streaming/recording status
site: obs
name: status
description: Get current OBS streaming and recording status
type: service

args:
  port:
    type: int
    default: 4455
    description: OBS WebSocket port

pipeline:
  - websocket:
      url: "ws://localhost:${{ args.port }}"
      auth:
        password_env: OBS_WS_PASSWORD
      send: '{"op":6,"d":{"requestType":"GetStreamStatus","requestId":"1"}}'
      parse: json
      timeout: 5000

  - select: "d.responseData"

  - map:
      streaming: "${{ item.outputActive }}"
      duration: "${{ item.outputDuration }}"
      bytes: "${{ item.outputBytes }}"
      reconnecting: "${{ item.outputReconnecting }}"

columns: [streaming, duration, bytes, reconnecting]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["net.websocket"]
minimum_capability: net.websocket
trust: public
confidentiality: public
quarantine: false
schema_version: v2
