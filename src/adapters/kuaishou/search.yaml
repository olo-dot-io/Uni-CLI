site: kuaishou
name: search
description: Search Kuaishou videos
domain: www.kuaishou.com
strategy: intercept
browser: true

args:
  query:
    type: str
    required: true
    positional: true
    description: Search keyword
  limit:
    type: int
    default: 20
    description: Number of results

columns: [rank, title, author, likes, url]

pipeline:
  - navigate:
      url: https://www.kuaishou.com/search/video?searchKey=${{ args.query | urlencode }}
      settleMs: 4000

  - scroll:
      times: 2

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};
        const clean = v => (v || '').replace(/\s+/g, ' ').trim();
        const cards = document.querySelectorAll('[class*="video-card"], [class*="search-result-item"], a[href*="/short-video/"]');
        return Array.from(cards).slice(0, limit).map((card, i) => {
          const title = clean(card.querySelector('[class*="title"], [class*="caption"], [class*="desc"]')?.textContent);
          const author = clean(card.querySelector('[class*="author"], [class*="nickname"]')?.textContent);
          const likes = clean(card.querySelector('[class*="like"], [class*="count"]')?.textContent);
          const link = card.querySelector('a[href*="/short-video/"]') || card.closest('a');
          return {
            rank: i + 1, title: title.substring(0, 100), author, likes,
            url: link?.href || '',
          };
        }).filter(r => r.title || r.author);
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities:
  ["cdp-browser.evaluate", "cdp-browser.navigate", "cdp-browser.scroll"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
