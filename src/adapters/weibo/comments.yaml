site: weibo
name: comments
description: Weibo post comments
domain: weibo.com
type: web-api
strategy: cookie
auth_cookies: [SUB, SUBP]

args:
  id:
    required: true
    positional: true
    description: Weibo post ID
  limit:
    type: int
    default: 20
    description: Number of comments

pipeline:
  - fetch:
      url: https://weibo.com/ajax/statuses/buildComments
      params:
        id: "${{ args.id }}"
        is_show_bulletin: "2"
        count: "${{ args.limit }}"

  - select: data

  - map:
      user: ${{ item.user?.screen_name || '' }}
      text: ${{ (item.text || '') | strip_html }}
      likes: ${{ item.like_counts || 0 }}
      created: ${{ item.created_at }}

  - limit: ${{ args.limit }}

columns: [user, text, likes, created]
