site: weibo
name: search
description: Search Weibo posts by keyword
domain: weibo.com
type: web-api
strategy: cookie
auth_cookies: [SUB, SUBP]

args:
  keyword:
    required: true
    positional: true
    description: Search keyword
  limit:
    type: int
    default: 20
    description: Number of results

pipeline:
  - fetch:
      url: https://weibo.com/ajax/side/search
      params:
        q: "${{ args.keyword }}"

  - select: data.cards

  - map:
      title: ${{ (item.title || item.word || '') | strip_html }}
      scheme: ${{ item.scheme || '' }}

  - limit: ${{ args.limit }}

columns: [title, scheme]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
