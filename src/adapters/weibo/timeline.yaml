site: weibo
name: timeline
description: Weibo home timeline feed
domain: weibo.com
type: web-api
strategy: cookie
auth_cookies: [SUB, SUBP]

args:
  limit:
    type: int
    default: 20
    description: Number of posts

pipeline:
  - fetch:
      url: https://weibo.com/ajax/feed/friendstimeline
      params:
        list_id: "0"
        since_id: "0"
        count: "${{ args.limit }}"

  - select: data.statuses

  - map:
      id: ${{ item.id }}
      author: ${{ item.user?.screen_name || '' }}
      text: ${{ (item.text || '') | strip_html }}
      reposts: ${{ item.reposts_count }}
      comments: ${{ item.comments_count }}
      likes: ${{ item.attitudes_count }}
      created: ${{ item.created_at }}

  - limit: ${{ args.limit }}

columns: [author, text, reposts, comments, likes, created]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
