site: weibo
name: trending
description: Weibo trending topics (real-time hot search)
domain: weibo.com
type: web-api
strategy: public

args:
  limit:
    type: int
    default: 50

pipeline:
  - fetch:
      url: https://weibo.com/ajax/side/hotSearch

  - select: data.realtime

  - map:
      rank: ${{ item.rank || index + 1 }}
      keyword: "${{ item.word || item.note || '' }}"
      category: "${{ item.category || '' }}"
      num: "${{ item.num || item.raw_hot || '' }}"
      label: "${{ item.label_name || '' }}"

  - limit: ${{ args.limit }}

columns: [rank, keyword, num, category, label]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
