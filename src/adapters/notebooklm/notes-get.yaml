site: notebooklm
name: notes-get
description: Get a specific note from NotebookLM
domain: notebooklm.google.com
strategy: intercept
browser: true

args:
  id:
    type: str
    required: true
    positional: true
    description: Notebook ID
    x-unicli-kind: id
  index:
    type: int
    default: 0
    description: Note index (0-based)

columns: [title, content]

pipeline:
  - navigate:
      url: https://notebooklm.google.com/notebook/${{ args.id }}
      settleMs: 4000

  - evaluate: |
      (async () => {
        const idx = ${{ args.index }};
        const studioBtn = document.querySelector('[class*="studio"], [aria-label*="Studio"], [aria-label*="Notes"]');
        if (studioBtn) { studioBtn.click(); await new Promise(r => setTimeout(r, 2000)); }
        const items = document.querySelectorAll('[class*="note-item"], [class*="NoteListItem"]');
        if (idx >= items.length) throw new Error('Note index out of range');
        items[idx].click();
        await new Promise(r => setTimeout(r, 2000));
        const editor = document.querySelector('[class*="note-editor"], [class*="NoteEditor"], [contenteditable="true"]');
        const title = (document.querySelector('[class*="note-title"]')?.textContent || '').trim();
        const content = (editor?.textContent || '').replace(/\s+/g, ' ').trim().substring(0, 5000);
        return [{ title, content }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
