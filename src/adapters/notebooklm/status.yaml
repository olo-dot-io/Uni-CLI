site: notebooklm
name: status
description: Check NotebookLM login status
domain: notebooklm.google.com
strategy: intercept
browser: true

columns: [logged_in, account, url]

pipeline:
  - navigate:
      url: https://notebooklm.google.com/
      settleMs: 3000

  - evaluate: |
      (async () => {
        const isLogin = !location.href.includes('/signin') && !location.href.includes('accounts.google.com');
        const account = (document.querySelector('[class*="account"], [aria-label*="Account"], img[alt*="@"]')?.getAttribute('aria-label') || '').trim();
        return [{ logged_in: isLogin ? 'Yes' : 'No', account, url: location.href }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
