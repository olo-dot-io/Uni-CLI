site: notebooklm
name: note-list
description: List notes in a NotebookLM notebook
domain: notebooklm.google.com
strategy: intercept
browser: true

args:
  id:
    type: str
    required: true
    positional: true
    description: Notebook ID

columns: [rank, title, created, url]

pipeline:
  - navigate:
      url: https://notebooklm.google.com/notebook/${{ args.id }}
      settleMs: 4000

  - evaluate: |
      (async () => {
        const studioBtn = document.querySelector('[class*="studio"], [aria-label*="Studio"], [aria-label*="Notes"]');
        if (studioBtn) { studioBtn.click(); await new Promise(r => setTimeout(r, 2000)); }
        const items = document.querySelectorAll('[class*="note-item"], [class*="NoteListItem"], [class*="studio-item"]');
        return Array.from(items).map((el, i) => ({
          rank: i + 1,
          title: (el.querySelector('[class*="title"]')?.textContent || el.textContent || '').replace(/\s+/g, ' ').trim().substring(0, 100),
          created: '',
          url: location.href,
        }));
      })()
