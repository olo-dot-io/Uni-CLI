site: notebooklm
name: source-get
description: Get a specific source from NotebookLM
domain: notebooklm.google.com
strategy: intercept
browser: true

args:
  id:
    type: str
    required: true
    positional: true
    description: Notebook ID
  index:
    type: int
    default: 0
    description: Source index (0-based)

columns: [title, type, content_preview]

pipeline:
  - navigate:
      url: https://notebooklm.google.com/notebook/${{ args.id }}
      settleMs: 4000

  - evaluate: |
      (async () => {
        const idx = ${{ args.index }};
        const items = document.querySelectorAll('[class*="source-item"], [class*="SourceListItem"]');
        if (idx >= items.length) throw new Error('Source index out of range. Found ' + items.length + ' sources.');
        const el = items[idx];
        el.click();
        await new Promise(r => setTimeout(r, 2000));
        const panel = document.querySelector('[class*="source-viewer"], [class*="source-detail"], [class*="SourcePanel"]');
        const title = (panel?.querySelector('[class*="title"]')?.textContent || el.textContent || '').trim().substring(0, 100);
        const content = (panel?.textContent || '').replace(/\s+/g, ' ').trim().substring(0, 1000);
        return [{ title, type: '', content_preview: content }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
