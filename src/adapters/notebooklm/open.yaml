site: notebooklm
name: open
description: Open a NotebookLM notebook by ID
domain: notebooklm.google.com
strategy: intercept
browser: true

args:
  id:
    type: str
    required: true
    positional: true
    description: Notebook ID

columns: [status, id, title, url]

pipeline:
  - navigate:
      url: https://notebooklm.google.com/notebook/${{ args.id }}
      settleMs: 4000

  - evaluate: |
      (async () => {
        const id = ${{ args.id | json }};
        const title = document.title.replace(/ - NotebookLM$/, '').trim();
        return [{ status: 'opened', id, title, url: location.href }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
