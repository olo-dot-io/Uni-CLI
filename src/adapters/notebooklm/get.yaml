site: notebooklm
name: get
description: Get NotebookLM notebook details
domain: notebooklm.google.com
strategy: intercept
browser: true

args:
  id:
    type: str
    required: true
    positional: true
    description: Notebook ID

columns: [id, title, source_count, url]

pipeline:
  - navigate:
      url: https://notebooklm.google.com/notebook/${{ args.id }}
      settleMs: 4000

  - evaluate: |
      (async () => {
        const id = ${{ args.id | json }};
        const title = document.title.replace(/ - NotebookLM$/, '').trim();
        const sources = document.querySelectorAll('[class*="source-item"], [class*="SourceListItem"]').length;
        return [{
          id,
          title,
          source_count: sources,
          url: location.href,
        }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
