site: notebooklm
name: source-guide
description: Get NotebookLM source study guide
domain: notebooklm.google.com
strategy: intercept
browser: true

args:
  id:
    type: str
    required: true
    positional: true
    description: Notebook ID
  index:
    type: int
    default: 0
    description: Source index (0-based)

columns: [title, summary, keywords]

pipeline:
  - navigate:
      url: https://notebooklm.google.com/notebook/${{ args.id }}
      settleMs: 4000

  - evaluate: |
      (async () => {
        const idx = ${{ args.index }};
        const items = document.querySelectorAll('[class*="source-item"], [class*="SourceListItem"]');
        if (idx >= items.length) throw new Error('Source index out of range');
        items[idx].click();
        await new Promise(r => setTimeout(r, 2000));
        const guideBtn = document.querySelector('[class*="guide"], button[aria-label*="guide"]');
        if (guideBtn) { guideBtn.click(); await new Promise(r => setTimeout(r, 3000)); }
        const panel = document.querySelector('[class*="source-viewer"], [class*="guide-panel"], [class*="SourcePanel"]');
        const title = (panel?.querySelector('[class*="title"]')?.textContent || '').trim();
        const summary = (panel?.textContent || '').replace(/\s+/g, ' ').trim().substring(0, 2000);
        return [{ title, summary, keywords: '' }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
