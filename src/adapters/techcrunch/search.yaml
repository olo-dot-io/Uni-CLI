site: techcrunch
name: search
description: Search TechCrunch articles
domain: techcrunch.com
type: web-api
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
  limit:
    type: int
    default: 10

pipeline:
  - fetch:
      url: https://techcrunch.com/wp-json/wp/v2/posts
      params:
        search: "${{ args.query }}"
        per_page: "${{ args.limit }}"
        _fields: "title,link,date,excerpt"

  - map:
      title: "${{ item.title ? item.title.rendered : '' }}"
      date: ${{ item.date }}
      excerpt: "${{ item.excerpt ? (item.excerpt.rendered || '') | strip_html | truncate(120) : '' }}"
      url: ${{ item.link }}

  - limit: ${{ args.limit }}

columns: [title, date, excerpt, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
