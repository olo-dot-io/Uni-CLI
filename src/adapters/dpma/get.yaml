# @owner       src::adapters::dpma::get
# @does        Fetch a German patent record by publication number via DPMAconnectPlus REST.
# @needs       src/engine/steps/fetch.ts, src/engine/steps/select-xml.ts, src/engine/steps/map.ts
# @feeds       src/commands/patent.ts
# @breaks      throws PipelineError on 401/403, 404, 5xx
# @invariants  output row conforms to PatentRecord
# @side-effects reads env DPMA_AUTHORIZATION; HTTPS egress to dpmaconnect.dpma.de
# @perf        single request
# @concurrency safe
# @test        none yet
# @stability   stable
# @since       2026-05-18
# @verification blocked-by-subscription
site: dpma
name: get
description: Fetch a German patent record by publication number (subscription)
domain: dpmaconnect.dpma.de
type: web-api
strategy: public
lint_listing_detail: skip

args:
  publication_number:
    type: str
    required: true
    positional: true
    description: German publication number (e.g. DE102023012345)

pipeline:
  - fetch:
      url: "https://dpmaconnect.dpma.de/dpmaconnectplus/rest/document/${{ args.publication_number | urlencode }}"
      method: GET
      headers:
        Accept: application/xml
        Authorization: "${{ env.DPMA_AUTHORIZATION || '' }}"

  - select-xml:
      xpath: "//record"
      unwrap_single: true

  - map:
      publication_number: "${{ 'DE-' + (item.publicationNumber || args.publication_number || '') + '-' + (item.kindCode || '') }}"
      application_number: "${{ item.applicationNumber || '' }}"
      title: "${{ item.title || item.titleDe || item.titleEn || '' }}"
      abstract: "${{ item.abstract || item.abstractDe || item.abstractEn || '' }}"
      kind_code: "${{ item.kindCode || '' }}"
      filing_date: "${{ item.filingDate || '' }}"
      publication_date: "${{ item.publicationDate || '' }}"
      grant_date: "${{ item.grantDate || '' }}"
      priority_date: "${{ item.priorityDate || '' }}"
      legal_status: "${{ item.legalStatus || item.status || '' }}"
      inventors: "${{ JSON.stringify((function(){ var i=item.inventor || item.inventors; if(!i) return []; var arr = Array.isArray(i) ? i : [i]; return arr.map(n => ({ name: typeof n === 'string' ? n : (n.name || n.fullName || ''), country: 'DE' })).filter(x => x.name); })()) }}"
      assignees: "${{ JSON.stringify((function(){ var a=item.applicant || item.applicants; if(!a) return []; var arr = Array.isArray(a) ? a : [a]; return arr.map(n => ({ name: typeof n === 'string' ? n : (n.name || n.fullName || ''), country: 'DE' })).filter(x => x.name); })()) }}"
      classifications: "${{ JSON.stringify((function(){ var c=item.ipc || item.classifications; if(!c) return []; var arr = Array.isArray(c) ? c : [c]; return arr.map(x => ({ scheme: 'ipc', code: typeof x === 'string' ? x : (x.code || '') })).filter(x => x.code); })()) }}"
      source_adapter: dpma
      source_url: "${{ 'https://register.dpma.de/DPMAregister/pat/register?AKZ=' + (item.applicationNumber || '') }}"
      retrieved_at: ""

columns: [publication_number, title, filing_date, publication_date]

# schema-v2 metadata
capabilities: ["http.fetch", "patent.get"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
