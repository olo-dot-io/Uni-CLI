site: devto
name: search
description: Search Dev.to articles
type: web-api
domain: dev.to
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: https://dev.to/api/articles
      params:
        tag: "${{ args.query }}"
        per_page: "${{ args.limit }}"

  - map:
      title: ${{ item.title }}
      author: "${{ item.user ? item.user.name : '' }}"
      reactions: ${{ item.positive_reactions_count }}
      comments: ${{ item.comments_count }}
      published: ${{ item.published_at }}
      url: ${{ item.url }}

  - limit: ${{ args.limit }}

columns: [title, author, reactions, comments, published]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
