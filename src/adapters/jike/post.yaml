site: jike
name: post
description: Jike post detail with comments
domain: m.okjike.com
type: browser
strategy: cookie
auth_cookies: [accessToken]

args:
  id:
    positional: true
    type: str
    required: true
    description: Post ID (from post URL)
    x-unicli-kind: id
    x-unicli-accepts: [url]

pipeline:
  - navigate: https://m.okjike.com/originalPosts/${{ args.id }}

  - evaluate: |
      (() => {
        try {
          const el = document.querySelector('script[type="application/json"]');
          if (!el) return [];
          const data = JSON.parse(el.textContent);
          const pageProps = data?.props?.pageProps || {};
          const post = pageProps.post || {};
          const comments = pageProps.comments || [];

          const result = [{
            type: 'post',
            author: post.user?.screenName || '',
            content: post.content || '',
            likes: post.likeCount || 0,
            time: post.createdAt || '',
          }];

          for (const c of comments) {
            result.push({
              type: 'comment',
              author: c.user?.screenName || '',
              content: (c.content || '').replace(/\n/g, ' '),
              likes: c.likeCount || 0,
              time: c.createdAt || '',
            });
          }

          return result;
        } catch (e) {
          return [];
        }
      })()

  - map:
      type: ${{ item.type }}
      author: ${{ item.author }}
      content: ${{ item.content }}
      likes: ${{ item.likes }}
      time: ${{ item.time }}

columns: [type, author, content, likes, time]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
