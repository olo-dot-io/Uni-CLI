site: jike
name: topic
description: Jike topic/group posts
domain: m.okjike.com
type: browser
strategy: cookie
auth_cookies: [accessToken]

args:
  id:
    positional: true
    type: str
    required: true
    description: Topic ID (from topic URL)
  limit:
    type: int
    default: 20
    description: Number of posts

pipeline:
  - navigate: https://m.okjike.com/topics/${{ args.id }}

  - evaluate: |
      (() => {
        try {
          const el = document.querySelector('script[type="application/json"]');
          if (!el) return [];
          const data = JSON.parse(el.textContent);
          const pageProps = data?.props?.pageProps || {};
          const posts = pageProps.posts || [];
          return posts.map(p => ({
            content: (p.content || '').replace(/\n/g, ' ').slice(0, 80),
            author: p.user?.screenName || '',
            likes: p.likeCount || 0,
            comments: p.commentCount || 0,
            time: p.actionTime || p.createdAt || '',
            id: p.id || '',
          }));
        } catch (e) {
          return [];
        }
      })()

  - map:
      content: ${{ item.content }}
      author: ${{ item.author }}
      likes: ${{ item.likes }}
      comments: ${{ item.comments }}
      time: ${{ item.time }}
      url: https://web.okjike.com/originalPost/${{ item.id }}

  - limit: ${{ args.limit }}

columns: [content, author, likes, comments, time, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
