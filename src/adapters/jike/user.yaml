site: jike
name: user
description: Jike user posts
domain: m.okjike.com
type: browser
strategy: cookie
auth_cookies: [accessToken]

args:
  username:
    positional: true
    type: str
    required: true
    description: Username from profile URL
  limit:
    type: int
    default: 20
    description: Number of posts

pipeline:
  - navigate: https://m.okjike.com/users/${{ args.username }}

  - evaluate: |
      (() => {
        try {
          const el = document.querySelector('script[type="application/json"]');
          if (!el) return [];
          const data = JSON.parse(el.textContent);
          const posts = data?.props?.pageProps?.posts || [];
          return posts.map(p => ({
            content: (p.content || '').replace(/\n/g, ' ').slice(0, 80),
            type: p.type === 'ORIGINAL_POST' ? 'post' : p.type === 'REPOST' ? 'repost' : p.type || '',
            likes: p.likeCount || 0,
            comments: p.commentCount || 0,
            time: p.actionTime || p.createdAt || '',
            id: p.id || '',
          }));
        } catch (e) {
          return [];
        }
      })()

  - map:
      content: ${{ item.content }}
      type: ${{ item.type }}
      likes: ${{ item.likes }}
      comments: ${{ item.comments }}
      time: ${{ item.time }}
      url: https://web.okjike.com/originalPost/${{ item.id }}

  - limit: ${{ args.limit }}

columns: [content, type, likes, comments, time, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
