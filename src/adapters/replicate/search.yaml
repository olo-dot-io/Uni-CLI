site: replicate
name: search
description: Search AI models on Replicate
type: web-api
domain: replicate.com
strategy: public
args:
  query:
    required: true
    positional: true
    description: Model search query
  limit:
    required: false
    default: 20
pipeline:
  - fetch:
      url: "https://replicate.com/api/v1/models?query=${{ args.query }}"
  - select: results
  - map:
      name: "${{ item.name }}"
      owner: "${{ item.owner }}"
      description: "${{ item.description }}"
      run_count: "${{ item.run_count }}"
  - limit: "${{ args.limit | default(20) }}"
columns: [name, owner, description, run_count]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
