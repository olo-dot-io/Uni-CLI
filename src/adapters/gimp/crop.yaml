# Desktop adapter — crop an image using GIMP's Script-Fu batch mode
site: gimp
name: crop
description: Crop an image to specified region
type: desktop
binary: gimp
detect: which gimp
timeout: 60000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to input image
  x:
    type: int
    required: true
    description: X offset of crop region
  "y":
    type: int
    required: true
    description: Y offset of crop region
  width:
    type: int
    required: true
    description: Crop width
  height:
    type: int
    required: true
    description: Crop height
  output:
    type: str
    description: Output path (defaults to overwriting input)

pipeline:
  - exec:
      command: gimp
      args: ["-i", "-b", "-"]
      stdin: |
        (let* ((image (car (gimp-file-load RUN-NONINTERACTIVE "${{ args.input }}" "${{ args.input }}"))))
          (gimp-image-crop image ${{ args.width }} ${{ args.height }} ${{ args.x }} ${{ args.y }})
          (gimp-image-flatten image)
          (gimp-file-overwrite RUN-NONINTERACTIVE image (car (gimp-image-get-active-drawable image)) "${{ args.output || args.input }}" "${{ args.output || args.input }}")
          (gimp-image-delete image)
          (gimp-quit 0))
      parse: text
      timeout: 60000

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
