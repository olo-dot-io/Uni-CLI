# Desktop adapter — merge/flatten all layers in an image using GIMP
site: gimp
name: merge-layers
description: Flatten all layers into a single layer and save
type: desktop
binary: gimp
detect: which gimp
timeout: 60000

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to input image
  output:
    type: str
    description: Output path (defaults to overwriting input)

pipeline:
  - exec:
      command: gimp
      args: ["-i", "-b", "-"]
      stdin: |
        (let* ((image (car (gimp-file-load RUN-NONINTERACTIVE "${{ args.input }}" "${{ args.input }}")))
               (drawable (car (gimp-image-flatten image))))
          (gimp-file-overwrite RUN-NONINTERACTIVE image drawable "${{ args.output || args.input }}" "${{ args.output || args.input }}")
          (gimp-image-delete image)
          (gimp-quit 0))
      parse: text
      timeout: 60000

columns: [result]
