site: wrangler
name: list
description: List Cloudflare Workers
type: bridge
strategy: public
binary: wrangler
detect: which wrangler
autoInstall: npm install -g wrangler

pipeline:
  - exec:
      command: wrangler
      args:
        - deployments
        - list
        - --json
      parse: json
      timeout: 30000

columns: [id, source, strategy, created_on]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
