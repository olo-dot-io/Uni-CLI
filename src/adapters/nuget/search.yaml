# @owner   src/adapters/nuget/search.yaml
# @does    Search NuGet packages through the public V3 search endpoint.
# @needs   azuresearch-usnc.nuget.org query API
# @feeds   unicli nuget search, package registry expansion
# @breaks  .NET package discovery loses first-class CLI coverage.
site: nuget
name: search
description: Search NuGet packages
type: web-api
domain: nuget.org
strategy: public
args:
  query:
    type: str
    required: true
    positional: true
    description: Package search query
  limit:
    type: int
    default: 20
pipeline:
  - fetch:
      url: "https://azuresearch-usnc.nuget.org/query"
      params:
        q: "${{ args.query }}"
        take: "${{ args.limit }}"
        prerelease: "false"
        semVerLevel: "2.0.0"
  - select: data
  - map:
      name: "${{ item.id }}"
      version: "${{ item.version }}"
      description: "${{ (item.description || '') | truncate(80) }}"
      downloads: "${{ item.totalDownloads }}"
      verified: "${{ item.verified }}"
  - limit: ${{ args.limit }}
columns: [name, version, description, downloads, verified]
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
