site: excel
name: insert-link
description: Insert a native HYPERLINK formula into an Excel cell
type: desktop
strategy: public
binary: osascript
detect: "test $(uname) = Darwin"

args:
  url:
    type: str
    required: true
    positional: true
    description: Link URL or file URL
  text:
    type: str
    required: false
    default: ""
    description: Display text; defaults to the URL
  cell:
    type: str
    required: false
    default: A1
    description: Cell address on the active sheet

pipeline:
  - exec:
      command: osascript
      args:
        - "-e"
        - |
          on replace_text(theText, searchString, replacementString)
            set AppleScript's text item delimiters to searchString
            set parts to text items of (theText as text)
            set AppleScript's text item delimiters to replacementString
            set outText to parts as text
            set AppleScript's text item delimiters to ""
            return outText
          end replace_text

          on json_string(valueText)
            set s to valueText as text
            set s to my replace_text(s, "\\", "\\\\")
            set s to my replace_text(s, "\"", "\\\"")
            set s to my replace_text(s, return, "\\n")
            set s to my replace_text(s, linefeed, "\\n")
            set s to my replace_text(s, tab, "\\t")
            return "\"" & s & "\""
          end json_string

          on excel_string(valueText)
            return my replace_text(valueText as text, "\"", "\"\"")
          end excel_string

          set linkUrl to system attribute "UNICLI_URL"
          set linkText to system attribute "UNICLI_TEXT"
          if linkText is "" then set linkText to linkUrl
          set cellRef to system attribute "UNICLI_CELL"
          if cellRef is "" then set cellRef to "A1"

          try
            with timeout of 10 seconds
              tell application "Microsoft Excel"
                activate
                if (count workbooks) is 0 then make new workbook
                set wb to active workbook
                set sh to active sheet
                set targetRange to range cellRef of sh
                set formula of targetRange to "=HYPERLINK(\"" & my excel_string(linkUrl) & "\",\"" & my excel_string(linkText) & "\")"
                return "[{\"workbook\":" & my json_string(name of wb as text) & ",\"sheet\":" & my json_string(name of sh as text) & ",\"cell\":" & my json_string(cellRef) & ",\"url\":" & my json_string(linkUrl) & ",\"text\":" & my json_string(linkText) & "}]"
              end tell
            end timeout
          on error errMsg number errNum
            return "[{\"ok\":false,\"code\":\"office_automation_unavailable\",\"message\":" & my json_string(errMsg) & ",\"number\":" & errNum & "}]"
          end try
      env:
        UNICLI_URL: "${{ args.url }}"
        UNICLI_TEXT: "${{ args.text }}"
        UNICLI_CELL: "${{ args.cell }}"
      parse: json
      timeout: 15000

columns: [workbook, sheet, cell, url, text]

capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: private
quarantine: false
schema_version: v2
