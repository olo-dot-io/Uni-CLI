site: bilibili
name: me
description: Current Bilibili user profile info
domain: api.bilibili.com
type: web-api
strategy: cookie
auth_cookies: [SESSDATA, bili_jct]

pipeline:
  - fetch:
      url: https://api.bilibili.com/x/web-interface/nav

  - select: data

  - map:
      uid: ${{ item.mid }}
      name: ${{ item.uname }}
      coins: ${{ item.money }}
      level: ${{ item.level_info?.current_level }}
      vip: ${{ item.vipStatus }}

columns: [uid, name, coins, level, vip]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
