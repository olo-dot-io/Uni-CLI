site: bilibili
name: hot
description: Bilibili popular videos
domain: api.bilibili.com
type: web-api
strategy: cookie
auth_cookies: [SESSDATA, bili_jct]

args:
  limit:
    type: int
    default: 20
    description: Number of videos

pipeline:
  - fetch:
      url: https://api.bilibili.com/x/web-interface/popular
      params:
        ps: "${{ args.limit }}"
        pn: "1"

  - select: data.list

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      author: ${{ item.owner.name }}
      views: ${{ item.stat.view }}
      danmaku: ${{ item.stat.danmaku }}
      bvid: ${{ item.bvid }}

  - limit: ${{ args.limit }}

columns: [rank, title, author, views, danmaku, bvid]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
