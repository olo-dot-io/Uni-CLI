site: bilibili
name: feed
description: Bilibili dynamic feed (following updates)
domain: api.bilibili.com
type: web-api
strategy: cookie
auth_cookies: [SESSDATA, bili_jct]

args:
  limit:
    type: int
    default: 20
    description: Number of items

pipeline:
  - fetch:
      url: https://api.bilibili.com/x/polymer/web-dynamic/v1/feed/all
      params:
        timezone_offset: "-480"
        type: all

  - select: data.items

  - map:
      author: ${{ item.modules?.module_author?.name || '' }}
      type: ${{ item.type }}
      text: ${{ item.modules?.module_dynamic?.desc?.text || '' }}
      timestamp: ${{ item.modules?.module_author?.pub_ts || '' }}

  - limit: ${{ args.limit }}

columns: [author, type, text, timestamp]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: true
quarantineReason: "upstream structure drift — `Select data.items` returned nothing (2026-04-15)"

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
