site: bilibili
name: favorites
description: Bilibili favorites list content
domain: api.bilibili.com
type: web-api
strategy: cookie
auth_cookies: [SESSDATA, bili_jct]

args:
  fav_id:
    required: true
    positional: true
    description: Favorites folder ID (media_id)
  limit:
    type: int
    default: 20
    description: Number of items

pipeline:
  - fetch:
      url: https://api.bilibili.com/x/v3/fav/resource/list
      params:
        media_id: "${{ args.fav_id }}"
        ps: "${{ args.limit }}"
        pn: "1"

  - select: data.medias

  - map:
      title: ${{ item.title }}
      author: ${{ item.upper?.name || '' }}
      fav_time: ${{ item.fav_time }}
      bvid: ${{ item.bvid }}

  - limit: ${{ args.limit }}

columns: [title, author, fav_time, bvid]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
