site: bilibili
name: ranking
description: Bilibili video rankings
domain: api.bilibili.com
type: web-api
strategy: cookie
auth_cookies: [SESSDATA, bili_jct]

args:
  limit:
    type: int
    default: 20
    description: Number of videos

pipeline:
  - fetch:
      url: https://api.bilibili.com/x/web-interface/ranking/v2
      params:
        rid: "0"
        type: all

  - select: data.list

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      author: ${{ item.owner.name }}
      views: ${{ item.stat.view }}
      bvid: ${{ item.bvid }}

  - limit: ${{ args.limit }}

columns: [rank, title, author, views, bvid]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: true
quarantineReason: "upstream structure drift — `Select data.list` returned nothing (2026-04-15)"
schema_version: v2
