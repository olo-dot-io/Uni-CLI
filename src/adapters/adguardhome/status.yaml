# Service adapter — get AdGuard Home status
site: adguardhome
name: status
description: Get AdGuard Home protection status and version info
type: service
strategy: public
base: "http://localhost:3000"

args:
  host:
    type: str
    default: "localhost:3000"
    description: AdGuard Home host:port

pipeline:
  - fetch:
      url: "http://${{ args.host }}/control/status"

  - map:
      version: "${{ item.version }}"
      protection_enabled: "${{ item.protection_enabled }}"
      running: "${{ item.running }}"
      dns_port: "${{ item.dns_port }}"

columns: [version, protection_enabled, running, dns_port]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: true
quarantineReason: "requires local AdGuard Home instance on a private host"
schema_version: v2
