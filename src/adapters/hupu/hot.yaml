site: hupu
name: hot
description: Hupu hot posts
domain: bbs.hupu.com
strategy: intercept
browser: true

args:
  limit:
    type: int
    default: 20
    description: Number of hot posts

columns: [rank, title, url]

pipeline:
  - navigate:
      url: https://bbs.hupu.com/
      settleMs: 3000

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};
        const html = document.documentElement.outerHTML;
        const posts = [];
        const regex = /<a[^>]*href="\/(\d{9})\.html"[^>]*><span[^>]*class="t-title"[^>]*>([^<]+)<\/span><\/a>/g;
        let match;
        while ((match = regex.exec(html)) !== null && posts.length < limit) {
          posts.push({ rank: posts.length + 1, title: match[2].trim(), url: 'https://bbs.hupu.com/' + match[1] + '.html' });
        }
        return posts;
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
