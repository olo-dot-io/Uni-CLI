site: hupu
name: reply
description: Reply to a Hupu post
domain: bbs.hupu.com
strategy: intercept
browser: true

args:
  tid:
    type: str
    required: true
    positional: true
    description: Post ID
  text:
    type: str
    required: true
    positional: true
    description: Reply text

columns: [status, message]

pipeline:
  - navigate:
      url: https://bbs.hupu.com/${{ args.tid }}.html
      settleMs: 3000

  - evaluate: |
      (async () => {
        const tid = ${{ args.tid | json }};
        const text = ${{ args.text | json }};
        const res = await fetch('https://bbs.hupu.com/api/v1/reply/add', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tid: Number(tid), content: text }),
        });
        const data = await res.json();
        if (data.code !== 200 && data.code !== 0) throw new Error(data.msg || data.message || 'Reply failed');
        return [{ status: 'success', message: 'Reply posted to thread ' + tid }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
