site: exchangerate
name: list
description: List all exchange rates for a base currency
domain: open.er-api.com
type: web-api
strategy: public

args:
  base:
    type: str
    default: USD
    positional: true
    description: Base currency code

pipeline:
  - fetch:
      url: "https://open.er-api.com/v6/latest/${{ args.base }}"

  - select: rates

  - map:
      currency: ${{ key }}
      rate: ${{ item }}

columns: [currency, rate]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: true
quarantineReason: "HTTP 404 — upstream endpoint removed (2026-04-15)"
schema_version: v2
