site: npm-trends
name: trending
description: Get trending npm packages
type: web-api
domain: npmtrends.com
strategy: public

pipeline:
  - fetch:
      url: https://api.npmjs.org/downloads/point/last-week

  - map:
      downloads: ${{ item.downloads }}
      start: ${{ item.start }}
      end: ${{ item.end }}

columns: [downloads, start, end]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
