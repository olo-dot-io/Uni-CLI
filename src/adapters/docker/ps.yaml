site: docker
name: ps
description: List running Docker containers
type: bridge
strategy: public
binary: docker
detect: "which docker >/dev/null 2>&1 && docker info >/dev/null 2>&1"

pipeline:
  - exec:
      command: docker
      args:
        - ps
        - "--format"
        - "json"
      parse: lines
      timeout: 30000

  - map:
      id: "${{ JSON.parse(item.line).ID }}"
      name: "${{ JSON.parse(item.line).Names }}"
      image: "${{ JSON.parse(item.line).Image }}"
      status: "${{ JSON.parse(item.line).Status }}"
      ports: "${{ JSON.parse(item.line).Ports }}"

args:
  all:
    type: bool
    default: false
    description: Show all containers including stopped ones

columns: [id, name, image, status, ports]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
