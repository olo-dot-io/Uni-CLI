site: docker
name: networks
description: List Docker networks
type: desktop
binary: docker
detect: "which docker >/dev/null 2>&1 && docker info >/dev/null 2>&1"

pipeline:
  - exec:
      command: docker
      args: ["network", "ls", "--format", "{{json .}}"]
      parse: jsonl

  - map:
      name: ${{ item.Name }}
      id: "${{ (item.ID || '') | truncate(12) }}"
      driver: ${{ item.Driver }}
      scope: ${{ item.Scope }}

columns: [name, id, driver, scope]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
