site: itch-io
name: search
description: Search itch.io games
domain: itch.io
type: web-api
strategy: public

args:
  query:
    type: str
    required: true
    positional: true
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: https://itch.io/api/1/x/search/games
      params:
        query: "${{ args.query }}"
        limit: "${{ args.limit }}"

  - select: games

  - map:
      title: ${{ item.title }}
      type: ${{ item.type }}
      price: "${{ item.min_price ? '$' + (item.min_price / 100) : 'Free' }}"
      platforms: "${{ [item.p_windows && 'win', item.p_osx && 'mac', item.p_linux && 'linux'].filter(Boolean).join(', ') }}"
      url: ${{ item.url }}

  - limit: ${{ args.limit }}

columns: [title, type, price, platforms, url]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
