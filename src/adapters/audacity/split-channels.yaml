# Desktop adapter — split stereo audio into separate mono channels using SoX
site: audacity
name: split-channels
description: Split a stereo audio file into separate mono channel files
type: desktop
binary: sox
detect: which sox

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to input stereo audio file
  output:
    type: str
    required: true
    description: Output file path prefix (will append _left/_right)

pipeline:
  - exec:
      command: sox
      args: ["${{ args.input }}", "${{ args.output }}_left.wav", "remix", "1"]
      parse: text

  - exec:
      command: sox
      args: ["${{ args.input }}", "${{ args.output }}_right.wav", "remix", "2"]
      parse: text

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
