# Desktop adapter — mix multiple audio files together using SoX
site: audacity
name: mix
description: Mix (combine) multiple audio files into one
type: desktop
binary: sox
detect: which sox

args:
  inputs:
    type: str
    required: true
    positional: true
    description: Space-separated paths to input audio files
  output:
    type: str
    required: true
    description: Output file path

pipeline:
  - exec:
      command: sox
      args: ["--combine", "mix", "${{ args.inputs }}", "${{ args.output }}"]
      parse: text

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
