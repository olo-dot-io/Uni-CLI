# Desktop adapter — convert audio between formats using SoX
site: audacity
name: convert
description: Convert audio file between formats (wav, mp3, flac, ogg, aiff)
type: desktop
binary: sox
detect: which sox

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to input audio file
  output:
    type: str
    required: true
    description: Output file path (format inferred from extension)

pipeline:
  - exec:
      command: sox
      args: ["${{ args.input }}", "${{ args.output }}"]
      parse: text

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
