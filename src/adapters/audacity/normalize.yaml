# Desktop adapter — normalize audio volume using SoX
site: audacity
name: normalize
description: Normalize audio to a target dB level
type: desktop
binary: sox
detect: which sox

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to input audio file
  output:
    type: str
    required: true
    description: Output file path
  level:
    type: float
    default: -1.0
    description: Target dB level (e.g. -1.0 for -1dB headroom)

pipeline:
  - exec:
      command: sox
      args:
        ["--norm=${{ args.level }}", "${{ args.input }}", "${{ args.output }}"]
      parse: text

columns: [result]
