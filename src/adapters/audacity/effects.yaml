# Desktop adapter — apply audio effects using SoX
site: audacity
name: effects
description: Apply audio effects (reverb, echo, chorus, flanger, pitch shift)
type: desktop
binary: sox
detect: which sox

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to input audio file
  output:
    type: str
    required: true
    description: Output file path
  effect:
    type: str
    required: true
    choices: [reverb, echo, chorus, flanger, pitch, bass, treble, speed, tempo]
    description: Effect to apply
  value:
    type: str
    default: ""
    description: Effect parameter value

pipeline:
  - exec:
      command: sox
      args:
        [
          "${{ args.input }}",
          "${{ args.output }}",
          "${{ args.effect }}",
          "${{ args.value }}",
        ]
      parse: text

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
