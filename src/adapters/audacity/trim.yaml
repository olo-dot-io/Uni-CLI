# Desktop adapter — trim audio to a time range using SoX
site: audacity
name: trim
description: Trim audio file to specified start and duration
type: desktop
binary: sox
detect: which sox

args:
  input:
    type: str
    required: true
    positional: true
    description: Path to input audio file
  output:
    type: str
    required: true
    description: Output file path
    x-unicli-kind: path
  start:
    type: str
    default: "0"
    description: Start time (seconds or HH:MM:SS)
  duration:
    type: str
    required: true
    description: Duration (seconds or HH:MM:SS)

pipeline:
  - exec:
      command: sox
      args:
        [
          "${{ args.input }}",
          "${{ args.output }}",
          "trim",
          "${{ args.start }}",
          "${{ args.duration }}",
        ]
      parse: text

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
schema_version: v2
