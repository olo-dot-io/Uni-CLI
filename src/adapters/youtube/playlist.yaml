site: youtube
name: playlist
description: Get videos from a YouTube playlist
domain: www.youtube.com
strategy: intercept
browser: true

args:
  id:
    type: str
    required: true
    positional: true
    description: Playlist ID (PLxxxxxx)
    x-unicli-kind: id
  limit:
    type: int
    default: 20
    description: Number of videos

columns: [rank, title, channel, duration, url]

pipeline:
  - navigate: https://www.youtube.com/playlist?list=${{ args.id }}
  - wait: 4000
  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};
        const items = document.querySelectorAll('ytd-playlist-video-renderer');
        const results = [];
        for (const item of Array.from(items).slice(0, limit)) {
          const titleEl = item.querySelector('#video-title');
          const channelEl = item.querySelector('#channel-name a, .ytd-channel-name a');
          const durationEl = item.querySelector('badge-shape .badge-shape-wiz__text, ytd-thumbnail-overlay-time-status-renderer span');
          const href = titleEl?.getAttribute('href') || '';
          results.push({
            rank: results.length + 1,
            title: (titleEl?.textContent || '').trim().substring(0, 80),
            channel: (channelEl?.textContent || '').trim(),
            duration: (durationEl?.textContent || '').trim(),
            url: href ? 'https://www.youtube.com' + href.split('&')[0] : '',
          });
        }
        return results;
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
