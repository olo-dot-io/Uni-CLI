site: pixiv
name: ranking
description: Pixiv illustration rankings
domain: www.pixiv.net
strategy: intercept
browser: true

args:
  mode:
    type: str
    default: daily
    description: Ranking mode
    choices: [daily, weekly, monthly, rookie, original, male, female]
  page:
    type: int
    default: 1
    description: Page number
  limit:
    type: int
    default: 20
    description: Number of results

columns: [rank, title, author, illust_id, pages, bookmarks]

pipeline:
  - navigate: https://www.pixiv.net

  - evaluate: |
      (async () => {
        const mode = ${{ args.mode | json }};
        const page = ${{ args.page }};
        const limit = ${{ args.limit }};
        const res = await fetch(
          'https://www.pixiv.net/ranking.php?mode=' + mode + '&p=' + page + '&format=json',
          { credentials: 'include' }
        );
        if (!res.ok) throw new Error('Pixiv ranking failed (HTTP ' + res.status + ')');
        const data = await res.json();
        return (data?.contents || []).slice(0, limit).map(item => ({
          rank: item.rank,
          title: item.title,
          author: item.user_name,
          illust_id: item.illust_id,
          pages: item.illust_page_count,
          bookmarks: item.illust_bookmark_count,
        }));
      })()
