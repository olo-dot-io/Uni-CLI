site: pixiv
name: search
description: Search Pixiv illustrations
domain: www.pixiv.net
strategy: intercept
browser: true

args:
  query:
    type: str
    required: true
    positional: true
    description: Search query
  limit:
    type: int
    default: 20
    description: Number of results
  page:
    type: int
    default: 1
    description: Page number

columns: [rank, illust_id, title, author, bookmarks, url]

pipeline:
  - navigate: https://www.pixiv.net

  - evaluate: |
      (async () => {
        const query = ${{ args.query | json }};
        const page = ${{ args.page }};
        const limit = ${{ args.limit }};
        const res = await fetch(
          'https://www.pixiv.net/ajax/search/artworks/' + encodeURIComponent(query) + '?word=' + encodeURIComponent(query) + '&order=date_d&mode=all&p=' + page + '&s_mode=s_tag&type=all',
          { credentials: 'include' }
        );
        if (!res.ok) throw new Error('Search failed (HTTP ' + res.status + ')');
        const data = await res.json();
        const items = (data?.body?.illustManga?.data || []).slice(0, limit);
        return items.map((item, i) => ({
          rank: i + 1,
          illust_id: item.id,
          title: item.title,
          author: item.userName,
          bookmarks: item.bookmarkCount || 0,
          url: 'https://www.pixiv.net/artworks/' + item.id,
        }));
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
