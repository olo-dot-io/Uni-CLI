site: pixiv
name: download
description: Download Pixiv illustration images
domain: www.pixiv.net
strategy: intercept
browser: true

args:
  id:
    type: str
    required: true
    positional: true
    description: Illustration ID
    x-unicli-kind: id
  output:
    type: str
    default: "."
    description: Output directory
    x-unicli-kind: path

columns: [illust_id, page, url, _download]

pipeline:
  - navigate: https://www.pixiv.net

  - evaluate: |
      (async () => {
        const id = ${{ args.id | json }};
        const res = await fetch(
          'https://www.pixiv.net/ajax/illust/' + id + '/pages',
          { credentials: 'include' }
        );
        if (!res.ok) throw new Error('Failed to fetch pages (HTTP ' + res.status + ')');
        const data = await res.json();
        const pages = data?.body || [];
        return pages.map((p, i) => ({
          illust_id: id,
          page: i + 1,
          url: p.urls?.original || p.urls?.regular || '',
        }));
      })()

  - assert:
      condition: "data.length > 0"
      message: "No downloadable Pixiv pages found for this illustration."

  - download:
      url: "${{ item.url }}"
      dir: "${{ args.output }}"
      filename: "${{ item.illust_id }}_p${{ item.page }}.${{ item.url | ext | default('jpg') }}"
      headers:
        Referer: "https://www.pixiv.net/"
      type: image
      concurrency: 2

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate", "http.download"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
schema_version: v2
