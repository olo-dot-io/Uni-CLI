site: pixiv
name: illusts
description: List a Pixiv user's illustrations
domain: www.pixiv.net
strategy: intercept
browser: true

args:
  uid:
    type: str
    required: true
    positional: true
    description: Pixiv user ID
  limit:
    type: int
    default: 20
    description: Number of results

columns: [rank, illust_id, title, type, bookmarks, url]

pipeline:
  - navigate: https://www.pixiv.net

  - evaluate: |
      (async () => {
        const uid = ${{ args.uid | json }};
        const limit = ${{ args.limit }};
        const profileRes = await fetch(
          'https://www.pixiv.net/ajax/user/' + uid + '/profile/all',
          { credentials: 'include' }
        );
        if (!profileRes.ok) throw new Error('Failed to fetch user profile (HTTP ' + profileRes.status + ')');
        const profileData = await profileRes.json();
        const illustIds = Object.keys(profileData?.body?.illusts || {}).sort((a, b) => Number(b) - Number(a)).slice(0, limit);
        if (illustIds.length === 0) return [];
        const detailRes = await fetch(
          'https://www.pixiv.net/ajax/user/' + uid + '/profile/illusts?ids[]=' + illustIds.join('&ids[]=') + '&work_category=illustManga&is_first_page=1',
          { credentials: 'include' }
        );
        if (!detailRes.ok) throw new Error('Failed to fetch illustrations');
        const detailData = await detailRes.json();
        const works = detailData?.body?.works || {};
        return illustIds.map((id, i) => {
          const w = works[id] || {};
          return {
            rank: i + 1,
            illust_id: id,
            title: w.title || '',
            type: w.illustType === 0 ? 'illust' : w.illustType === 1 ? 'manga' : 'ugoira',
            bookmarks: w.bookmarkCount || 0,
            url: 'https://www.pixiv.net/artworks/' + id,
          };
        });
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
