site: notion
name: databases
description: List Notion databases
domain: api.notion.com
type: web-api
strategy: cookie

args:
  token:
    type: str
    required: true
    description: Notion API integration token
  limit:
    type: int
    default: 20

pipeline:
  - fetch:
      url: https://api.notion.com/v1/search
      method: POST
      body:
        filter:
          property: object
          value: database
        page_size: "${{ args.limit }}"
      headers:
        Authorization: "Bearer ${{ args.token }}"
        Notion-Version: "2022-06-28"
        Content-Type: application/json

  - select: results

  - map:
      title: "${{ item.title?.[0]?.plain_text || 'Untitled' }}"
      id: ${{ item.id }}
      last_edited: ${{ item.last_edited_time }}
      url: ${{ item.url }}

  - limit: ${{ args.limit }}

columns: [title, id, last_edited, url]
