# Desktop adapter — list available MLT transitions for Shotcut
site: shotcut
name: effects
description: List available MLT transitions and effects
type: desktop
binary: melt
detect: which melt

pipeline:
  - exec:
      command: melt
      args: ["-query", "transitions"]
      parse: text

columns: [result]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["subprocess.exec"]
minimum_capability: subprocess.exec
trust: user
confidentiality: public
quarantine: false
