site: xiaohongshu
name: follow
description: "Follow a Xiaohongshu user"
domain: www.xiaohongshu.com
strategy: intercept
browser: true

args:
  user-id:
    type: str
    required: true
    positional: true
    description: User ID or profile URL

columns: [status, user_id]

pipeline:
  - navigate: https://www.xiaohongshu.com/user/profile/${{ args['user-id'] | replace('https://www.xiaohongshu.com/user/profile/', '') }}
  - wait: 3000
  - evaluate: |
      (async () => {
        const followBtn = Array.from(document.querySelectorAll('button')).find(
          b => /关注/.test(b.textContent) && !/已关注|互相关注/.test(b.textContent)
        );
        if (!followBtn) {
          const already = Array.from(document.querySelectorAll('button')).find(
            b => /已关注|互相关注/.test(b.textContent)
          );
          if (already) return [{ status: 'Already following', user_id: location.pathname.split('/').pop() }];
          throw new Error('Follow button not found');
        }
        followBtn.click();
        await new Promise(r => setTimeout(r, 1000));
        return [{ status: 'Followed', user_id: location.pathname.split('/').pop() }];
      })()
