site: xiaohongshu
name: notifications
description: "Xiaohongshu notifications (mentions/likes/connections)"
domain: www.xiaohongshu.com
strategy: intercept
browser: true

args:
  type:
    type: str
    default: mentions
    description: "Notification type: mentions, likes, or connections"
  limit:
    type: int
    default: 20
    description: Number of notifications to return

columns: [rank, user, action, content, note, time]

pipeline:
  - navigate: https://www.xiaohongshu.com/notification
  - tap:
      store: notification
      action: getNotification
      args:
        - ${{ args.type | default('mentions') }}
      capture: /you/
      select: data.message_list
      timeout: 8
  - map:
      rank: ${{ index + 1 }}
      user: ${{ item.user_info.nickname }}
      action: ${{ item.title }}
      content: ${{ item.comment_info.content }}
      note: ${{ item.item_info.content }}
      time: ${{ item.time }}
  - limit: ${{ args.limit | default(20) }}

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.navigate", "cdp-browser.tap"]
minimum_capability: cdp-browser.tap
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
