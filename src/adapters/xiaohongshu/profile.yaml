site: xiaohongshu
name: profile
description: "Get a Xiaohongshu user profile"
domain: www.xiaohongshu.com
strategy: intercept
browser: true

args:
  user-id:
    type: str
    required: true
    positional: true
    description: User ID or profile URL

columns: [name, red_id, followers, following, likes, bio]

pipeline:
  - navigate: https://www.xiaohongshu.com/user/profile/${{ args['user-id'] | replace('https://www.xiaohongshu.com/user/profile/', '') }}
  - wait: 3000
  - evaluate: |
      (async () => {
        const state = window.__INITIAL_STATE__?.user;
        const data = state?.userPageData?._value || state?.userPageData || {};
        if (!data.basicInfo) throw new Error('User profile data not found');
        const basic = data.basicInfo;
        const interactions = data.interactions || [];
        const getCount = (name) => {
          const item = interactions.find(i => i.name === name);
          return item?.count || '0';
        };
        return [{
          name: basic.nickname || '',
          red_id: basic.redId || basic.red_id || '',
          followers: getCount('fans'),
          following: getCount('follows'),
          likes: getCount('interaction'),
          bio: (basic.desc || '').replace(/\n/g, ' ').substring(0, 120),
        }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false
