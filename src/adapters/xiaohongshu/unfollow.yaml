site: xiaohongshu
name: unfollow
description: "Unfollow a Xiaohongshu user"
domain: www.xiaohongshu.com
strategy: intercept
browser: true

args:
  user-id:
    type: str
    required: true
    positional: true
    description: User ID or profile URL

columns: [status, user_id]

pipeline:
  - navigate: https://www.xiaohongshu.com/user/profile/${{ args['user-id'] | replace('https://www.xiaohongshu.com/user/profile/', '') }}
  - wait: 3000
  - evaluate: |
      (async () => {
        const unfollowBtn = Array.from(document.querySelectorAll('button')).find(
          b => /已关注|互相关注/.test(b.textContent)
        );
        if (!unfollowBtn) {
          const notFollowing = Array.from(document.querySelectorAll('button')).find(
            b => /关注/.test(b.textContent) && !/已关注|互相关注/.test(b.textContent)
          );
          if (notFollowing) return [{ status: 'Not following', user_id: location.pathname.split('/').pop() }];
          throw new Error('Unfollow button not found');
        }
        unfollowBtn.click();
        await new Promise(r => setTimeout(r, 500));
        const confirmBtn = Array.from(document.querySelectorAll('button')).find(
          b => /确[认定]|取消关注/.test(b.textContent)
        );
        if (confirmBtn) confirmBtn.click();
        await new Promise(r => setTimeout(r, 1000));
        return [{ status: 'Unfollowed', user_id: location.pathname.split('/').pop() }];
      })()

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["cdp-browser.evaluate", "cdp-browser.navigate"]
minimum_capability: cdp-browser.evaluate
trust: public
confidentiality: public
quarantine: false

# schema-v2 metadata — injected by `unicli migrate schema-v2`
schema_version: v2
