site: dictionary
name: search
description: Look up word definitions, phonetics, and parts of speech
domain: api.dictionaryapi.dev
type: web-api
strategy: public

args:
  word:
    type: str
    required: true
    positional: true
    description: Word to define (e.g. serendipity)

pipeline:
  - fetch:
      url: "https://api.dictionaryapi.dev/api/v2/entries/en/${{ args.word | urlencode }}"

  - map:
      word: ${{ item.word }}
      phonetic: "${{ (() => { if (item.phonetic) return item.phonetic; if (item.phonetics) { for (const p of item.phonetics) { if (p.text) return p.text; } } return ''; })() }}"
      type: "${{ (() => { if (item.meanings && item.meanings[0]) return item.meanings[0].partOfSpeech; return 'N/A'; })() }}"
      definition: "${{ (() => { if (item.meanings && item.meanings[0] && item.meanings[0].definitions && item.meanings[0].definitions[0]) return item.meanings[0].definitions[0].definition; return 'No definition found.'; })() }}"

  - limit: 1

columns: [word, phonetic, type, definition]

# schema-v2 metadata — injected by `unicli migrate schema-v2`
capabilities: ["http.fetch"]
minimum_capability: http.fetch
trust: public
confidentiality: public
quarantine: false
schema_version: v2
