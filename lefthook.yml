# Lefthook — lightweight git hooks manager
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    format-check:
      glob: "*.{ts,tsx,js,jsx,json,md,yml,yaml,css,html}"
      run: npx prettier --check {staged_files}
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: npx oxlint {staged_files}

# Commit message gate. Subjects must be conventional commits, and commit logs
# must describe the product change instead of the work session that produced it.
#
# Escape hatch for legitimate local false positives (the word "spec" in a
# schema or "batch" in a bench harness): LEFTHOOK=0 or rewrite the phrase.
commit-msg:
  commands:
    no-process-leak:
      run: bash scripts/check-commit-msg.sh {1}

# Matches the CI pipeline (clean dist, then full verify). Prevents the class of
# bugs where stale local build output masks a CI failure. Skippable via
# LEFTHOOK=0 git push ... when you need to push work-in-progress deliberately.
pre-push:
  commands:
    verify-clean:
      run: npm run verify:clean
