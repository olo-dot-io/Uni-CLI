<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>

    <!-- Background: radial from center-high, deep indigo → near-black -->
    <radialGradient id="bg" cx="60" cy="50" r="86" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#101832"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>

    <!-- Text gradient: brand teal → bright aqua-mint (left → right) -->
    <linearGradient id="fg" x1="18" y1="0" x2="102" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00c49a"/>
      <stop offset="100%" stop-color="#5bffe0"/>
    </linearGradient>

    <!-- Aura 1: wide soft bloom behind the prompt -->
    <radialGradient id="aura1" cx="60" cy="64" r="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00d4aa" stop-opacity="0.19"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </radialGradient>

    <!-- Aura 2: tighter inner bloom -->
    <radialGradient id="aura2" cx="60" cy="64" r="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00d4aa" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow pass A: wide ambient haze -->
    <filter id="glowA" x="-130%" y="-130%" width="360%" height="360%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7"/>
    </filter>

    <!-- Glow pass B: tight crisp bloom -->
    <filter id="glowB" x="-70%" y="-70%" width="240%" height="240%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Layer 1: background -->
  <rect width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- Layer 2: breathing aura (wide) -->
  <rect width="120" height="120" rx="28" fill="url(#aura1)"/>

  <!-- Layer 3: concentrated inner aura -->
  <rect width="120" height="120" rx="28" fill="url(#aura2)"/>

  <!-- Layer 4: inner border ring, adds polish -->
  <rect x="1" y="1" width="118" height="118" rx="27"
        stroke="#00d4aa" stroke-width="1" stroke-opacity="0.18" fill="none"/>

  <!-- Layer 5a: wide ambient glow render of the prompt -->
  <text
    x="60" y="62"
    font-family="SF Mono, Menlo, Consolas, monospace"
    font-size="46"
    font-weight="700"
    fill="url(#fg)"
    text-anchor="middle"
    dominant-baseline="middle"
    filter="url(#glowA)">&gt;_</text>

  <!-- Layer 5b: crisp text render on top -->
  <text
    x="60" y="62"
    font-family="SF Mono, Menlo, Consolas, monospace"
    font-size="46"
    font-weight="700"
    fill="url(#fg)"
    text-anchor="middle"
    dominant-baseline="middle"
    filter="url(#glowB)">&gt;_</text>

</svg>
