name: Bug Report
description: Report a bug in Uni-CLI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Commands to reproduce the issue
      placeholder: |
        1. Run `unicli ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste the full command output
      render: shell

  - type: input
    id: version
    attributes:
      label: Uni-CLI Version
      description: Run `unicli --version`
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js Version
      description: Run `node --version`

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
