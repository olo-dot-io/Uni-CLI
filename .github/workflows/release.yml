name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.215.1)"
        required: true

# IMPORTANT: permissions are declared at the JOB level, not workflow level.
# A workflow-level `id-token: write` would issue an OIDC token to every job
# in the file (none today, but future verify / lint jobs shouldn't inherit
# publish-grade trust). Scope the narrow powers to the publish job only.
permissions: {}

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment:
      # The `npm-publish` environment gates NPM_TOKEN (fallback) access and
      # is the exact tuple npmjs.com Trusted Publishers expects: the
      # (org, repo, workflow, environment) 4-tuple must match the config at
      # https://www.npmjs.com/package/@zenalexa/unicli > Settings > Trusted
      # Publishers. Mismatch → OIDC verify fails and npm prints a clear error.
      name: npm-publish
      url: https://www.npmjs.com/package/@zenalexa/unicli
    permissions:
      contents: write # softprops/action-gh-release creates the GitHub Release
      id-token: write # required for OIDC provenance + Trusted Publishers
    steps:
      # Pinned to a commit SHA (not a tag) so a compromised actions tag can't
      # silently swap a malicious version into the publish path. Bumped via
      # Renovate / Dependabot with SHA updates.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          # Node 24 LTS ships npm 11.x out of the box, which is required for
          # the Trusted Publishers OIDC token-exchange flow (npm 11.5.1+).
          # Staying on Node 22 pinned us to npm 10.9, which fell back to
          # the empty NODE_AUTH_TOKEN path and failed ENEEDAUTH.
          # Earlier attempts to upgrade npm in-place (`npm i -g npm@latest`)
          # or via Corepack both failed on the runner — the former with a
          # transient "Cannot find module 'promise-retry'", the latter
          # because the corepack shim doesn't override the Node toolcache's
          # bin in PATH. Bumping Node is the least-surprising fix.
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Report npm + node versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      # Surface which auth path the publish will take BEFORE it runs so a
      # failure is debuggable from the log without digging into npm client
      # internals. With Trusted Publishers configured on npmjs.com, npm
      # prefers the OIDC path and ignores NODE_AUTH_TOKEN. Without TP, npm
      # falls back to the token — still provenance-signed, still authenticated,
      # just not keyless.
      - name: Report publish auth mode
        env:
          HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
        run: |
          if [ "${HAS_NPM_TOKEN}" = "true" ]; then
            echo "::notice title=npm auth::NPM_TOKEN secret detected — will be used as a fallback if OIDC Trusted Publishers is not configured on npmjs.com"
          else
            echo "::notice title=npm auth::No NPM_TOKEN secret — publish MUST succeed via OIDC Trusted Publishers (npmjs.com > Settings > Trusted Publishers)"
          fi

      # --provenance attaches a signed SLSA v1 attestation to the tarball.
      # --access public is required for scoped packages (@zenalexa/*).
      # NODE_AUTH_TOKEN is ONLY consumed when the Trusted Publishers OIDC
      # path isn't available; set it via the `npm-publish` environment
      # secret if and only if TP is not configured yet.
      # Prerelease (e.g. 0.216.0-beta.2) requires --tag: npm otherwise
      # refuses to publish, because without a non-latest dist-tag the new
      # version would be `npm install @zenalexa/unicli` → prerelease, which
      # is hostile to users who didn't opt in. Stable versions publish to
      # `latest` implicitly.
      - name: Publish to npm with provenance
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            # Semver prerelease: extract channel from "0.216.0-beta.2" → "beta"
            CHANNEL=$(echo "$VERSION" | sed -E 's/^[^-]+-([^.]+).*/\1/')
            echo "::notice title=npm dist-tag::prerelease $VERSION → --tag $CHANNEL"
            npm publish --provenance --access public --tag "$CHANNEL"
          else
            echo "::notice title=npm dist-tag::stable $VERSION → --tag latest (implicit)"
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
