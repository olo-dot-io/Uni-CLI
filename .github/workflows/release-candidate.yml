name: Release Candidate

# What it does:
#   1. Detect commits since last tag, excluding chore(deps) and chore(ci).
#   2. If any substantive commits exist → consume changesets, bump version,
#      verify, commit, tag, push. Tag push triggers release.yml (OIDC publish).
#
# Release authority is manual. There is no promised calendar cadence.

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Release even if no substantive commits"
        type: boolean
        required: false
        default: false
      codename:
        description: "Required release label, e.g. Vostok · Gagarin"
        type: string
        required: false

permissions: {}

jobs:
  release-candidate:
    name: Release candidate gate
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` pushes the release commit + tag back to main.
      # `id-token: write` is reserved for OIDC trusted-publisher flows
      # that may run inline here in future revisions. The actual npm
      # publish still happens in release.yml under its own environment,
      # but keeping id-token available avoids a silent permission gap
      # if a publish step is ever moved into this workflow.
      contents: write
      id-token: write
    # Job-level outputs removed 2026-04-17: no downstream job consumes them.
    # If a future workflow needs `release` / `version` / `commit_count`,
    # re-declare them here and wire from steps.{detect,bump}.outputs.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so `git describe --tags` can find the last tag.
          fetch-depth: 0
          # Explicit token so our tag-push re-triggers release.yml. The
          # default GITHUB_TOKEN does NOT re-trigger workflows on push.
          # If a repo-scoped PAT is missing, fall back to GITHUB_TOKEN and
          # document that the release publish workflow may need a manual rerun.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          # Match release.yml — Node 24 ships npm 11.x for OIDC Trusted Publishers.
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect substantive commits
        id: detect
        env:
          FORCE: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "last_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Last tag: ${LAST_TAG}"

          if [ "${LAST_TAG}" = "v0.0.0" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          # Filter out pure dependabot / CI-maintenance noise. Anything else
          # counts as "substantive" — feat, fix, refactor, docs, test, perf, etc.
          #
          # Signals we skip:
          #   - bot authors entirely (dependabot[bot], renovate[bot], etc.)
          #   - merge-commit subjects from bot branches (dependabot/*, renovate/*)
          #   - conventional prefixes: chore(deps), chore(deps-dev), chore(ci),
          #     build(deps), build(deps-dev)
          NEW_COMMITS=$(git log "${RANGE}" --pretty=format:"%H|%an|%s" | awk -F'|' '
            {
              if ($2 ~ /\[bot\]$/) next
              if ($2 ~ /^dependabot/) next
              if ($2 ~ /^renovate/) next
              if ($3 ~ /^Merge pull request .* from dependabot\//) next
              if ($3 ~ /^Merge pull request .* from renovate\//) next
              if ($3 ~ /^chore\(deps(-dev)?\)/) next
              if ($3 ~ /^chore\(ci\)/) next
              if ($3 ~ /^build\(deps(-dev)?\)/) next
              print $0
            }
          ')

          if [ "${FORCE}" = "true" ]; then
            echo "Force flag set — releasing regardless of commit filter."
            COUNT=$(git log "${RANGE}" --pretty=format:"%H" | wc -l | tr -d ' ')
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "commit_count=${COUNT}" >> "$GITHUB_OUTPUT"
          elif [ -z "${NEW_COMMITS}" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "commit_count=0" >> "$GITHUB_OUTPUT"
            echo "No substantive commits since ${LAST_TAG}."
          else
            COUNT=$(printf '%s\n' "${NEW_COMMITS}" | wc -l | tr -d ' ')
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "commit_count=${COUNT}" >> "$GITHUB_OUTPUT"
            echo "Found ${COUNT} substantive commits since ${LAST_TAG}."
          fi

      - name: Consume changesets
        if: steps.detect.outputs.release == 'true'
        run: |
          set -euo pipefail
          # `changeset version` consumes every file in .changeset/, bumps
          # package.json, and updates CHANGELOG.md. If no changesets are
          # queued it no-ops — the next step flags that as a hard failure.
          npx changeset version

      - name: Detect version bump
        if: steps.detect.outputs.release == 'true'
        id: bump
        run: |
          set -euo pipefail
          OLD_VERSION=$(git show HEAD:package.json | node -e 'let s="";process.stdin.on("data",c=>s+=c).on("end",()=>process.stdout.write(JSON.parse(s).version))')
          NEW_VERSION=$(node -p 'require("./package.json").version')
          echo "old_version=${OLD_VERSION}"
          echo "new_version=${NEW_VERSION}"
          if [ "${OLD_VERSION}" = "${NEW_VERSION}" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "::error title=Missing changeset::Substantive commits detected since last tag, but no changesets were queued — package.json version did not change. Add a changeset (npx changeset) and re-run, or investigate why the commits slipped through without one."
            exit 1
          fi
          echo "bumped=true" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped ${OLD_VERSION} -> ${NEW_VERSION}"

      - name: Apply release metadata
        if: steps.bump.outputs.bumped == 'true'
        id: metadata
        env:
          INPUT_CODENAME: ${{ github.event.inputs.codename }}
          REPO_CODENAME: ${{ vars.RELEASE_CODENAME }}
        run: |
          set -euo pipefail
          CODENAME="${INPUT_CODENAME:-${REPO_CODENAME:-}}"
          if [ -z "${CODENAME}" ]; then
            echo "::error title=Missing release codename::Set workflow_dispatch input codename or repo variable RELEASE_CODENAME. Required shape: Program · Astronaut."
            exit 78
          fi
          npx tsx scripts/release.ts --codename "${CODENAME}"
          echo "codename=${CODENAME}" >> "$GITHUB_OUTPUT"

      - name: Verify
        if: steps.bump.outputs.bumped == 'true'
        run: |
          npm run verify
          RELEASE_REQUIRE_CODENAME=1 npm run release:check

      - name: Commit + tag + push
        if: steps.bump.outputs.bumped == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          CODENAME: ${{ steps.metadata.outputs.codename }}
        run: |
          set -euo pipefail
          # Only stage files changeset + verify touched. Stats regen etc.
          # happens elsewhere; a release candidate should not pull unrelated
          # working-tree drift into the release commit.
          git add package.json package-lock.json CHANGELOG.md README.md README.zh-CN.md AGENTS.md contributing/COPY.md docs/ROADMAP.md stats.json .changeset/
          if git diff --cached --quiet; then
            echo "::error title=Release candidate::Version bumped but no staged delta — aborting rather than silently skipping."
            exit 1
          fi
          git commit -m "release: v${VERSION} — ${CODENAME}"
          git tag -a "v${VERSION}" -m "v${VERSION} — ${CODENAME}"
          git push origin main
          git push origin "v${VERSION}"

      - name: Summarize release
        if: steps.bump.outputs.bumped == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          COMMIT_COUNT: ${{ steps.detect.outputs.commit_count }}
          LAST_TAG: ${{ steps.detect.outputs.last_tag }}
        run: |
          {
            echo "## Release candidate v${VERSION}"
            echo ""
            echo "- Codename: \`${{ steps.metadata.outputs.codename }}\`"
            echo "- Tag pushed: \`v${VERSION}\`"
            echo "- Substantive commits since \`${LAST_TAG}\`: **${COMMIT_COUNT}**"
            echo "- Publish pipeline: \`release.yml\` (triggered by tag push)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize no release
        if: steps.detect.outputs.release == 'false'
        env:
          LAST_TAG: ${{ steps.detect.outputs.last_tag }}
        run: |
          {
            echo "## No release"
            echo ""
            echo "No substantive commits since \`${LAST_TAG}\`."
            echo "Only dependabot / CI-maintenance commits detected"
            echo "(\`chore(deps)\`, \`chore(deps-dev)\`, \`chore(ci)\`,"
            echo "\`build(deps)\`, \`build(deps-dev)\`, or bot-authored merges)."
            echo "This is success, not failure."
          } >> "$GITHUB_STEP_SUMMARY"
