name: verify-refs

on:
  push:
    branches: [main]
    paths:
      - "docs/refs.bib"
      - "scripts/verify-refs.ts"
      - ".github/workflows/verify-refs.yml"
  pull_request:
    paths:
      - "docs/refs.bib"
      - "scripts/verify-refs.ts"
      - ".github/workflows/verify-refs.yml"
  schedule:
    # Nightly 03:17 UTC — catches arXiv withdrawals/replacements.
    - cron: "17 3 * * *"
  workflow_dispatch: {}

jobs:
  verify-refs:
    name: Resolve arXiv IDs in docs/refs.bib
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run refs:verify
