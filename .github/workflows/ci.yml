name: CI

# ── Adapter-health gating model ──────────────────────────────────────────────
# The FINAL plan (Phase 0.1) mandates that unquarantined adapter failures fail
# the build. Because adapter probes hit third-party APIs, they would otherwise
# make every PR hostage to upstream flakiness, so we split the job in two:
#
#   • `adapter-health` (pull_request)      — soft signal, continue-on-error=true.
#     Reviewers see drift but a flaky fetch never blocks a merge.
#   • `adapter-health-strict` (push+cron)  — THE spec gate. No continue-on-error,
#     runs on push to main and nightly with retry=2. A failure here is a release
#     blocker and pages the maintainer via the normal CI alerts.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 03:00 UTC — strict adapter-health sweep
    - cron: "0 3 * * *"
    # 09:00 UTC — nightly conformance (early-morning US, late-afternoon Asia)
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr-title:
    name: PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check conventional PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s\n' "$PR_TITLE" > "$RUNNER_TEMP/pr-title.txt"
          bash scripts/check-commit-msg.sh "$RUNNER_TEMP/pr-title.txt"

  verify:
    name: Verify (${{ matrix.os }} / Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Context lint
        # lint-context.sh uses bash (Git for Windows provides it).
        # Skip on Windows runners to avoid PATH flakiness in CI.
        if: runner.os != 'Windows'
        run: npm run lint:context

      - name: Build search manifest
        run: npm run build:manifest

      - name: Lint adapters (schema-v2)
        run: npm run lint:adapters

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

      - name: Compute snapshot coverage
        run: npm run coverage:compute-snapshot

      - name: Compute perf tests
        run: npm run test:perf

      - name: Stats consistency gate
        run: npm run stats:check

  rust-sidecars:
    name: Rust Sidecars (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-2022
            target: x86_64-pc-windows-msvc
          - os: windows-2022
            target: aarch64-pc-windows-msvc
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust 1.82.0
        run: |
          rustup toolchain install 1.82.0 --profile minimal --component rustfmt --component clippy --target "${{ matrix.target }}"
          rustup default 1.82.0

      - name: Install Linux accessibility tooling
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libatspi2.0-dev xdotool ydotool wtype

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --target "${{ matrix.target }}" -- -D warnings

      - name: Test
        if: matrix.target != 'aarch64-pc-windows-msvc'
        run: cargo test --workspace --target "${{ matrix.target }}"

      - name: Build sidecars
        run: cargo build --workspace --profile release-sidecar --target "${{ matrix.target }}"

      - name: Upload sidecar artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: sidecars-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release-sidecar/unicli-uia*
            target/${{ matrix.target }}/release-sidecar/unicli-atspi*

  # adapter-tests subjob removed 2026-05-14: it ran `npm run test:adapter`
  # against live third-party APIs and was the dominant source of CI flakiness
  # (the spec gate that protects main is `adapter-health-strict` below;
  # `adapter-health` provides the PR soft-signal). Local `npm run test:adapter`
  # remains available via `npm run verify`.
  #
  # docs-build subjob removed 2026-05-14: it duplicated the VitePress build in
  # docs.yml, which already runs on push to main with the right path filter.

  adapter-health:
    name: Adapter Health (PR signal)
    runs-on: ubuntu-latest
    needs: verify
    # Soft-fail surface: only runs on PRs. Network-bound probes against
    # third-party APIs make this too noisy to gate merges on, so drift here
    # is an FYI for reviewers. The actual Phase 0.1 spec gate is the
    # `adapter-health-strict` job below (push to main + nightly schedule).
    if: github.event_name == 'pull_request'
    continue-on-error: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build search manifest
        run: npm run build:manifest

      - name: Run adapter health probe
        env:
          HEALTH_TIMEOUT_MS: "8000"
        run: npm run adapter:health

  adapter-health-strict:
    name: Adapter Health (spec gate)
    runs-on: ubuntu-latest
    needs: verify
    # THE Phase 0.1 gate: unquarantined adapter failures MUST fail the build.
    # Runs on push to main and nightly at 03:00 UTC. No continue-on-error.
    # Retry=2 absorbs transient network blips without hiding real regressions.
    if: github.event_name == 'push' || (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build search manifest
        run: npm run build:manifest

      - name: Run adapter health probe (strict, retry=2)
        env:
          HEALTH_TIMEOUT_MS: "8000"
          HEALTH_RETRY: "2"
        run: |
          attempts=0
          max=2
          until npm run adapter:health; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max" ]; then
              echo "adapter-health-strict: failed after $attempts attempts" >&2
              exit 1
            fi
            echo "adapter-health-strict: attempt $attempts failed, retrying..." >&2
            sleep 10
          done

  verify-changesets:
    name: Verify Changesets
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify changeset present for src/ changes
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          npm run verify:changesets

  conformance:
    name: Nightly Conformance
    runs-on: ubuntu-latest
    if: (github.event_name == 'schedule' && github.event.schedule == '0 9 * * *') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run conformance report
        id: conformance
        run: npm run conformance

      - name: Upload conformance artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: conformance-report-${{ github.run_id }}
          path: conformance-report.json
          retention-days: 30

      - name: Summarize failures
        if: failure()
        run: |
          echo "## Conformance failures" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          node -e "
            const r = require('./conformance-report.json');
            const failed = r.results.filter(x => x.status === 'fail');
            for (const f of failed) {
              console.log('- \`' + f.file + '\` — ' + f.errors.join('; '));
            }
          " >> $GITHUB_STEP_SUMMARY
