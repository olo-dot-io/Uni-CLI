name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly conformance at 09:00 UTC (early-morning US, late-afternoon Asia)
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }} / Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Context lint
        # lint-context.sh uses bash (Git for Windows provides it).
        # Skip on Windows runners to avoid PATH flakiness in CI.
        if: runner.os != 'Windows'
        run: npm run lint:context

      - name: Build search manifest
        run: npm run build:manifest

      - name: Lint adapters (schema-v2)
        run: npm run lint:adapters

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  adapter-tests:
    name: Adapter Tests
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Use Node.js 22
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build search manifest
        run: npm run build:manifest

      - name: Adapter integration tests
        run: npm run test:adapter

  verify-changesets:
    name: Verify Changesets
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify changeset present for src/ changes
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          npm run verify:changesets

  conformance:
    name: Nightly Conformance
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Use Node.js 22
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run conformance report
        id: conformance
        run: npm run conformance

      - name: Upload conformance artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: conformance-report-${{ github.run_id }}
          path: conformance-report.json
          retention-days: 30

      - name: Summarize failures
        if: failure()
        run: |
          echo "## Conformance failures" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          node -e "
            const r = require('./conformance-report.json');
            const failed = r.results.filter(x => x.status === 'fail');
            for (const f of failed) {
              console.log('- \`' + f.file + '\` — ' + f.errors.join('; '));
            }
          " >> $GITHUB_STEP_SUMMARY
