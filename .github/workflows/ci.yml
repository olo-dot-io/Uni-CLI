name: CI

# ── Adapter-health gating model ──────────────────────────────────────────────
# The FINAL plan (Phase 0.1) mandates that unquarantined adapter failures fail
# the build. Because adapter probes hit third-party APIs, they would otherwise
# make every PR hostage to upstream flakiness, so we split the job in two:
#
#   • `adapter-health` (pull_request)      — soft signal, continue-on-error=true.
#     Reviewers see drift but a flaky fetch never blocks a merge.
#   • `adapter-health-strict` (push+cron)  — THE spec gate. No continue-on-error,
#     runs on push to main and nightly with retry=2. A failure here is a release
#     blocker and pages the maintainer via the normal CI alerts.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 03:00 UTC — strict adapter-health sweep
    - cron: "0 3 * * *"
    # 09:00 UTC — nightly conformance (early-morning US, late-afternoon Asia)
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }} / Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Context lint
        # lint-context.sh uses bash (Git for Windows provides it).
        # Skip on Windows runners to avoid PATH flakiness in CI.
        if: runner.os != 'Windows'
        run: npm run lint:context

      - name: Build search manifest
        run: npm run build:manifest

      - name: Lint adapters (schema-v2)
        run: npm run lint:adapters

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Stats consistency gate
        run: npm run stats:check

  adapter-tests:
    name: Adapter Tests
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Use Node.js 22
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build search manifest
        run: npm run build:manifest

      - name: Adapter integration tests
        run: npm run test:adapter

  adapter-health:
    name: Adapter Health (PR signal)
    runs-on: ubuntu-latest
    needs: verify
    # Soft-fail surface: only runs on PRs. Network-bound probes against
    # third-party APIs make this too noisy to gate merges on, so drift here
    # is an FYI for reviewers. The actual Phase 0.1 spec gate is the
    # `adapter-health-strict` job below (push to main + nightly schedule).
    if: github.event_name == 'pull_request'
    continue-on-error: true

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Use Node.js 22
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build search manifest
        run: npm run build:manifest

      - name: Run adapter health probe
        env:
          HEALTH_TIMEOUT_MS: "8000"
        run: npm run adapter:health

  adapter-health-strict:
    name: Adapter Health (spec gate)
    runs-on: ubuntu-latest
    needs: verify
    # THE Phase 0.1 gate: unquarantined adapter failures MUST fail the build.
    # Runs on push to main and nightly at 03:00 UTC. No continue-on-error.
    # Retry=2 absorbs transient network blips without hiding real regressions.
    if: github.event_name == 'push' || (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Use Node.js 22
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build search manifest
        run: npm run build:manifest

      - name: Run adapter health probe (strict, retry=2)
        env:
          HEALTH_TIMEOUT_MS: "8000"
          HEALTH_RETRY: "2"
        run: |
          attempts=0
          max=2
          until npm run adapter:health; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max" ]; then
              echo "adapter-health-strict: failed after $attempts attempts" >&2
              exit 1
            fi
            echo "adapter-health-strict: attempt $attempts failed, retrying..." >&2
            sleep 10
          done

  verify-changesets:
    name: Verify Changesets
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify changeset present for src/ changes
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          npm run verify:changesets

  conformance:
    name: Nightly Conformance
    runs-on: ubuntu-latest
    if: (github.event_name == 'schedule' && github.event.schedule == '0 9 * * *') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Use Node.js 22
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run conformance report
        id: conformance
        run: npm run conformance

      - name: Upload conformance artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: conformance-report-${{ github.run_id }}
          path: conformance-report.json
          retention-days: 30

      - name: Summarize failures
        if: failure()
        run: |
          echo "## Conformance failures" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          node -e "
            const r = require('./conformance-report.json');
            const failed = r.results.filter(x => x.status === 'fail');
            for (const f of failed) {
              console.log('- \`' + f.file + '\` — ' + f.errors.join('; '));
            }
          " >> $GITHUB_STEP_SUMMARY
