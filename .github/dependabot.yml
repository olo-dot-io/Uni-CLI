version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 10
    labels: ["dependencies"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci):"
    labels: ["ci"]
    # Security posture: every action is SHA-pinned with a `# vX.Y.Z` comment.
    # Dependabot preserves that pattern on bumps (updates both SHA and comment).
    groups:
      github-actions:
        patterns:
          - "*"
